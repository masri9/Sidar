<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sidarapp - Clean Layout</title>
    
    <style>
        :root {
            --primary-blue: #2563eb;
            --light-blue-bg: #eef2ff;
            --text-main: #0f172a; 
        }

        body, html { 
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            background: #fff;
        }

        /* --- Splash Screen --- */
        #splash-screen {
            position: fixed; inset: 0; background: #ffffff;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .splash-image { width: 160px; animation: splashEntrance 1.5s ease-out forwards; }
        @keyframes splashEntrance { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* --- Hero Background (الخلفية مع التلاشي) --- */
        .header-bg {
            position: absolute; top: 0; left: 0; right: 0; height: 45vh;
            background: linear-gradient(rgba(255,255,255,0.1), #fff), 
                        url('https://plain-eeur-prod-public.komododecks.com/202604/19/FtJXvAZvXREKew6PJ3ew/image.png');
            background-size: cover; background-position: center;
            z-index: 0;
        }

        /* --- Main Scroller --- */
        .app-container {
            position: relative; z-index: 1;
            height: 100vh; overflow-y: auto;
            padding: 60px 20px 120px; box-sizing: border-box;
            scrollbar-width: none;
        }
        .app-container::-webkit-scrollbar { display: none; }

        /* --- Hero Text --- */
        .hero-title { font-size: 34px; font-weight: 800; line-height: 1.1; color: var(--text-main); margin-bottom: 25px; margin-top: 20px; }
        .hero-title span { color: var(--primary-blue); }

        /* --- Search Bar --- */
        .search-wrapper {
            background: rgba(255,255,255,0.9); backdrop-filter: blur(15px);
            border-radius: 20px; padding: 12px 18px; display: flex; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); margin-bottom: 35px;
        }
        .search-wrapper input { flex: 1; border: none; background: transparent; outline: none; padding-left: 10px; font-size: 16px; font-weight: 500; }

        /* --- Bottom Nav --- */
        .bottom-nav {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; 
            background: #ffffff; border-radius: 40px;
            display: flex; justify-content: space-around; align-items: center;
            padding: 10px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); z-index: 1000;
        }
        .nav-item { 
            display: flex; align-items: center; justify-content: center; 
            padding: 12px; color: #94a3b8; cursor: pointer; transition: 0.3s;
            border-radius: 30px;
        }
        .nav-item.active { background: var(--light-blue-bg); color: var(--primary-blue); }
        .nav-item span { 
            max-width: 0; overflow: hidden; white-space: nowrap; 
            transition: 0.3s; font-weight: 700; font-size: 14px; 
        }
        .nav-item.active span { max-width: 80px; margin-left: 8px; }
        .nav-item svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2.2; }

    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="https://plain-eeur-prod-public.komododecks.com/202604/19/y0zyi6uOKg2CaNATvHPZ/image.png" class="splash-image">
    </div>

    <div class="header-bg"></div>

    <div class="app-container" id="main-app" style="opacity: 0; transition: 1s;">
        
        <h1 class="hero-title">Where do you <br><span>wanna go?</span></h1>

        <div class="search-wrapper">
            <span>🔍</span>
            <input type="text" placeholder="Ask Sidar AI anything...">
            <span style="color: var(--primary-blue)">🎤</span>
        </div>

    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="tab(this)">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
            <span>Home</span>
        </div>
        <div class="nav-item" onclick="tab(this)">
            <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
            <span>Map</span>
        </div>
        <div class="nav-item" onclick="tab(this)">
            <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
            <span>Reels</span>
        </div>
        <div class="nav-item" onclick="tab(this)">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span>Profile</span>
        </div>
    </nav>

    <script>
        // Splash logic
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash-screen').style.display = 'none';
                    document.getElementById('main-app').style.opacity = '1';
                }, 500);
            }, 2500);
        });

        // Navigation Tab Logic
        function tab(el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
