<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Command Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #141414;
            --primary-orange: #ff4500;
            --text-gray: #a0a0a0;
            --console-green: #00ff41;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 80px;
            background-color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 30px;
            border-left: 1px solid #222;
        }

        .sidebar i {
            font-size: 1.5rem;
            margin-bottom: 40px;
            color: var(--text-gray);
            cursor: pointer;
            transition: 0.3s;
        }

        .sidebar i:hover, .sidebar i.active {
            color: var(--primary-orange);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
        }

        h1 {
            color: var(--primary-orange);
            letter-spacing: 2px;
            font-size: 1.5rem;
            margin-bottom: 30px;
            text-align: right;
        }

        .input-group {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #222;
            margin-bottom: 25px;
        }

        input[type="text"] {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            padding: 15px;
            color: white;
            border-radius: 8px;
            outline: none;
            box-sizing: border-box;
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .btn-opt {
            background: transparent;
            border: 1px solid #333;
            color: white;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-opt:hover {
            border-color: var(--primary-orange);
            background: rgba(255, 69, 0, 0.05);
        }

        /* Console */
        .console-container {
            flex: 1;
            background: #000;
            border-radius: 10px;
            border: 1px solid #222;
            padding: 20px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            overflow-y: auto;
            position: relative;
        }

        .console-log {
            color: var(--console-green);
            margin-bottom: 8px;
            direction: ltr;
            text-align: left;
        }

        .execute-btn {
            background-color: var(--primary-orange);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            font-size: 1rem;
            text-transform: uppercase;
        }

        .execute-btn:hover {
            background-color: #e63e00;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <i class="fas fa-shield-halved active"></i>
        <i class="fas fa-network-wired"></i>
        <i class="fas fa-database"></i>
        <i class="fas fa-user-secret"></i>
    </div>

    <div class="main-content">
        <h1>مركز التحكم العملياتي | SHADOW COMMAND</h1>

        <div class="input-group">
            <input type="text" id="targetUrl" placeholder="أدخل رابط الحساب المستهدف (إنستغرام، تيك توك، فيسبوك)...">
        </div>

        <div class="actions">
            <button class="btn-opt" onclick="logAction('Mass Report Mode Selected')">
                <i class="fas fa-bolt" style="color: #ff4500;"></i> بلاغ مكثف آلي
            </button>
            <button class="btn-opt" onclick="logAction('Evidence Collection Started')">
                <i class="fas fa-camera" style="color: #00a8ff;"></i> جمع أدلة رقمية
            </button>
        </div>

        <div class="console-container" id="console">
            <div class="console-log">[SYSTEM] Modules loaded successfully.</div>
            <div class="console-log">[SYSTEM] Device: MacBook Pro M-Series detected.</div>
            <div class="console-log">[SYSTEM] Encryption: AES-256 Enabled.</div>
        </div>

        <button class="execute-btn" onclick="executeProtocol()">تنفيذ البروتوكول السري</button>
    </div>

    <script>
        const consoleEl = document.getElementById('console');

        function logAction(message) {
            const time = new Date().toLocaleTimeString();
            const log = document.createElement('div');
            log.className = 'console-log';
            log.innerText = `[${time}] ${message}`;
            consoleEl.appendChild(log);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        function executeProtocol() {
            const url = document.getElementById('targetUrl').value;
            if (!url) {
                logAction('خطأ: لم يتم إدخال رابط مستهدف');
                return;
            }
            logAction(`جاري بدء العملية على: ${url}`);
            logAction('جاري تفعيل الـ Residential Proxies...');
            logAction('فتح 15 متصفح خفي (Headless Instances)...');
            
            // محاكاة انتهاء العملية
            setTimeout(() => {
                logAction('تم إرسال كافة البلاغات بنجاح.');
                logAction('جاري مسح كافة السجلات (Auto-Wipe)...');
            }, 3000);
        }
    </script>
</body>
</html>
