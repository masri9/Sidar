<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidarapp - Services Update</title>
    <style>
        :root {
            --primary-blue: #2563eb;
            --light-blue: #dbeafe;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --nav-bg: rgba(255, 255, 255, 0.95);
        }

        body, html { 
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* --- Splash Screen (ثابت) --- */
        #splash-screen {
            position: fixed; inset: 0; background: #ffffff;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1), visibility 1s;
        }
        .splash-image { width: 180px; height: auto; animation: splashEntrance 1.5s ease-out forwards; }
        @keyframes splashEntrance {
            0% { transform: scale(0.8); opacity: 0; filter: blur(10px); }
            100% { transform: scale(1); opacity: 1; filter: blur(0); }
        }

        /* --- واجهة الـ Home --- */
        .background-container {
            position: fixed; inset: 0; z-index: -1;
            background-image: url('https://plain-eeur-prod-public.komododecks.com/202604/19/FtJXvAZvXREKew6PJ3ew/image.png'); 
            background-size: cover; background-position: center;
        }

        .app-container {
            height: 100vh; padding: 25px 20px;
            display: flex; flex-direction: column;
            box-sizing: border-box; opacity: 0; 
            transition: opacity 1.2s ease;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .greeting { font-size: 13px; color: var(--text-sub); font-weight: 700; }
        .user-name { font-size: 26px; font-weight: 800; color: var(--text-main); }
        .notif-icon { background: white; padding: 10px; border-radius: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        /* --- البانر الإعلاني (ثابت) --- */
        .promo-slider {
            width: 100%; height: 150px; border-radius: 25px;
            overflow: hidden; position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 25px;
        }
        .slides-wrapper { display: flex; width: 300%; height: 100%; transition: transform 0.8s cubic-bezier(0.65, 0, 0.35, 1); }
        .promo-slide { width: 100.333%; height: 100%; background-size: cover; background-position: center; position: relative; }
        .promo-slide::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, rgba(0,0,0,0.4) 0%, transparent 70%); }
        .promo-content { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); z-index: 2; color: white; }
        .promo-title { font-size: 18px; font-weight: 700; }

        /* --- قسم الخدمات الجديد (New Services) --- */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 5px;
        }

        .service-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 22px;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 20px rgba(0,0,0,0.04);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .service-card:active {
            transform: scale(0.92);
            background: var(--light-blue);
        }

        .service-icon {
            width: 40px;
            height: 40px;
            margin-bottom: 10px;
            background: var(--light-blue);
            padding: 10px;
            border-radius: 14px;
            color: var(--primary-blue);
        }

        .service-name {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-main);
        }

        /* --- شريط التنقل (ثابت) --- */
        .bottom-nav-container {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 420px;
            background: var(--nav-bg); backdrop-filter: blur(25px);
            padding: 8px 12px; border-radius: 30px;
            box-shadow: 0 15px 35px rgba(37, 99, 235, 0.15);
            display: flex; justify-content: space-around; align-items: center;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .nav-item { display: flex; align-items: center; justify-content: center; padding: 10px 16px; cursor: pointer; border-radius: 22px; color: var(--text-sub); }
        .nav-item svg { width: 24px; height: 24px; stroke: currentColor; stroke-width: 2.2; fill: none; }
        .nav-item.active { background: var(--light-blue); color: var(--primary-blue); }
        .nav-text { max-width: 0; overflow: hidden; white-space: nowrap; font-size: 14px; font-weight: 700; transition: all 0.4s ease; opacity: 0; }
        .nav-item.active .nav-text { max-width: 80px; margin-left: 10px; opacity: 1; }

    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="https://plain-eeur-prod-public.komododecks.com/202604/19/y0zyi6uOKg2CaNATvHPZ/image.png" alt="Logo" class="splash-image">
    </div>

    <div class="background-container"></div>
    <div class="app-container" id="main-app">
        <header class="header">
            <div>
                <div id="greeting" class="greeting">WELCOME BACK</div>
                <div class="user-name">Alex Rivera</div>
            </div>
            <div class="notif-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
            </div>
        </header>

        <div class="promo-slider">
            <div class="slides-wrapper" id="slidesWrapper">
                <div class="promo-slide" style="background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=800');">
                    <div class="promo-content"><div class="promo-title">Summer Offers</div></div>
                </div>
                <div class="promo-slide" style="background-image: url('https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?w=800');">
                    <div class="promo-content"><div class="promo-title">Travel Smart</div></div>
                </div>
                <div class="promo-slide" style="background-image: url('https://images.unsplash.com/photo-1502602898657-3e9172f29b78?w=800');">
                    <div class="promo-content"><div class="promo-title">Explore More</div></div>
                </div>
            </div>
        </div>

        <div class="services-grid">
            <div class="service-card" onclick="location.href='#esim'">
                <svg class="service-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>
                <span class="service-name">eSIM</span>
            </div>
            <div class="service-card" onclick="location.href='#events'">
                <svg class="service-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                <span class="service-name">Events</span>
            </div>
            <div class="service-card" onclick="location.href='#exchange'">
                <svg class="service-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 8V16M8 12H16"></path><text x="8" y="15" font-size="8" fill="currentColor" stroke="none">$</text></svg>
                <span class="service-name">Exchange</span>
            </div>
        </div>

        <nav class="bottom-nav-container">
            <div class="nav-item active" onclick="setActive(this)"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg><span class="nav-text">Home</span></div>
            <div class="nav-item" onclick="setActive(this)"><svg viewBox="0 0 24 24"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon></svg><span class="nav-text">Map</span></div>
            <div class="nav-item" onclick="setActive(this)"><svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5"></rect><path d="M10 8l6 4-6 4V8z" fill="currentColor" opacity="0.3"></path></svg><span class="nav-text">Reels</span></div>
            <div class="nav-item" onclick="setActive(this)"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><span class="nav-text">Profile</span></div>
        </nav>
    </div>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                document.getElementById('splash-screen').style.visibility = 'hidden';
                document.getElementById('main-app').style.opacity = '1';
            }, 2500);
        });

        let currentSlide = 0;
        setInterval(() => {
            currentSlide = (currentSlide + 1) % 3;
            document.getElementById('slidesWrapper').style.transform = `translateX(-${(currentSlide * 100) / 3}%)`;
        }, 4000);

        function setActive(el) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
        }

        const hours = new Date().getHours();
        const g = document.getElementById('greeting');
        if (hours < 12) g.innerText = "GOOD MORNING ☀️";
        else if (hours < 17) g.innerText = "GOOD AFTERNOON 🌤️";
        else g.innerText = "GOOD EVENING ✨";
    </script>
</body>
</html>
