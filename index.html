<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SIDAR TRAVEL — AI Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
  :root {
    --blue: #2A70DC; --ink: #0f1320; --white: #ffffff;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    /* الحفاظ على تدرج الألوان الهادئ فقط */
    background: linear-gradient(180deg,#fdfefe 0%,#e9f7ff 40%,#fff8ec 100%);
  }

  /* Header Icons */
  header {
    position: fixed;
    top: 0; width: 100%;
    padding: 25px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 100;
  }
  .header-icon { font-size: 24px; color: var(--ink); cursor: pointer; opacity: 0.7; transition: 0.3s; }
  .header-icon:hover { opacity: 1; color: var(--blue); }

  /* Hero / Chat Container */
  .chat-container {
    width: 100%;
    max-width: 700px;
    padding: 20px;
    text-align: center;
    z-index: 10;
  }

  .welcome-msg {
    font-size: 14px;
    font-weight: 600;
    color: var(--blue);
    letter-spacing: 1.5px;
    margin-bottom: 15px;
    text-transform: uppercase;
  }

  .logo-container {
    margin-bottom: 40px;
  }
  .logo-container img { width: 180px; height: auto; }

  /* Chat Box - Simple & Clean */
  .ai-chat-panel {
    background: rgba(255, 255, 255, 0.8);
    backdrop-filter: blur(10px);
    border-radius: 24px;
    padding: 12px;
    border: 1px solid rgba(0, 0, 0, 0.05);
    box-shadow: 0 10px 30px rgba(0,0,0,0.04);
  }

  .input-group {
    display: flex;
    align-items: center;
    background: #fff;
    border-radius: 18px;
    padding: 10px 15px;
    border: 1px solid #eee;
  }

  .input-group input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 16px;
    color: var(--ink);
    padding: 5px 10px;
  }

  .send-btn {
    background: var(--ink);
    color: white;
    border: none;
    width: 35px;
    height: 35px;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .send-btn:hover { background: var(--blue); transform: translateY(-2px); }

</style>
</head>
<body>

<header>
  <div class="header-icon"><i class="fas fa-bars"></i></div>
  <div class="header-icon"><i class="fas fa-bell"></i></div>
</header>

<main class="chat-container">
  <div class="welcome-msg">Explore Your Next Adventure</div>

  <div class="logo-container">
    <img src="https://i.ibb.co/Q3p4gmYX/IMG-1629.png" alt="SIDAR TRAVEL">
  </div>

  <div class="ai-chat-panel">
    <div class="input-group">
      <input type="text" placeholder="Ask anything about your trip...">
      <button class="send-btn">
        <i class="fas fa-arrow-up"></i>
      </button>
    </div>
  </div>
</main>

</body>
</html>
