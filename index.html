<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sidarapp - Original Stable</title>
    
    <style>
        :root {
            --primary-lava: #ff4500; 
            --lava-glow: rgba(255, 69, 0, 0.4); 
            --lava-glow-soft: rgba(255, 69, 0, 0.2); 
            --text-main: #0f172a; 
        }

        body, html { 
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-page { display: none; animation: slideUp 0.4s ease-out; }
        .app-page.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        #splash-screen {
            position: fixed; inset: 0; background: #ffffff;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.5s ease;
        }
        .splash-image { width: 180px; }

        .header-bg {
            position: absolute; top: 0; left: 0; right: 0; height: 50vh;
            background-size: cover; background-position: center; z-index: 0;
            transition: 0.5s;
        }

        .app-container {
            position: relative; z-index: 1;
            padding: 60px 20px 80px; 
            box-sizing: border-box;
        }

        .hero-section { position: relative; margin-bottom: 5px; } 
        .hero-title { font-size: 34px; font-weight: 800; line-height: 1.1; color: var(--text-main); margin-bottom: 45px; position: relative; z-index: 1; }
        .hero-title span { color: var(--primary-lava); }

        /* --- الروبوت: مستقر فوق المستطيل --- */
        .sidar-robot {
            position: absolute; 
            right: 0px;    
            top: 45px;      
            width: 145px;    
            z-index: 10; 
            filter: drop-shadow(0 10px 15px var(--lava-glow-soft));
            animation: robotFloat 4s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes robotFloat { 
            0%, 100% { transform: translateY(0) rotate(1deg); } 
            50% { transform: translateY(-7px) rotate(-1deg); } 
        }

        /* Search Bar */
        .search-wrapper {
            background: rgba(255,255,255,0.95); backdrop-filter: blur(15px);
            border-radius: 20px; padding: 12px 18px; display: flex; align-items: center;
            border: 2px solid var(--primary-lava); margin-bottom: 30px; position: relative;
        }
        .search-wrapper input { flex: 1; border: none; background: transparent; outline: none; font-size: 16px; color: var(--text-main); width: 100%; }
        .fake-placeholder { position: absolute; left: 45px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 16px; pointer-events: none; }
        .lava-text { color: var(--primary-lava); font-weight: 700; }

        /* Services Grid */
        .section-header { display: flex; justify-content: space-between; align-items: flex-end; margin: 25px 0 12px; padding: 0 5px; }
        .section-header h3 { font-size: 20px; font-weight: 900; color: var(--text-main); margin: 0; }

        .services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 5px 5px 20px; }
        .service-card {
            background: #ffffff; border: 1.5px solid #f1f5f9; border-radius: 24px; padding: 8px; text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; display: flex; flex-direction: column; align-items: center;
        }
        .service-card.clicked { background: var(--primary-lava) !important; border-color: var(--primary-lava); transform: scale(0.92); box-shadow: 0 10px 20px var(--lava-glow); }
        .service-card-image { width: 100%; height: 80px; background: #fff5f2; border-radius: 18px; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; overflow: hidden; }
        .service-card-image img { width: 100%; height: 100%; object-fit: cover; }
        .service-card-info h4 { margin: 0; font-size: 13px; font-weight: 800; color: var(--text-main); }
        .service-card-info p { margin: 1px 0 4px; font-size: 9px; color: #94a3b8; font-weight: 600; }

        /* Stacked Cards */
        .stacked-cards-wrapper { position: relative; width: 100%; height: 240px; display: flex; justify-content: center; align-items: center; perspective: 1200px; }
        .card-item { 
            position: absolute; width: 190px; height: 230px; border-radius: 28px; background-size: cover; background-position: center; transition: 0.7s; 
            display: flex; align-items: flex-end; justify-content: center; padding-bottom: 15px; opacity: 0; pointer-events: none; border: 1.5px solid var(--lava-glow-soft);
        }
        .card-item.active { opacity: 1; transform: translateX(0) translateZ(50px) scale(1); z-index: 10; pointer-events: auto; border-color: var(--primary-lava); box-shadow: 0 8px 25px var(--lava-glow-soft); }
        .card-item.prev { opacity: 0.4; transform: translateX(-90px) translateZ(-100px) scale(0.8); z-index: 5; }
        .card-item.next { opacity: 0.4; transform: translateX(90px) translateZ(-100px) scale(0.8); z-index: 5; }
        .see-more-btn { background: rgba(255, 255, 255, 0.25); backdrop-filter: blur(12px); color: #fff; border-radius: 50px; padding: 6px 25px; font-weight: 700; font-size: 10px; border: 1px solid rgba(255,255,255,0.3); }

        .trending-scroll { display: flex; gap: 15px; overflow-x: auto; padding: 5px 5px; scrollbar-width: none; }
        .trend-card { flex-shrink: 0; width: 100px; text-align: center; }
        .trend-icon-box { width: 90px; height: 90px; border-radius: 22px; background: #f8fafc; border: 1.5px solid #f1f5f9; display: flex; align-items: center; justify-content: center; font-size: 35px; margin-bottom: 6px; }
    </style>
</head>
<body>

    <div id="splash-screen"><img id="splashLogo" src="" class="splash-image"></div>
    <div class="header-bg" id="heroBg"></div>

    <div class="app-container" id="main-app" style="opacity: 0; transition: 1s;">
        
        <div id="home-page" class="app-page active">
            <div class="hero-section">
                <img src="https://plain-eeur-prod-public.komododecks.com/202604/20/U4I3P5a9xfiovTcHKNJk/image.png" class="sidar-robot">
                <h1 class="hero-title">Where do you <br><span>wanna go?</span></h1>
            </div>

            <div class="search-wrapper">
                <input type="text" placeholder=" ">
                <div class="fake-placeholder">Ask <span class="lava-text">Sidar</span> anything...</div>
            </div>

            <div class="section-header"><h3>Our Services</h3></div>
            <div class="services-grid">
                <div class="service-card" onclick="handleServiceClick(this, 'esim')">
                    <div class="service-card-image"><img src="https://plain-eeur-prod-public.komododecks.com/202604/20/wTHcH8IlMhZ65t0JMbMB/image.png"></div>
                    <div class="service-card-info"><h4>eSIM</h4><p>Instant Data</p></div>
                </div>
                <div class="service-card" onclick="handleServiceClick(this, 'events')">
                    <div class="service-card-image"><img src="https://plain-eeur-prod-public.komododecks.com/202604/20/vPIXv8ss1tI7CGpQywpo/image.png"></div>
                    <div class="service-card-info"><h4>Events</h4><p>Explore Fun</p></div>
                </div>
                <div class="service-card" onclick="handleServiceClick(this, 'transfer')">
                    <div class="service-card-image"><img src="https://plain-eeur-prod-public.komododecks.com/202604/20/n5ssXxQhHi4IvqHeO0rR/image.png"></div>
                    <div class="service-card-info"><h4>Transfer</h4><p>Send Money</p></div>
                </div>
            </div>

            <div class="stacked-cards-wrapper" id="cardsWrapper">
                <div class="card-item" id="card0"><div class="see-more-btn">See More</div></div>
                <div class="card-item" id="card1"><div class="see-more-btn">See More</div></div>
                <div class="card-item" id="card2"><div class="see-more-btn">See More</div></div>
                <div class="card-item" id="card3"><div class="see-more-btn">See More</div></div>
            </div>

            <div class="section-header"><h3>Trending</h3></div>
            <div class="trending-scroll">
                <div class="trend-card"><div class="trend-icon-box">🕌</div><span>Istanbul</span></div>
                <div class="trend-card"><div class="trend-icon-box">🏙️</div><span>Dubai</span></div>
                <div class="trend-card"><div class="trend-icon-box">🏔️</div><span>Georgia</span></div>
            </div>
        </div>
    </div>

    <script>
        const MY_IMAGES = {
            splashLogo: 'https://plain-eeur-prod-public.komododecks.com/202604/19/y0zyi6uOKg2CaNATvHPZ/image.png',
            heroBackground: 'https://plain-eeur-prod-public.komododecks.com/202604/19/FtJXvAZvXREKew6PJ3ew/image.png',
            card0: 'https://plain-eeur-prod-public.komododecks.com/202604/19/Zs148rIHaZ5l8sjqw4S4/image.png',
            card1: 'https://plain-eeur-prod-public.komododecks.com/202604/19/xK3pwCpVUtFZFveFLbt2/image.png',
            card2: 'https://plain-eeur-prod-public.komododecks.com/202604/19/Ri6ookm2NesWdMC7Mcbc/image.png',
            card3: 'https://plain-eeur-prod-public.komododecks.com/202604/19/qzr51sWPt6GgM3gTZH8K/image.png'
        };

        function handleServiceClick(el, id) {
            el.classList.add('clicked');
            setTimeout(() => el.classList.remove('clicked'), 400);
        }

        window.addEventListener('load', () => {
            document.getElementById('splashLogo').src = MY_IMAGES.splashLogo;
            document.getElementById('heroBg').style.backgroundImage = `url('${MY_IMAGES.heroBackground}')`;
            const cardItems = document.querySelectorAll('.card-item');
            cardItems.forEach((c, i) => c.style.backgroundImage = `url('${MY_IMAGES['card'+i]}')`);
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash-screen').style.display = 'none';
                    document.getElementById('main-app').style.opacity = '1';
                }, 500);
            }, 2000);
        });

        let stackIdx = 0;
        setInterval(() => {
            const items = document.querySelectorAll('.card-item');
            if(items.length === 0) return;
            items.forEach((c, i) => {
                c.classList.remove('active', 'prev', 'next');
                if (i === stackIdx) c.classList.add('active');
                else if (i === (stackIdx - 1 + items.length) % items.length) c.classList.add('prev');
                else if (i === (stackIdx + 1) % items.length) c.classList.add('next');
            });
            stackIdx = (stackIdx + 1) % items.length;
        }, 4000);
    </script>
</body>
</html>
