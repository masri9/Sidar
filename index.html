<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --accent: #6c5ce7;
            --nav-bg: #ffffff;
        }

        body { margin: 0; background-color: #f8faff; font-family: sans-serif; }

        /* 1. البانر الإعلاني - 3 صور تتبدل تلقائياً */
        .banner-container {
            margin: 20px;
            height: 180px;
            position: relative;
            overflow: hidden;
            border-radius: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            background-size: cover;
            background-position: center;
        }

        .slide.active { opacity: 1; }

        /* 2. شريط التنقل السفلي - حجم أصغر وتحريك جميل */
        .bottom-nav {
            position: fixed;
            bottom: 20px; /* مرتفع قليلاً ليعطي شعوراً بالطفو */
            left: 50%;
            transform: translateX(-50%);
            width: 85%; /* أصغر عرضاً */
            max-width: 400px;
            background: var(--nav-bg);
            display: flex;
            justify-content: space-around;
            padding: 12px 0; /* حجم أصغر */
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .nav-item {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .nav-icon {
            width: 22px; /* حجم أيقونات أصغر */
            height: 22px;
            stroke: #b2bec3;
            stroke-width: 2;
            fill: none;
            transition: 0.3s;
        }

        /* تأثير التحريك عند النقر أو النشاط */
        .nav-item.active {
            background: rgba(108, 92, 231, 0.1);
            transform: translateY(-5px); /* حركة قفز بسيطة للأعلى */
        }

        .nav-item.active .nav-icon {
            stroke: var(--accent);
            filter: drop-shadow(0 0 5px rgba(108, 92, 231, 0.4));
        }

    </style>
</head>
<body>

    <div class="banner-container">
        <div class="slide active" style="background-image: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800');"></div>
        <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1519046904884-53103b34b206?w=800');"></div>
        <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1555400538-5fd41fe3e7e4?w=800');"></div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="setActive(this)">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
        </div>
        <div class="nav-item" onclick="setActive(this)">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M1 6v16l7-4 8 4 7-4V2l-7 4-8-4-7 4z"></path></svg>
        </div>
        <div class="nav-item" onclick="setActive(this)">
            <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"></circle><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path></svg>
        </div>
    </nav>

    <script>
        // 1. منطق تبديل صور البانر كل 4 ثوانٍ
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');

        setInterval(() => {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }, 4000);

        // 2. منطق تحريك الأيقونات عند النقر
        function setActive(el) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
