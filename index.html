<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidarapp - Professional Travel UI</title>
    <style>
        :root {
            --accent: #6c5ce7;
            --bg-light: #f8faff;
            --text-main: #1a1a1a;
            --text-sub: #8e8e8e;
            --esim-gradient: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
            background-color: var(--bg-light);
            position: relative;
            min-height: 100vh;
        }

        /* --- طبقة الخلفية الاحترافية (الظلال) --- */
        .creative-bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        /* ظلال الطائرات المتحركة */
        .plane-shadow {
            position: absolute;
            width: 100px;
            opacity: 0.04; /* ظل خفيف جداً */
            animation: planeTravel 40s linear infinite;
        }

        @keyframes planeTravel {
            0% { transform: translate(-100px, 100px) rotate(45deg); }
            100% { transform: translate(110vw, -100px) rotate(45deg); }
        }

        /* ظلال الأشجار في الأسفل */
        .tree-shadows {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 200px;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAiIGhlaWdodD0iMTAwIiB2aWV3Qm94PSIwIDAgMTAwIDEwMCI+PGcgZmlsbD0iIzZjNWNlNyIgZmlsbC1vcGFjaXR5PSIwLjA1Ij48cGF0a dD0iTTUwIDEwIEwyMCA4MCBMMzAgODAgTDI1IDkwIEw3NSA5MCBMNzAgODAgTDgwIDgwIFogIi8+PC9nPjwvc3ZnPg==');
            background-repeat: repeat-x;
            background-size: 150px;
            filter: blur(1px);
            animation: treeSway 10s ease-in-out infinite alternate;
            transform-origin: bottom;
        }

        @keyframes treeSway {
            from { transform: skewX(-2deg); }
            to { transform: skewX(2deg); }
        }

        /* --- العناصر الثابتة المعتمدة --- */
        .app-container {
            padding: 25px 20px 140px 20px;
            position: relative;
            z-index: 1;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .greeting { font-size: 12px; color: var(--text-sub); font-weight: bold; }
        .user-name { font-size: 28px; font-weight: 800; color: var(--text-main); }

        .banner-carousel {
            height: 180px; border-radius: 25px; overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.06); margin-bottom: 30px;
        }
        .slides-container { display: flex; height: 100%; transition: transform 0.6s ease; }
        .slide { min-width: 100%; background-size: cover; background-position: center; }

        .services-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .service-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            padding: 25px 20px; border-radius: 25px;
            text-align: center; border: 1px solid rgba(255,255,255,0.4);
            transition: 0.3s;
        }
        .esim-card { background: var(--esim-gradient); color: white; border: none; }
        .service-card:active { transform: scale(0.95); }

        .service-icon-box {
            width: 55px; height: 55px; background: rgba(108, 92, 231, 0.1);
            border-radius: 18px; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px;
        }
        .esim-card .service-icon-box { background: rgba(255, 255, 255, 0.2); }
        .service-icon { width: 28px; height: 28px; stroke: var(--accent); stroke-width: 2; fill: none; }
        .esim-card .service-icon { stroke: white; }

        .bottom-nav {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 400px; background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px); display: flex; justify-content: space-around;
            padding: 15px 0; border-radius: 35px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); z-index: 1000;
        }
        .nav-item.active { color: var(--accent); transform: translateY(-5px); transition: 0.3s; }
    </style>
</head>
<body>

    <div class="creative-bg-layer">
        <svg class="plane-shadow" viewBox="0 0 24 24" style="top: 20%; animation-delay: 0s;">
            <path fill="currentColor" d="M21,16L14,11V5A2,2 0 0,0 12,3A2,2 0 0,0 10,5V11L3,16V18L10,15.7V21L8,22.5V24L12,23L16,24V22.5L14,21V15.7L21,18V16Z" />
        </svg>
        <svg class="plane-shadow" viewBox="0 0 24 24" style="top: 50%; animation-delay: -20s;">
            <path fill="currentColor" d="M21,16L14,11V5A2,2 0 0,0 12,3A2,2 0 0,0 10,5V11L3,16V18L10,15.7V21L8,22.5V24L12,23L16,24V22.5L14,21V15.7L21,18V16Z" />
        </svg>
        
        <div class="tree-shadows"></div>
    </div>

    <div class="app-container">
        <header class="header">
            <div>
                <div class="greeting">EXPLORE THE WORLD</div>
                <div class="user-name">Alex Rivera</div>
            </div>
            <div style="font-size: 24px;">🔔</div>
        </header>

        <section class="banner-carousel">
            <div class="slides-container" id="slides">
                <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?w=800');"></div>
                <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=800');"></div>
            </div>
        </section>

        <h2 style="font-size: 18px; margin-bottom: 15px;">Our Services</h2>
        <div class="services-grid">
            <div class="service-card">
                <div class="service-icon-box">
                    <svg class="service-icon" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                </div>
                <div style="font-weight: 600;">Activities</div>
            </div>
            
            <div class="service-card esim-card" onclick="alert('eSIM Activated!')">
                <div class="service-icon-box">
                    <svg class="service-icon" viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M9 7h6m-6 4h6"/></svg>
                </div>
                <div style="font-weight: 700;">Get E-sim</div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active">🏠</div>
        <div class="nav-item">🗺️</div>
        <div class="nav-item">👤</div>
    </nav>

    <script>
        // تحريك البانر
        let s = 0;
        setInterval(() => {
            s = (s + 1) % 2;
            document.getElementById('slides').style.transform = `translateX(-${s * 100}%)`;
        }, 4000);
    </script>
</body>
</html>
