<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sidarapp - Fixed Layout</title>
    
    <style>
        :root {
            --primary-lava: #ff4500; 
            --lava-glow: rgba(255, 69, 0, 0.4); 
            --text-main: #0f172a; 
        }

        .lava-text { color: var(--primary-lava); font-weight: 700; }

        body, html { 
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-page { display: none; animation: slideUp 0.4s ease-out; }
        .app-page.active { display: block; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #splash-screen {
            position: fixed; inset: 0; background: #ffffff;
            z-index: 9999; display: flex; justify-content: center; align-items: center; transition: 0.5s;
        }
        .splash-image { width: 180px; }

        .header-bg {
            position: absolute; top: 0; left: 0; right: 0; height: 55vh;
            background-size: cover; background-position: center; z-index: 0;
        }

        .app-container {
            position: relative; z-index: 1;
            padding: 100px 20px 120px; /* دفع المحتوى بالكامل للأسفل */
            box-sizing: border-box;
        }

        /* Hero Section Adjustments */
        .hero-section { position: relative; margin-top: 20px; margin-bottom: 30px; }
        .hero-title { font-size: 34px; font-weight: 800; line-height: 1.1; color: var(--text-main); margin: 0; }
        .hero-title span { color: var(--primary-lava); }

        .sidar-robot {
            position: absolute;
            right: 5px;      
            top: -30px;     
            width: 110px;    
            z-index: 10;
            animation: robotFloat 3s ease-in-out infinite;
        }

        @keyframes robotFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Search Bar Adjustments */
        .search-wrapper {
            background: rgba(255,255,255,0.9); backdrop-filter: blur(15px);
            border-radius: 20px; padding: 14px 18px; display: flex; align-items: center;
            border: 2px solid var(--primary-lava); 
            margin-top: 20px; /* مسافة إضافية من العنوان */
            margin-bottom: 40px; /* مسافة إضافية قبل الخدمات */
            position: relative;
        }
        .search-icon { margin-right: 10px; font-size: 18px; }
        .search-wrapper input { flex: 1; border: none; background: transparent; outline: none; font-size: 16px; }
        .fake-placeholder {
            position: absolute; left: 45px; top: 50%; transform: translateY(-50%);
            color: #94a3b8; pointer-events: none; transition: 0.2s;
        }
        .search-wrapper input:focus + .fake-placeholder,
        .search-wrapper input:not(:placeholder-shown) + .fake-placeholder { opacity: 0; }

        /* Services Section */
        .services-scroll-container {
            display: flex; gap: 12px; overflow-x: auto; padding: 10px 0 30px; scrollbar-width: none;
        }
        .service-pill {
            display: flex; align-items: center; background: #ffffff; border: 1.5px solid #f1f5f9;
            padding: 10px 20px; border-radius: 50px; flex-shrink: 0; font-weight: 600;
        }
        .service-pill.active { border-color: var(--primary-lava); color: var(--primary-lava); background: rgba(255, 69, 0, 0.05); }

        /* Stacked Cards Layout */
        .stacked-cards-wrapper {
            position: relative; width: 100%; height: 280px;
            display: flex; justify-content: center; align-items: center;
            perspective: 1000px; margin-top: 20px;
        }
        .card-item {
            position: absolute; width: 210px; height: 260px; 
            border-radius: 30px; background-size: cover; background-position: center;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
            display: flex; align-items: flex-end; justify-content: center;
            padding-bottom: 20px; opacity: 0; pointer-events: none;
            border: 2px solid transparent;
        }
        .card-item.active { 
            opacity: 1; transform: translateX(0) scale(1.1); z-index: 10; pointer-events: auto;
            border-color: var(--primary-lava);
        }
        .card-item.prev { opacity: 0.5; transform: translateX(-90px) scale(0.85); z-index: 5; }
        .card-item.next { opacity: 0.5; transform: translateX(90px) scale(0.85); z-index: 5; }

        .see-more-btn {
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(10px);
            color: #fff; border-radius: 50px; padding: 10px 25px;
            font-weight: 700; font-size: 12px; border: 1px solid rgba(255,255,255,0.2);
        }

        .dots-container { display: flex; justify-content: center; gap: 8px; margin-top: 20px; }
        .dot { width: 8px; height: 8px; background: #e2e8f0; border-radius: 50%; transition: 0.3s; }
        .dot.active { background: var(--primary-lava); width: 20px; border-radius: 10px; }

        /* Other Styles */
        .section-header { display: flex; justify-content: space-between; align-items: baseline; margin: 40px 0 15px; }
        .section-header h3 { font-size: 22px; font-weight: 800; color: var(--text-main); margin: 0; }
        .section-header span { color: var(--primary-lava); font-weight: 700; font-size: 14px; }

        .stories-container { display: flex; gap: 15px; overflow-x: auto; padding: 5px 0 20px; scrollbar-width: none; }
        .story-item { text-align: center; flex-shrink: 0; }
        .story-ring { width: 70px; height: 70px; border-radius: 22px; padding: 3px; background: linear-gradient(45deg, #ff4500, #ff8c00); position: relative; margin-bottom: 8px; }
        .story-ring img { width: 100%; height: 100%; border-radius: 19px; object-fit: cover; border: 2px solid #fff; background: #eee; }

        .bottom-nav {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 450px; background: #fff; border-radius: 50px;
            display: flex; justify-content: space-around; padding: 10px;
            border: 2px solid var(--primary-lava); box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .nav-item { color: #94a3b8; display: flex; align-items: center; gap: 8px; padding: 10px 18px; border-radius: 30px; }
        .nav-item.active { background: rgba(255, 69, 0, 0.1); color: var(--primary-lava); font-weight: 700; }
    </style>
</head>
<body>

    <div id="splash-screen"><img id="splashLogo" src="https://plain-eeur-prod-public.komododecks.com/202604/19/y0zyi6uOKg2CaNATvHPZ/image.png" class="splash-image"></div>
    <div class="header-bg" id="heroBg"></div>

    <div class="app-container" id="main-app" style="opacity: 0; transition: 0.8s;">
        
        <div id="home-page" class="app-page active">
            <div class="hero-section">
                <img src="https://plain-eeur-prod-public.komododecks.com/202604/20/zpRwsd9YMgeCmtSTOjFQ/image.png" class="sidar-robot">
                <h1 class="hero-title">Where do you <br><span>wanna go?</span></h1>
            </div>

            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" placeholder=" ">
                <div class="fake-placeholder">Ask <span class="lava-text">Sidar</span> any thing...</div>
            </div>

            <div class="section-header"><h3>Our Services</h3></div>
            <div class="services-scroll-container">
                <div class="service-pill"><span>🎟️ Events</span></div>
                <div class="service-pill"><span>📶 eSIM</span></div>
                <div class="service-pill active"><span>💱 Currency</span></div>
                <div class="service-pill"><span>💸 Transfer</span></div>
            </div>

            <div class="section-header">
                <h3>Live Moments</h3>
                <span>View Map</span>
            </div>
            <div class="stories-container">
                <div class="story-item"><div class="story-ring"><img src="https://i.pravatar.cc/150?u=1"></div><span>Alex</span></div>
                <div class="story-item"><div class="story-ring"><img src="https://i.pravatar.cc/150?u=2"></div><span>Sarah</span></div>
                <div class="story-item"><div class="story-ring"><img src="https://i.pravatar.cc/150?u=3"></div><span>Yasin</span></div>
                <div class="story-item"><div class="story-ring"><img src="https://i.pravatar.cc/150?u=4"></div><span>Mona</span></div>
            </div>

            <div class="stacked-cards-wrapper" id="cardsWrapper">
                <div class="card-item" id="card0"><div class="see-more-btn">See More</div></div>
                <div class="card-item" id="card1"><div class="see-more-btn">See More</div></div>
                <div class="card-item" id="card2"><div class="see-more-btn">See More</div></div>
                <div class="card-item" id="card3"><div class="see-more-btn">See More</div></div>
            </div>
            <div class="dots-container" id="dotsContainer"></div>

        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active"><span>🏠 Home</span></div>
        <div class="nav-item"><span>📍 Map</span></div>
        <div class="nav-item"><span>📺 Reels</span></div>
        <div class="nav-item"><span>👤 Profile</span></div>
    </nav>

    <script>
        const IMAGES = {
            bg: 'https://plain-eeur-prod-public.komododecks.com/202604/19/FtJXvAZvXREKew6PJ3ew/image.png',
            c0: 'https://plain-eeur-prod-public.komododecks.com/202604/19/Zs148rIHaZ5l8sjqw4S4/image.png',
            c1: 'https://plain-eeur-prod-public.komododecks.com/202604/19/xK3pwCpVUtFZFveFLbt2/image.png',
            c2: 'https://plain-eeur-prod-public.komododecks.com/202604/19/Ri6ookm2NesWdMC7Mcbc/image.png',
            c3: 'https://plain-eeur-prod-public.komododecks.com/202604/19/qzr51sWPt6GgM3gTZH8K/image.png'
        };

        function setup() {
            document.getElementById('heroBg').style.backgroundImage = `url('${IMAGES.bg}')`;
            document.getElementById('card0').style.backgroundImage = `url('${IMAGES.c0}')`;
            document.getElementById('card1').style.backgroundImage = `url('${IMAGES.c1}')`;
            document.getElementById('card2').style.backgroundImage = `url('${IMAGES.c2}')`;
            document.getElementById('card3').style.backgroundImage = `url('${IMAGES.c3}')`;
            
            const container = document.getElementById('dotsContainer');
            for(let i=0; i<4; i++) {
                let d = document.createElement('div');
                d.className = 'dot' + (i==0?' active':'');
                container.appendChild(d);
            }
        }

        let idx = 0;
        function rotate() {
            const cards = document.querySelectorAll('.card-item');
            const dots = document.querySelectorAll('.dot');
            cards.forEach((c, i) => {
                c.classList.remove('active', 'prev', 'next');
                if(i === idx) c.classList.add('active');
                else if(i === (idx-1+4)%4) c.classList.add('prev');
                else if(i === (idx+1)%4) c.classList.add('next');
            });
            dots.forEach((d, i) => d.classList.toggle('active', i === idx));
            idx = (idx + 1) % 4;
        }

        window.onload = () => {
            setup();
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash-screen').style.display = 'none';
                    document.getElementById('main-app').style.opacity = '1';
                    rotate();
                    setInterval(rotate, 3000);
                }, 500);
            }, 1500);
        };
    </script>
</body>
</html>
