<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidarapp - Travel Explorer</title>
    <style>
        /* إعدادات المتغيرات والألوان الفاتحة */
        :root {
            --bg-light: #f8f9fa;
            --text-dark: #2d3436;
            --accent-purple: #a29bfe;
            --neon-b: #3ecfff;
            --neon-p: #a29bfe;
            --r: 20px; /* حواف مستديرة للبطاقات */
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-light);
        }

        /* الخلفية التفاعلية الهادئة */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(45deg, #ffffff, #e3f2fd, #f5f5f5);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .app-container {
            padding: 25px 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }

        /* الهيدر العلوي */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px 20px 25px;
        }

        .greeting-text {
            font-size: 12px;
            color: #636e72;
            letter-spacing: 1px;
            font-weight: bold;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .user-name {
            font-size: 26px;
            font-weight: 900;
            color: var(--text-dark);
        }

        .notif-box {
            position: relative;
            background: rgba(0, 0, 0, 0.05);
            padding: 10px;
            border-radius: 12px;
        }

        .dot {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 8px;
            height: 8px;
            background-color: var(--accent-purple);
            border-radius: 50%;
        }

        /* تنسيق الـ Banner */
        .banner {
            margin: 0 20px;
            position: relative;
            height: 210px;
            overflow: hidden;
            border-radius: var(--r);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .banner-slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity .9s ease;
            background-size: cover;
            background-position: center;
        }

        .banner-slide.active { opacity: 1; }

        .banner-slide::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 100%);
        }

        .banner-content {
            position: absolute;
            bottom: 18px;
            left: 20px;
            z-index: 2;
        }

        .banner-tag {
            font-size: 10px;
            font-weight: 600;
            color: white;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            padding: 3px 10px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 6px;
        }

        .banner-title {
            font-size: 22px;
            font-weight: 800;
            color: #fff;
            line-height: 1.2;
        }

        .banner-dots {
            position: absolute;
            bottom: 18px;
            right: 18px;
            display: flex;
            gap: 5px;
            z-index: 2;
        }

        .banner-dot {
            height: 4px;
            background: rgba(255,255,255,0.3);
            transition: all .4s ease;
            width: 4px;
            border-radius: 2px;
        }

        .banner-dot.active {
            width: 20px;
            background: #fff;
        }

        /* شريط التنقل السفلي */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            box-shadow: 0 -2px 15px rgba(0,0,0,0.05);
            border-radius: 25px 25px 0 0;
        }

        .nav-item {
            text-align: center;
            color: #b2bec3;
            font-size: 11px;
            text-decoration: none;
        }

        .nav-item.active { color: #0984e3; }
        .nav-icon { font-size: 22px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="app-container">
        <div class="header">
            <div>
                <div id="greeting" class="greeting-text">GOOD MORNING</div>
                <div class="user-name">Alex Rivera</div>
            </div>
            <div class="notif-box">
                <span class="dot"></span>
                <span>🔔</span>
            </div>
        </div>

        <div class="banner" id="banner">
            <div class="banner-slide active" style="background-image: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80');">
                <div class="banner-content">
                    <div class="banner-tag">Featured</div>
                    <div class="banner-title">Swiss Alps Adventure</div>
                </div>
            </div>
            
            <div class="banner-slide" style="background-image: url('https://images.unsplash.com/photo-1519046904884-53103b34b206?w=800&q=80');">
                <div class="banner-content">
                    <div class="banner-tag">Trending</div>
                    <div class="banner-title">Maldives Escape</div>
                </div>
            </div>

            <div class="banner-dots">
                <div class="banner-dot active"></div>
                <div class="banner-dot"></div>
            </div>
        </div>

        <div style="flex-grow: 1;"></div>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active"><span class="nav-icon">🏠</span>Home</a>
        <a href="#" class="nav-item"><span class="nav-icon">📍</span>Map</a>
        <a href="#" class="nav-item"><span class="nav-icon">🎬</span>Reels</a>
        <a href="#" class="nav-item"><span class="nav-icon">👤</span>Profile</a>
    </nav>

    <script>
        // التحية الذكية بالإنجليزية
        function updateGreeting() {
            const hours = new Date().getHours();
            const greeting = document.getElementById('greeting');
            if (hours < 12) greeting.innerText = "GOOD MORNING";
            else if (hours < 17) greeting.innerText = "GOOD AFTERNOON";
            else greeting.innerText = "GOOD EVENING";
        }
        updateGreeting();

        // منطق الـ Banner التفاعلي
        let slide = 0;
        const slides = document.querySelectorAll('.banner-slide');
        const dots = document.querySelectorAll('.banner-dot');

        setInterval(() => {
            slides[slide].classList.remove('active');
            dots[slide].classList.remove('active');
            slide = (slide + 1) % slides.length;
            slides[slide].classList.add('active');
            dots[slide].classList.add('active');
        }, 4000);
    </script>
</body>
</html>
