<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SIDAR TRAVEL — AI Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
  :root {
    --blue: #2A70DC; --ink: #0f1320; --white: #ffffff;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg,#fdfefe 0%,#e9f7ff 40%,#fff8ec 100%);
    padding: 20px;
  }

  /* Header Icons */
  header {
    position: fixed;
    top: 0; width: 100%;
    padding: 25px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 100;
  }
  .header-icon { font-size: 24px; color: var(--ink); cursor: pointer; opacity: 0.7; }

  /* Main Container */
  .chat-container {
    width: 100%;
    max-width: 700px;
    text-align: center;
  }

  .welcome-msg {
    font-size: 14px;
    font-weight: 600;
    color: var(--blue);
    letter-spacing: 1.5px;
    margin-bottom: 15px;
    text-transform: uppercase;
  }

  .logo-container { margin-bottom: 30px; }
  .logo-container img { width: 170px; height: auto; }

  /* AI Chat Panel */
  .ai-chat-panel {
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(15px);
    border-radius: 28px;
    padding: 10px;
    border: 1px solid rgba(0, 0, 0, 0.05);
    box-shadow: 0 10px 40px rgba(0,0,0,0.06);
    transition: all 0.4s ease;
  }

  .input-group {
    display: flex;
    align-items: center;
    background: #fff;
    border-radius: 22px;
    padding: 10px 15px;
  }

  .input-group input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 16px;
    padding: 8px 12px;
  }

  .send-btn {
    background: var(--ink);
    color: white;
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 15px;
    cursor: pointer;
    transition: 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .send-btn:hover { background: var(--blue); transform: scale(1.05); }

  /* Response Box */
  #response-area {
    margin-top: 20px;
    display: none; /* مخفي افتراضياً */
    text-align: left;
    background: #ffffff;
    padding: 20px;
    border-radius: 22px;
    border: 1px solid rgba(42, 112, 220, 0.1);
    box-shadow: 0 15px 30px rgba(0,0,0,0.05);
    animation: slideUp 0.5s ease;
  }

  .response-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    color: var(--blue);
    font-weight: 700;
    font-size: 14px;
  }

  .response-content {
    color: var(--ink);
    line-height: 1.6;
    font-size: 15px;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<header>
  <div class="header-icon"><i class="fas fa-bars"></i></div>
  <div class="header-icon"><i class="fas fa-bell"></i></div>
</header>

<main class="chat-container">
  <div class="welcome-msg">Ask Sidar Anything</div>
  
  <div class="logo-container">
    <img src="https://i.ibb.co/Q3p4gmYX/IMG-1629.png" alt="SIDAR TRAVEL">
  </div>

  <div class="ai-chat-panel">
    <div class="input-group">
      <input type="text" id="chatInput" placeholder="Ask Sidar about travel, hotels, or flights...">
      <button class="send-btn" onclick="handleSearch()">
        <i class="fas fa-arrow-up"></i>
      </button>
    </div>
  </div>

  <div id="response-area">
    <div class="response-header">
      <i class="fas fa-robot"></i> SIDAR AI RESPONSE
    </div>
    <div class="response-content" id="responseText">
      </div>
  </div>
</main>

<script>
  function handleSearch() {
    const input = document.getElementById('chatInput');
    const responseArea = document.getElementById('response-area');
    const responseText = document.getElementById('responseText');

    if (input.value.trim() !== "") {
      // محاكاة استجابة ذكية
      responseArea.style.display = 'block';
      responseText.innerHTML = "Searching for <b>" + input.value + "</b>... <br><br> Sidar AI is preparing the best travel options for you. Please wait a moment.";
      
      // يمكنك لاحقاً ربط هذا الجزء بأي API للأتمتة
      input.value = ""; 
    }
  }

  // السماح بالبحث عند الضغط على Enter
  document.getElementById("chatInput").addEventListener("keyup", function(event) {
    if (event.key === "Enter") {
      handleSearch();
    }
  });
</script>

</body>
</html>
