<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidarapp - Official</title>
    <style>
        :root {
            --primary-blue: #2563eb;
            --light-blue: #dbeafe;
            --nav-bg: rgba(255, 255, 255, 0.95);
            --text-main-color: #0f172a; 
            --accent-blue: #3b82f6; 
        }

        body, html { 
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, -apple-system, sans-serif;
            overflow-x: hidden;
            height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Background --- */
        .background-container {
            position: fixed; inset: 0; z-index: -1;
            background-image: url('https://plain-eeur-prod-public.komododecks.com/202604/19/FtJXvAZvXREKew6PJ3ew/image.png'); 
            background-size: cover; background-position: center;
        }
        
        .background-overlay {
            position: fixed; inset: 0; z-index: -1;
            background: rgba(255, 255, 255, 0.15); 
        }

        .app-container {
            height: 100vh; padding: 25px;
            display: flex; flex-direction: column;
            box-sizing: border-box;
        }

        /* --- Header --- */
        .header { height: 60px; display: flex; align-items: center; margin-bottom: 5px; }
        .menu-icon { background: white; padding: 12px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); cursor: pointer; }

        /* --- Main Content --- */
        .main-content {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; padding-top: 20px; text-align: center;
            overflow-y: auto; padding-bottom: 100px;
        }

        .hero-full-title { font-size: 32px; font-weight: 800; color: var(--text-main-color); margin-bottom: 25px; }
        .hero-full-title span.blue-text { color: var(--accent-blue); display: block; }

        /* --- Services Tabs --- */
        .services-tabs {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 12px; width: 100%; max-width: 500px; margin-bottom: 20px;
        }

        .tab-item {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px; padding: 15px 5px;
            display: flex; flex-direction: column; align-items: center;
            gap: 8px; cursor: pointer; transition: all 0.3s ease;
        }

        .tab-item.active {
            background: white;
            border-color: var(--primary-blue);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.1);
        }

        .icon-box { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .bg-esim { background: #eff6ff; color: #3b82f6; }
        .bg-events { background: #fef2f2; color: #ef4444; }
        .bg-change { background: #f0fdf4; color: #22c55e; }

        .tab-item span { font-size: 12px; font-weight: 700; color: #475569; }
        .tab-item.active span { color: var(--primary-blue); }

        /* --- Affiliate Script Container --- */
        .script-viewport {
            width: 100%; max-width: 500px; min-height: 300px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 24px; border: 1px dashed rgba(0,0,0,0.1);
            padding: 10px; display: none; /* مخفي افتراضياً */
            animation: fadeIn 0.5s ease;
        }

        .script-viewport.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Bottom Nav --- */
        .bottom-nav-container {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 420px; background: var(--nav-bg);
            backdrop-filter: blur(25px); padding: 8px 12px; border-radius: 30px;
            display: flex; justify-content: space-around; z-index: 100;
        }
    </style>
</head>
<body>

    <div class="background-container"></div>
    <div class="background-overlay"></div>
    
    <div class="app-container">
        <header class="header">
            <div class="menu-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </div>
        </header>

        <main class="main-content">
            <h1 class="hero-full-title">Your Journey <span class="blue-text">Starts Before</span> You Arrive.</h1>

            <div class="services-tabs">
                <div class="tab-item active" onclick="showService('esim-content', this)">
                    <div class="icon-box bg-esim">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M12 18h.01"/><path d="M9 7h6"/><path d="M9 11h6"/></svg>
                    </div>
                    <span>eSIM</span>
                </div>
                
                <div class="tab-item" onclick="showService('events-content', this)">
                    <div class="icon-box bg-events">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
                    </div>
                    <span>Events</span>
                </div>

                <div class="tab-item" onclick="showService('change-content', this)">
                    <div class="icon-box bg-change">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M16 8l-8 8"/><path d="M8 8l8 8"/></svg>
                    </div>
                    <span>Change</span>
                </div>
            </div>

            <div id="esim-content" class="script-viewport active">
                <p style="color: #64748b; font-size: 14px;">eSIM Affiliate Widget Loading...</p>
            </div>

            <div id="events-content" class="script-viewport">
                <p style="color: #64748b; font-size: 14px;">Tours & Events Widget Loading...</p>
            </div>

            <div id="change-content" class="script-viewport">
                <p style="color: #64748b; font-size: 14px;">Currency Exchange Widget Loading...</p>
            </div>
            
        </main>

        <nav class="bottom-nav-container">
            <div style="color: var(--primary-blue); font-weight: bold;">Home</div>
            <div style="color: #64748b;">Map</div>
            <div style="color: #64748b;">Reels</div>
            <div style="color: #64748b;">Profile</div>
        </nav>
    </div>

    <script>
        function showService(serviceId, element) {
            // إخفاء كل المحتويات
            document.querySelectorAll('.script-viewport').forEach(v => v.classList.remove('active'));
            // إزالة الحالة النشطة من كل التبويبات
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            
            // إظهار المحتوى المختار
            document.getElementById(serviceId).classList.add('active');
            // تفعيل التبويب المختار
            element.classList.add('active');
        }
    </script>
</body>
</html>
