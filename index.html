<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidarapp - Simple UI</title>
    <style>
        :root {
            --accent: #6c5ce7;
            --text-main: #1a1a1a;
            --text-sub: #8e8e8e;
            --bg-light: #f8faff;
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            background-color: var(--bg-light);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- الخلفية الثابتة --- */
        .background-container {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image: url('https://plain-eeur-prod-public.komododecks.com/202604/19/FtJXvAZvXREKew6PJ3ew/image.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* حركة الطائرة اللطيفة */
        .plane-shadow {
            position: absolute;
            width: 80px;
            fill: var(--accent);
            opacity: 0.1;
            animation: planeFly 40s linear infinite;
        }

        @keyframes planeFly {
            0% { transform: translate(-100px, 200px) rotate(25deg); }
            100% { transform: translate(110vw, -100px) rotate(25deg); }
        }

        /* --- الهيكل الرئيسي --- */
        .app-container {
            flex: 1;
            padding: 30px 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* لترك مسافة بين الترحيب والشريط */
            position: relative;
            z-index: 1;
        }

        /* --- الترحيب في الأعلى --- */
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        .greeting { 
            font-size: 14px; 
            color: var(--text-sub); 
            text-transform: uppercase; 
            font-weight: bold; 
            letter-spacing: 1px;
        }
        .user-name { 
            font-size: 32px; 
            font-weight: 800; 
            color: var(--text-main); 
            margin-top: 5px; 
        }
        .notif-icon { 
            background: rgba(255,255,255,0.8); 
            padding: 12px; 
            border-radius: 18px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
            backdrop-filter: blur(10px); 
            font-size: 20px;
        }

        /* --- شريط التنقل في الأسفل --- */
        .bottom-nav {
            margin-bottom: 25px;
            align-self: center;
            width: 85%;
            max-width: 360px; 
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            display: flex; 
            justify-content: space-around; 
            padding: 15px 0;
            border-radius: 35px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }
        .nav-item { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 50px; 
            height: 50px; 
            border-radius: 50%; 
            transition: 0.3s;
        }
        .nav-icon { 
            width: 26px; 
            height: 26px; 
            stroke: #b2bec3; 
            stroke-width: 2; 
            fill: none; 
        }
        .nav-item.active { 
            background: rgba(108, 92, 231, 0.1); 
        }
        .nav-item.active .nav-icon { 
            stroke: var(--accent); 
        }
    </style>
</head>
<body>

    <div class="background-container">
        <svg class="plane-shadow" viewBox="0 0 24 24"><path d="M21,16L14,11V5A2,2 0 0,0 12,3A2,2 0 0,0 10,5V11L3,16V18L10,15.7V21L8,22.5V24L12,23L16,24V22.5L14,21V15.7L21,18V16Z" /></svg>
    </div>

    <div class="app-container">
        <header class="header">
            <div>
                <div id="greeting" class="greeting">Loading...</div>
                <div class="user-name">Alex Rivera</div>
            </div>
            <div class="notif-icon">🔔</div>
        </header>

        <nav class="bottom-nav">
            <div class="nav-item active"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg></div>
            <div class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg></div>
            <div class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"></circle><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path></svg></div>
        </nav>
    </div>

    <script>
        // تحديث التحية بناءً على الوقت
        const hours = new Date().getHours();
        const g = document.getElementById('greeting');
        if (hours < 12) g.innerText = "Good Morning ☀️";
        else if (hours < 17) g.innerText = "Good Afternoon 🌤️";
        else g.innerText = "Good Evening ✨";
    </script>
</body>
</html>
