<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidarapp - Travel Home</title>
    <style>
        /* المتغيرات الأساسية والألوان الفاتحة */
        :root {
            --accent: #6c5ce7; /* لون الـ Purple النشط من الصورة */
            --nav-bg: #ffffff;
            --bg-light: #f8faff; /* خلفية فاتحة لراحة العين */
            --text-main: #1a1a1a;
            --text-sub: #8e8e8e;
        }

        body { 
            margin: 0; 
            background-color: var(--bg-light); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }

        /* حاوية التطبيق الرئيسية بمسافات مناسبة */
        .app-container {
            padding: 25px 20px 120px 20px; /* مسافة سفلية كافية للشريط */
        }

        /* --- قسم الترحيب العلوي (ثابت) --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .greeting-group { display: flex; flex-direction: column; }
        .greeting { 
            font-size: 12px; 
            color: var(--text-sub); 
            text-transform: uppercase; 
            font-weight: bold; 
            letter-spacing: 1px;
        }
        .user-name { 
            font-size: 28px; 
            font-weight: 800; 
            color: var(--text-main); 
            margin-top: 4px;
        }
        .notif-icon {
            background: white; 
            padding: 12px; 
            border-radius: 15px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.04);
            cursor: pointer;
        }

        /* --- البانر الإعلاني التفاعلي (الجديد) --- */
        .banner-carousel {
            height: 200px;
            position: relative;
            overflow: hidden;
            border-radius: 25px;
            box-shadow: 0 12px 25px rgba(0,0,0,0.07);
        }

        /* حاوية الصور */
        .slides-container {
            width: 100%;
            height: 100%;
            display: flex;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); /* تحريك سلس */
        }

        .slide {
            min-width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        /* طبقة تظليل خفيفة لقراءة النص */
        .slide::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.5), transparent 70%);
        }

        .slide-content {
            position: absolute;
            bottom: 25px;
            left: 20px;
            color: white;
            z-index: 2;
        }
        .slide-title { font-size: 24px; font-weight: 700; line-height: 1.2; }

        /* --- المؤشرات السفلية للبانر (Dots) --- */
        .banner-dots {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 10;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .dot.active {
            background-color: white;
            width: 20px; /* استطالة النقطة النشطة */
            border-radius: 4px;
        }

        /* --- شريط التنقل السفلي (ثابت ومتحرك) --- */
        .bottom-nav {
            position: fixed;
            bottom: 25px; 
            left: 50%;
            transform: translateX(-50%);
            width: 80%; 
            max-width: 340px; /* حجم أصغر ومناسب */
            background: var(--nav-bg);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        .nav-item {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* حركة جميلة */
        }

        .nav-icon {
            width: 24px;
            height: 24px;
            stroke: #b2bec3; /* لون غير نشط */
            stroke-width: 2;
            fill: none;
            transition: 0.3s;
        }

        /* تحريك قفزة للأعلى للأيقونة النشطة */
        .nav-item.active {
            background: rgba(108, 92, 231, 0.08);
            transform: translateY(-8px);
        }

        .nav-item.active .nav-icon {
            stroke: var(--accent);
            filter: drop-shadow(0 0 5px rgba(108, 92, 231, 0.3));
        }

        /* النقطة الصغيرة تحت الأيقونة النشطة */
        .nav-item.active::after {
            content: '';
            position: absolute;
            bottom: -6px;
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="header">
            <div class="greeting-group">
                <div id="greeting" class="greeting">GOOD MORNING</div>
                <div class="user-name">Alex Rivera</div>
            </div>
            <div class="notif-icon">🔔</div>
        </header>

        <section class="banner-carousel">
            <div class="slides-container" id="slidesContainer">
                <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800');">
                    <div class="slide-content">
                        <div class="slide-title">Swiss Alps<br>Adventure</div>
                    </div>
                </div>
                <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1519046904884-53103b34b206?w=800');">
                    <div class="slide-content">
                        <div class="slide-title">Maldives<br>Luxury Escape</div>
                    </div>
                </div>
                <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1555400538-5fd41fe3e7e4?w=800');">
                    <div class="slide-content">
                        <div class="slide-title">Tokyo<br>City Tour</div>
                    </div>
                </div>
            </div>

            <div class="banner-dots">
                <div class="dot active" onclick="goToSlide(0)"></div>
                <div class="dot" onclick="goToSlide(1)"></div>
                <div class="dot" onclick="goToSlide(2)"></div>
            </div>
        </section>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="setActive(this)">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
        </div>
        <div class="nav-item" onclick="setActive(this)">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M1 6v16l7-4 8 4 7-4V2l-7 4-8-4-7 4z"></path></svg>
        </div>
        <div class="nav-item" onclick="setActive(this)">
            <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"></circle><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path></svg>
        </div>
    </nav>

    <script>
        // --- أولاً: تحضير العناصر العامة ---
        const greetingText = document.getElementById('greeting');
        const userName = "Alex Rivera"; // يمكن جلبها ديناميكياً لاحقاً

        // --- ثانياً: منطق التحية الذكية بالإنجليزية ---
        function updateGreeting() {
            const hours = new Date().getHours();
            if (hours < 12) greetingText.innerText = "GOOD MORNING";
            else if (hours < 17) greetingText.innerText = "GOOD AFTERNOON";
            else greetingText.innerText = "GOOD EVENING";
        }
        updateGreeting();

        // --- ثالثاً: منطق البانر التفاعلي (Carousel) ---
        let currentSlide = 0;
        const totalSlides = 3; // عدد الصور
        const container = document.getElementById('slidesContainer');
        const dots = document.querySelectorAll('.dot');

        // دالة للانتقال لصورة محددة
        function goToSlide(slideIndex) {
            currentSlide = slideIndex;
            // تحريك الحاوية أفقياً بناءً على المؤشر
            container.style.transform = `translateX(-${currentSlide * 100}%)`;
            
            // تحديث حالة النقاط (Dots)
            dots.forEach(dot => dot.classList.remove('active'));
            dots[currentSlide].classList.add('active');
        }

        // دالة للانتقال التلقائي كل 4 ثوانٍ
        function autoSlide() {
            currentSlide = (currentSlide + 1) % totalSlides;
            goToSlide(currentSlide);
        }

        // تشغيل المؤقت التلقائي
        let slideInterval = setInterval(autoSlide, 4000);

        // إعادة ضبط المؤقت عند النقر اليدوي على النقاط
        function resetInterval() {
            clearInterval(slideInterval);
            slideInterval = setInterval(autoSlide, 4000);
        }
        
        // إضافة مستمعي النقر للنقاط اليدوية
        dots.forEach((dot, index) => {
            dot.addEventListener('click', () => {
                goToSlide(index);
                resetInterval();
            });
        });

        // --- رابعاً: تحريك شريط التنقل السفلي عند النقر ---
        function setActive(clickedItem) {
            // إزالة حالة النشاط من جميع العناصر
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            // إضافة حالة النشاط للعنصر الذي تم النقر عليه
            clickedItem.classList.add('active');
        }
    </script>
</body>
</html>
