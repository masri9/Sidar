<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SIDAR TRAVEL — Welcome</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
  :root {
    --blue: #2A70DC; --ink: #0f1320; --white: #ffffff;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'Inter', 'Tajawal', sans-serif;
    min-height: 100vh;
    background:
      radial-gradient(900px 600px at 12% -8%, rgba(255,232,149,.55), transparent 65%),
      radial-gradient(900px 600px at 90% -10%, rgba(0,199,183,.40), transparent 70%),
      radial-gradient(700px 520px at 0% 80%, rgba(255,122,26,.18), transparent 70%),
      radial-gradient(700px 520px at 100% 85%, rgba(42,112,220,.30), transparent 70%),
      linear-gradient(180deg,#fdfefe 0%,#e9f7ff 40%,#fff8ec 100%);
    overflow-x: hidden;
  }

  /* Header */
  header {
    position: absolute;
    top: 0; width: 100%;
    padding: 25px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 100;
  }
  .header-icon { font-size: 24px; color: var(--ink); cursor: pointer; }

  /* Hero Section */
  .hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: 120px; /* مسافة كافية تحت الهيدر */
    min-height: 100vh;
    z-index: 10;
    position: relative;
    text-align: center;
  }

  /* الجملة الترحيبية */
  .welcome-text {
    font-size: 18px;
    font-weight: 600;
    color: var(--blue);
    letter-spacing: 1px;
    margin-bottom: 20px;
    text-transform: uppercase;
    animation: fadeInDown 0.8s ease-out;
  }

  .logo-container {
    margin-bottom: 35px;
    animation: fadeIn 1s ease-out;
  }
  .logo-container img { width: 200px; height: auto; }

  /* AI Chat Box */
  .ai-chat-box {
    width: min(90%, 650px);
    background: rgba(255, 255, 255, 0.6);
    backdrop-filter: blur(20px);
    border-radius: 30px;
    padding: 8px;
    border: 1px solid rgba(255, 255, 255, 0.4);
    box-shadow: 0 15px 35px rgba(0,0,0,0.05);
  }

  .chat-input-wrapper {
    display: flex;
    align-items: center;
    background: #fff;
    border-radius: 25px;
    padding: 10px 18px;
  }

  .chat-input-wrapper input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 16px;
    padding: 5px;
  }

  .send-btn {
    background: var(--ink);
    color: white;
    border: none;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    cursor: pointer;
    transition: 0.3s;
  }
  .send-btn:hover { background: var(--blue); }

  /* Waves */
  .waves-wrap {
    position: fixed; inset-inline: 0; bottom: -5px; height: 200px;
    pointer-events: none; z-index: 1;
  }
  .wave-layer {
    position: absolute; left: -40%; width: 180%; height: 120px;
    border-radius: 40%; opacity: .8; animation: waveMove 20s linear infinite;
  }
  .wave-1 { bottom: 0; background: linear-gradient(90deg,rgba(42,112,220,0.8),rgba(0,199,183,0.7)); }
  .wave-2 { bottom: 30px; background: linear-gradient(90deg,rgba(0,199,183,0.7),rgba(255,232,149,0.8)); animation-duration: 25s; animation-direction: reverse; }

  @keyframes waveMove { 0% { transform: translateX(0); } 100% { transform: translateX(25%); } }
  @keyframes fadeInDown { from { opacity: 0; transform: translateY(-15px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>

<header>
  <div class="header-icon"><i class="fas fa-bars"></i></div> <div class="header-icon"><i class="fas fa-bell"></i></div> </header>

<div class="waves-wrap">
  <div class="wave-layer wave-1"></div>
  <div class="wave-layer wave-2"></div>
</div>

<section class="hero">
  <div class="welcome-text">Explore Your Next Adventure</div>

  <div class="logo-container">
    <img src="https://i.ibb.co/Q3p4gmYX/IMG-1629.png" alt="SIDAR TRAVEL">
  </div>

  <div class="ai-chat-box">
    <div class="chat-input-wrapper">
      <input type="text" placeholder="Where do you want to go?">
      <button class="send-btn"><i class="fas fa-arrow-up"></i></button>
    </div>
  </div>
</section>

</body>
</html>
