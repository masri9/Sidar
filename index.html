<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidarapp - Final Version</title>
    <style>
        :root {
            --primary-blue: #2563eb;
            --light-blue: #dbeafe;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --nav-bg: rgba(255, 255, 255, 0.95);
        }

        body, html { 
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* --- 1. شاشة الـ Splash (ثابتة) --- */
        #splash-screen {
            position: fixed; inset: 0; background: #ffffff;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            transition: opacity 1s ease, visibility 1s;
        }
        .splash-image { width: 180px; height: auto; animation: splashPulse 2s infinite ease-in-out; }
        @keyframes splashPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* --- 2. واجهة الـ Home --- */
        .background-container {
            position: fixed; inset: 0; z-index: -1;
            background-image: url('https://plain-eeur-prod-public.komododecks.com/202604/19/6uv75dbjqW2zwfkHuGPq/image.png'); 
            background-size: cover; background-position: center;
        }

        .app-container {
            height: 100vh; padding: 25px 20px;
            display: flex; flex-direction: column;
            box-sizing: border-box; opacity: 0; 
            transition: opacity 1s ease;
        }

        /* الهيدر */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .greeting { font-size: 13px; color: var(--text-sub); font-weight: 700; }
        .user-name { font-size: 26px; font-weight: 800; color: var(--text-main); }
        .notif-icon { background: white; padding: 10px; border-radius: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        /* البانر الإعلاني المتحرك */
        .promo-slider {
            width: 100%; height: 150px; border-radius: 25px;
            overflow: hidden; position: relative; margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .slides-wrapper { display: flex; width: 300%; height: 100%; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .promo-slide { width: 100%; height: 100%; background-size: cover; background-position: center; }

        /* قسم الخدمات بالأيقونات الجديدة */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .service-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 22px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.6);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .service-card:active { transform: scale(0.9); }

        .icon-box {
            position: relative; width: 50px; height: 50px;
            margin-bottom: 12px; display: flex; justify-content: center; align-items: center;
        }

        .icon-bg {
            position: absolute; width: 100%; height: 100%;
            background: var(--light-blue); border-radius: 16px;
            transform: rotate(-10deg);
        }

        .service-card svg { position: relative; width: 26px; height: 26px; color: var(--primary-blue); z-index: 2; }
        .service-name { font-size: 13px; font-weight: 700; color: var(--text-main); }

        /* شريط التنقل السفلي الثابت */
        .bottom-nav-container {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 420px;
            background: var(--nav-bg); backdrop-filter: blur(25px);
            padding: 8px 12px; border-radius: 30px;
            display: flex; justify-content: space-around; align-items: center;
            box-shadow: 0 15px 35px rgba(37, 99, 235, 0.15);
            border: 1px solid rgba(255,255,255,0.3);
        }
        .nav-item { display: flex; align-items: center; padding: 10px 16px; cursor: pointer; border-radius: 22px; color: var(--text-sub); transition: 0.3s; }
        .nav-item.active { background: var(--light-blue); color: var(--primary-blue); }
        .nav-text { max-width: 0; overflow: hidden; white-space: nowrap; font-size: 14px; font-weight: 700; transition: 0.4s; opacity: 0; }
        .nav-item.active .nav-text { max-width: 80px; margin-left: 10px; opacity: 1; }

    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="https://plain-eeur-prod-public.komododecks.com/202604/19/y0zyi6uOKg2CaNATvHPZ/image.png" alt="Logo" class="splash-image">
    </div>

    <div class="background-container"></div>
    <div class="app-container" id="main-app">
        <header class="header">
            <div>
                <div id="greeting" class="greeting">WELCOME BACK</div>
                <div class="user-name">Alex Rivera</div>
            </div>
            <div class="notif-icon">🔔</div>
        </header>

        <div class="promo-slider">
            <div class="slides-wrapper" id="slidesWrapper">
                <div class="promo-slide" style="background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=800');"></div>
                <div class="promo-slide" style="background-image: url('https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?w=800');"></div>
                <div class="promo-slide" style="background-image: url('https://images.unsplash.com/photo-1502602898657-3e9172f29b78?w=800');"></div>
            </div>
        </div>

        <div class="services-grid">
            <div class="service-card">
                <div class="icon-box">
                    <div class="icon-bg"></div>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><path d="M12 18h.01"></path></svg>
                </div>
                <span class="service-name">eSIM</span>
            </div>
            <div class="service-card">
                <div class="icon-box">
                    <div class="icon-bg"></div>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path></svg>
                </div>
                <span class="service-name">Events</span>
            </div>
            <div class="service-card">
                <div class="icon-box">
                    <div class="icon-bg"></div>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                </div>
                <span class="service-name">Exchange</span>
            </div>
        </div>

        <nav class="bottom-nav-container">
            <div class="nav-item active" onclick="setActive(this)">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
                <span class="nav-text">Home</span>
            </div>
            <div class="nav-item" onclick="setActive(this)">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon></svg>
                <span class="nav-text">Map</span>
            </div>
            <div class="nav-item" onclick="setActive(this)">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"></rect><path d="M10 8l6 4-6 4V8z"></path></svg>
                <span class="nav-text">Reels</span>
            </div>
            <div class="nav-item" onclick="setActive(this)">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                <span class="nav-text">Profile</span>
            </div>
        </nav>
    </div>

    <script>
        // التحكم بالـ Splash
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                document.getElementById('splash-screen').style.visibility = 'hidden';
                document.getElementById('main-app').style.opacity = '1';
            }, 2500);
        });

        // تحريك البانر
        let currentSlide = 0;
        setInterval(() => {
            currentSlide = (currentSlide + 1) % 3;
            document.getElementById('slidesWrapper').style.transform = `translateX(-${currentSlide * 33.33}%)`;
        }, 4000);

        function setActive(el) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
        }

        // تحية الوقت
        const hours = new Date().getHours();
        const g = document.getElementById('greeting');
        if (hours < 12) g.innerText = "GOOD MORNING ☀️";
        else if (hours < 17) g.innerText = "GOOD AFTERNOON 🌤️";
        else g.innerText = "GOOD EVENING ✨";
    </script>
</body>
</html>
