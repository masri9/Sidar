<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sidarapp - Services Widget</title>
    
    <style>
        :root {
            --primary-lava: #ff4500; 
            --lava-glow: rgba(255, 69, 0, 0.4); 
            --text-main: #0f172a; 
        }

        .lava-text { color: var(--primary-lava); font-weight: 700; }

        body, html { 
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-page { display: none; animation: slideUp 0.4s ease-out; }
        .app-page.active { display: block; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #splash-screen {
            position: fixed; inset: 0; background: #ffffff;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.5s ease;
        }
        .splash-image { width: 180px; }

        .header-bg {
            position: absolute; top: 0; left: 0; right: 0; height: 55vh;
            background-size: cover; background-position: center; z-index: 0;
        }

        .app-container {
            position: relative; z-index: 1;
            padding: 90px 0 120px;
            box-sizing: border-box;
        }

        .hero-section { position: relative; margin-bottom: 35px; padding: 0 20px; }
        .hero-title { font-size: 34px; font-weight: 800; line-height: 1.1; color: var(--text-main); margin-bottom: 25px; }

        .sidar-robot {
            position: absolute; right: 15px; top: -20px; width: 120px; z-index: 10;
            filter: drop-shadow(0 0 15px var(--lava-glow));
            animation: robotFloat 3s ease-in-out infinite;
        }

        @keyframes robotFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .search-wrapper {
            background: rgba(255,255,255,0.9); backdrop-filter: blur(15px);
            border-radius: 20px; padding: 12px 18px; display: flex; align-items: center;
            border: 2px solid var(--primary-lava); margin: 0 20px 40px; position: relative;
        }
        .search-wrapper input { flex: 1; border: none; background: transparent; outline: none; font-size: 16px; color: var(--text-main); }

        .section-header { display: flex; justify-content: space-between; align-items: flex-end; margin: 30px 0 15px; padding: 0 20px; }
        .section-header h3 { font-size: 22px; font-weight: 900; color: var(--text-main); margin: 0; }

        .services-scroll-container {
            display: flex; gap: 10px; overflow-x: auto; padding: 0 20px 15px; scrollbar-width: none;
        }
        .services-scroll-container::-webkit-scrollbar { display: none; }
        
        .service-pill {
            display: flex; align-items: center; background: #ffffff; border: 1.5px solid #f1f5f9;
            padding: 10px 20px; border-radius: 50px; flex-shrink: 0; cursor: pointer; transition: 0.2s;
        }
        .service-pill:active { transform: scale(0.95); }
        .service-pill.active { border-color: var(--primary-lava); color: var(--primary-lava); background: rgba(255, 69, 0, 0.05); }

        /* --- Service Widget (Modal) --- */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px);
            z-index: 10000; display: none; justify-content: center; align-items: flex-end;
        }
        .modal-content {
            background: #fff; width: 100%; border-radius: 40px 40px 0 0; 
            padding: 40px 25px; box-sizing: border-box;
            transform: translateY(100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; text-align: center;
        }
        .modal-overlay.open { display: flex; }
        .modal-overlay.open .modal-content { transform: translateY(0); }

        .modal-handle { width: 40px; height: 5px; background: #e2e8f0; border-radius: 10px; margin: -20px auto 30px; }
        .service-icon-large { font-size: 50px; margin-bottom: 15px; display: block; }
        .modal-title { font-size: 24px; font-weight: 800; color: var(--text-main); margin-bottom: 10px; }
        .modal-desc { color: #64748b; line-height: 1.6; margin-bottom: 25px; }
        
        .action-btn {
            background: var(--primary-lava); color: #fff; border: none; width: 100%;
            padding: 18px; border-radius: 20px; font-weight: 700; font-size: 16px;
            box-shadow: 0 10px 20px var(--lava-glow); cursor: pointer;
        }
        /* ------------------------------ */

        .stacked-cards-wrapper { position: relative; width: 100%; height: 260px; display: flex; justify-content: center; align-items: center; perspective: 1200px; margin-top: 30px; }
        .card-item { position: absolute; width: 200px; height: 240px; border-radius: 30px; background-size: cover; background-position: center; transition: all 0.7s cubic-bezier(0.34, 1.56, 0.64, 1); opacity: 0; pointer-events: none; }
        .card-item.active { opacity: 1; transform: translateX(0) translateZ(50px); z-index: 10; pointer-events: auto; }
        .card-item.prev { opacity: 0.4; transform: translateX(-100px) translateZ(-100px) scale(0.8); }
        .card-item.next { opacity: 0.4; transform: translateX(100px) translateZ(-100px) scale(0.8); }

        .dots-container { display: flex; justify-content: center; gap: 8px; margin-top: 15px; }
        .dot { width: 6px; height: 6px; background: #e2e8f0; border-radius: 50%; transition: 0.4s; }
        .dot.active { background: var(--primary-lava); width: 15px; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="splash-screen"><img id="splashLogo" src="" class="splash-image"></div>
    <div class="header-bg" id="heroBg"></div>

    <div class="app-container" id="main-app" style="opacity: 0;">
        
        <div id="home-page" class="app-page active">
            <div class="hero-section">
                <img src="https://plain-eeur-prod-public.komododecks.com/202604/20/zpRwsd9YMgeCmtSTOjFQ/image.png" class="sidar-robot">
                <h1 class="hero-title">Where do you <br><span>wanna go?</span></h1>
            </div>

            <div class="search-wrapper">
                <input type="text" placeholder="Ask Sidar anything...">
            </div>

            <div class="section-header"><h3>Our Services</h3></div>
            <div class="services-scroll-container">
                <div class="service-pill" onclick="openService('events')"><span>🎟️ Events</span></div>
                <div class="service-pill" onclick="openService('esim')"><span>📶 eSIM</span></div>
                <div class="service-pill" onclick="openService('currency')"><span>💱 Currency</span></div>
                <div class="service-pill" onclick="openService('transfer')"><span>💸 Transfer</span></div>
            </div>

            <div class="stacked-cards-wrapper" id="cardsWrapper">
                <div class="card-item" id="card0"></div>
                <div class="card-item" id="card1"></div>
                <div class="card-item" id="card2"></div>
                <div class="card-item" id="card3"></div>
            </div>
            <div class="dots-container" id="dotsContainer"></div>
        </div>
    </div>

    <div class="modal-overlay" id="serviceModal" onclick="closeService()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-handle"></div>
            <span class="service-icon-large" id="modalIcon"></span>
            <h2 class="modal-title" id="modalTitle"></h2>
            <p class="modal-desc" id="modalDesc"></p>
            <button class="action-btn" id="modalBtn">Go to Service</button>
        </div>
    </div>

    <script>
        const MY_IMAGES = {
            splashLogo: 'https://plain-eeur-prod-public.komododecks.com/202604/19/y0zyi6uOKg2CaNATvHPZ/image.png',
            heroBackground: 'https://plain-eeur-prod-public.komododecks.com/202604/19/FtJXvAZvXREKew6PJ3ew/image.png',
            card0: 'https://plain-eeur-prod-public.komododecks.com/202604/19/Zs148rIHaZ5l8sjqw4S4/image.png',
            card1: 'https://plain-eeur-prod-public.komododecks.com/202604/19/xK3pwCpVUtFZFveFLbt2/image.png',
            card2: 'https://plain-eeur-prod-public.komododecks.com/202604/19/Ri6ookm2NesWdMC7Mcbc/image.png',
            card3: 'https://plain-eeur-prod-public.komododecks.com/202604/19/qzr51sWPt6GgM3gTZH8K/image.png'
        };

        const SERVICE_DATA = {
            events: { title: "Events & Festivals", icon: "🎟️", desc: "Discover the best local events, concerts, and hidden festivals around you.", btn: "Book Tickets" },
            esim: { title: "International eSIM", icon: "📶", desc: "Stay connected anywhere in the world with our instant digital SIM cards.", btn: "View Plans" },
            currency: { title: "Currency Exchange", icon: "💱", desc: "Real-time exchange rates and the best places to swap your cash safely.", btn: "Check Rates" },
            transfer: { title: "Money Transfer", icon: "💸", desc: "Send money across borders instantly with the lowest fees in the market.", btn: "Start Transfer" }
        };

        function openService(type) {
            const data = SERVICE_DATA[type];
            document.getElementById('modalIcon').innerText = data.icon;
            document.getElementById('modalTitle').innerText = data.title;
            document.getElementById('modalDesc').innerText = data.desc;
            document.getElementById('modalBtn').innerText = data.btn;
            
            document.getElementById('serviceModal').classList.add('open');
        }

        function closeService() {
            document.getElementById('serviceModal').classList.remove('open');
        }

        // Card logic and Splash
        let currentIndex = 0;
        const cards = document.querySelectorAll('.card-item');

        function updateCards() {
            cards.forEach((card, i) => {
                card.classList.remove('active', 'prev', 'next');
                if (i === currentIndex) card.classList.add('active');
                else if (i === (currentIndex - 1 + cards.length) % cards.length) card.classList.add('prev');
                else if (i === (currentIndex + 1) % cards.length) card.classList.add('next');
            });
            document.querySelectorAll('.dot').forEach((dot, i) => dot.classList.toggle('active', i === currentIndex));
        }

        window.addEventListener('load', () => {
            document.getElementById('splashLogo').src = MY_IMAGES.splashLogo;
            document.getElementById('heroBg').style.backgroundImage = `url('${MY_IMAGES.heroBackground}')`;
            cards.forEach((c, i) => c.style.backgroundImage = `url('${MY_IMAGES['card'+i]}')`);
            
            const dotsContainer = document.getElementById('dotsContainer');
            cards.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = `dot ${i === 0 ? 'active' : ''}`;
                dotsContainer.appendChild(dot);
            });

            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash-screen').style.display = 'none';
                    document.getElementById('main-app').style.opacity = '1';
                    updateCards();
                }, 500);
            }, 2000);
        });

        setInterval(() => { currentIndex = (currentIndex + 1) % cards.length; updateCards(); }, 4000);
    </script>
</body>
</html>
