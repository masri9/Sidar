<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidarapp - Professional Nav</title>
    <style>
        :root {
            /* درجات الأزرق الاحترافية */
            --primary-blue: #2563eb;
            --light-blue: #dbeafe;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --nav-bg: rgba(255, 255, 255, 0.95);
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- الخلفية --- */
        .background-container {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image: url('https://plain-eeur-prod-public.komododecks.com/202604/19/FtJXvAZvXREKew6PJ3ew/image.png'); 
            background-size: cover;
            background-position: center;
        }

        .app-container {
            flex: 1;
            padding: 30px 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* --- الترحيب --- */
        .header { display: flex; justify-content: space-between; align-items: center; }
        .greeting { font-size: 14px; color: var(--text-sub); font-weight: 600; letter-spacing: 0.5px; }
        .user-name { font-size: 28px; font-weight: 800; color: var(--text-main); margin-top: 4px; }
        .notif-icon { 
            background: white; 
            padding: 12px; 
            border-radius: 16px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            cursor: pointer;
        }

        /* --- شريط التنقل الاحترافي --- */
        .bottom-nav-container {
            align-self: center;
            margin-bottom: 30px;
            width: 92%;
            max-width: 420px;
            background: var(--nav-bg);
            backdrop-filter: blur(25px);
            padding: 8px 12px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(37, 99, 235, 0.15);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .nav-item {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 16px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 22px;
            color: var(--text-sub);
            position: relative;
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
            stroke: currentColor;
            stroke-width: 2.2;
            fill: none;
            transition: all 0.3s;
        }

        /* الحالة النشطة باللون الأزرق */
        .nav-item.active {
            background: var(--light-blue);
            color: var(--primary-blue);
        }

        .nav-item.active svg {
            stroke: var(--primary-blue);
            transform: scale(1.1);
        }

        /* ظهور النص */
        .nav-text {
            max-width: 0;
            overflow: hidden;
            white-space: nowrap;
            font-size: 14px;
            font-weight: 700;
            margin-left: 0;
            transition: all 0.4s ease;
            opacity: 0;
        }

        .nav-item.active .nav-text {
            max-width: 80px;
            margin-left: 10px;
            opacity: 1;
        }

        /* أيقونة الريلز المخصصة */
        .reels-icon-inner {
            fill: currentColor;
            opacity: 0;
            transition: 0.3s;
        }
        .nav-item.active .reels-icon-inner {
            opacity: 0.2;
        }

    </style>
</head>
<body>

    <div class="background-container"></div>

    <div class="app-container">
        <header class="header">
            <div>
                <div id="greeting" class="greeting">WELCOME BACK</div>
                <div class="user-name">Alex Rivera</div>
            </div>
            <div class="notif-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
            </div>
        </header>

        <nav class="bottom-nav-container">
            <div class="nav-item active" onclick="setActive(this, 'Home')">
                <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                <span class="nav-text">Home</span>
            </div>

            <div class="nav-item" onclick="setActive(this, 'Map')">
                <svg viewBox="0 0 24 24"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon><line x1="8" y1="2" x2="8" y2="18"></line><line x1="16" y1="6" x2="16" y2="22"></line></svg>
                <span class="nav-text">Map</span>
            </div>

            <div class="nav-item" onclick="setActive(this, 'Reels')">
                <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path class="reels-icon-inner" d="M10 8l6 4-6 4V8z"></path><line x1="2" y1="12" x2="22" y2="12"></line><line x1="7" y1="2" x2="7" y2="22"></line><line x1="17" y1="2" x2="17" y2="22"></line></svg>
                <span class="nav-text">Reels</span>
            </div>

            <div class="nav-item" onclick="setActive(this, 'Profile')">
                <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                <span class="nav-text">Profile</span>
            </div>
        </nav>
    </div>

    <script>
        function setActive(el, name) {
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            el.classList.add('active');
            console.log("Navigated to: " + name);
        }

        const hours = new Date().getHours();
        const g = document.getElementById('greeting');
        if (hours < 12) g.innerText = "GOOD MORNING ☀️";
        else if (hours < 17) g.innerText = "GOOD AFTERNOON 🌤️";
        else g.innerText = "GOOD EVENING ✨";
    </script>
</body>
</html>
