<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>VOYAGR — Premium Travel</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060810;
    --card: rgba(16,22,46,0.72);
    --border: rgba(120,100,255,0.13);
    --neon-p: #a259ff;
    --neon-b: #3ecfff;
    --grad: linear-gradient(135deg, #a259ff 0%, #3ecfff 100%);
    --text: #f0f0ff;
    --muted: rgba(200,200,255,0.45);
    --glass: rgba(14,20,48,0.65);
    --r: 20px;
  }
  
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);overflow:hidden;}

  .phone-shell{
    position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background: radial-gradient(ellipse 80% 60% at 50% 20%, rgba(162,89,255,0.09) 0%, transparent 70%), #040608;
  }
  
  .phone{
    width:390px;height:844px;
    background:var(--bg);
    border-radius:50px;
    border:1.5px solid rgba(120,100,255,0.25);
    box-shadow:0 40px 120px rgba(0,0,0,0.9);
    overflow:hidden;position:relative;display:flex;flex-direction:column;
  }

  .island{
    position:absolute;top:13px;left:50%;transform:translateX(-50%);
    width:126px;height:37px;background:#000;border-radius:20px;z-index:100;
    box-shadow:0 0 0 1.5px rgba(255,255,255,0.06);
  }

  .screens{display:flex;flex:1;position:relative;overflow:hidden;}
  .screen{
    position:absolute;inset:0;display:flex;flex-direction:column;
    opacity:0;pointer-events:none;transition:opacity .35s ease;
  }
  .screen.active{opacity:1;pointer-events:all;}

  .scroll-area{flex:1;overflow-y:auto;padding-bottom:100px;padding-top:60px;}
  .scroll-area::-webkit-scrollbar{display:none;}

  /* --- الملاحة السفلية المحدثة --- */
  .nav-bar{
    position:absolute;bottom:0;left:0;right:0;height:90px;z-index:50;
    background: rgba(8, 11, 24, 0.85);
    backdrop-filter: blur(20px);
    border-top: 1px solid rgba(255,255,255,0.05);
    display:flex;align-items:center;justify-content:space-around;
    padding: 0 15px 20px;
  }
  
  .nav-item{
    display:flex;flex-direction:column;align-items:center;gap:6px;
    cursor:pointer;flex:1;transition: 0.3s;
  }
  
  .nav-item svg{
    width:24px;height:24px;
    stroke: var(--muted);
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  
  .nav-item span{font-size:10px;font-weight:600;color:var(--muted); transition: 0.3s;}
  
  /* حالة التفعيل */
  .nav-item.active svg{
    stroke: var(--neon-p);
    transform: translateY(-5px);
    filter: drop-shadow(0 0 8px var(--neon-p));
  }
  .nav-item.active span{color: var(--text); opacity: 1;}

  /* --- قسم الخدمات الجديد (Events & eSIM) --- */
  .services-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    padding: 20px;
  }
  
  .service-box {
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: 0.3s;
  }
  
  .service-box:active { transform: scale(0.96); background: rgba(162,89,255,0.1); }
  
  .service-icon {
    width: 40px; height: 40px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    background: var(--grad);
  }
  
  .service-info h4 { font-size: 13px; font-weight: 700; color: #fff; }
  .service-info p { font-size: 10px; color: var(--muted); }

  /* --- البانر --- */
  .banner{
    margin:0 20px;position:relative;height:180px;overflow:hidden;border-radius:var(--r);
  }
  .banner-slide{
    position:absolute;inset:0;opacity:0;transition:opacity .9s ease;
    background-size:cover;background-position:center;
  }
  .banner-slide.active{opacity:1;}
  .banner-content{position:absolute;bottom:15px;left:15px;z-index:2;}
  .banner-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#fff;}

  .home-greeting{display:flex;justify-content:space-between;align-items:center;padding:20px 20px 10px;}
  .name{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

</style>
</head>
<body>

<div class="phone-shell">
  <div class="phone">
    <div class="island"></div>
    
    <div class="screens">
      <div class="screen active" id="screen-home">
        <div class="scroll-area">
          <div class="home-greeting">
            <div class="greeting-text">
              <div style="font-size:12px; color:var(--muted)">Welcome back,</div>
              <div class="name">Alex Rivera</div>
            </div>
          </div>

          <div class="banner">
            <div class="banner-slide active" style="background-image:url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80')">
              <div class="banner-content"><div class="banner-title">Swiss Alps Adventure</div></div>
            </div>
          </div>

          <div class="services-row">
            <div class="service-box">
              <div class="service-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path><line x1="4" y1="22" x2="4" y2="15"></line></svg>
              </div>
              <div class="service-info">
                <h4>Events</h4>
                <p>Book activities</p>
              </div>
            </div>
            
            <div class="service-box">
              <div class="service-icon" style="background: var(--grad)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>
              </div>
              <div class="service-info">
                <h4>eSIM</h4>
                <p>Global data</p>
              </div>
            </div>
          </div>

          <div style="padding: 0 20px; font-weight: 800; font-family: 'Syne'; margin-bottom: 10px;">Travel Feed</div>
          <div style="margin: 0 20px; height: 150px; background: var(--glass); border-radius: 15px; border: 1px solid var(--border);"></div>
        </div>
      </div>

      <div class="screen" id="screen-map">
        <div style="display:flex; align-items:center; justify-content:center; height:100%">Map Content</div>
      </div>

      <div class="screen" id="screen-reels">
        <div style="display:flex; align-items:center; justify-content:center; height:100%">Reels Content</div>
      </div>

      <div class="screen" id="screen-profile">
        <div style="display:flex; align-items:center; justify-content:center; height:100%">Profile Content</div>
      </div>
    </div>

    <nav class="nav-bar">
      <div class="nav-item active" onclick="switchTab(this,'home')">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        <span>Home</span>
      </div>
      <div class="nav-item" onclick="switchTab(this,'map')">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon>
          <line x1="8" y1="2" x2="8" y2="18"></line>
          <line x1="16" y1="6" x2="16" y2="22"></line>
        </svg>
        <span>Map</span>
      </div>
      <div class="nav-item" onclick="switchTab(this,'reels')">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
          <path d="M10 8l6 4-6 4V8z"></path>
        </svg>
        <span>Reels</span>
      </div>
      <div class="nav-item" onclick="switchTab(this,'profile')">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
        <span>Profile</span>
      </div>
    </nav>

  </div>
</div>

<script>
  function switchTab(el, screen) {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-'+screen).classList.add('active');
  }
</script>

</body>
</html>
