<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidarapp - AI Experience</title>
    <style>
        :root {
            --primary-blue: #2563eb;
            --text-dark: #0f172a;
            --text-gray: #475569;
            --nav-bg: rgba(255, 255, 255, 0.95);
        }

        body, html { 
            margin: 0; padding: 0;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            height: 100vh;
            background: #fff;
        }

        /* --- شاشة الـ Splash --- */
        #splash-screen {
            position: fixed; inset: 0; background: #ffffff;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            transition: opacity 1s ease, visibility 1s;
        }
        .splash-image { width: 140px; filter: grayscale(1); opacity: 0.8; }

        /* --- الخلفية --- */
        .background-container {
            position: fixed; inset: 0; z-index: -1;
            background-image: url('https://plain-eeur-prod-public.komododecks.com/202604/19/FtJXvAZvXREKew6PJ3ew/image.png'); 
            background-size: cover; background-position: center;
        }
        
        .background-overlay {
            position: fixed; inset: 0; z-index: -1;
            background: linear-gradient(to bottom, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.8) 100%);
        }

        .app-container {
            height: 100vh; padding: 20px;
            display: flex; flex-direction: column;
            box-sizing: border-box; opacity: 0; 
            transition: opacity 1.5s ease;
        }

        /* --- Header --- */
        .header {
            display: flex; align-items: center; height: 60px;
        }
        .menu-icon {
            background: white; padding: 12px; border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); cursor: pointer;
        }

        /* --- المحتوى الرئيسي (Typography) --- */
        .main-content {
            flex: 1;
            display: flex; flex-direction: column;
            padding-top: 30px; /* رفع النص للأعلى بقوة */
            align-items: center; text-align: center;
        }

        .hero-section {
            max-width: 90%;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUpFade 1s cubic-bezier(0.16, 1, 0.3, 1) 2.8s forwards;
        }

        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-title {
            font-size: 42px; /* خط عريض وقوي */
            font-weight: 900;
            line-height: 1.1;
            color: var(--text-dark);
            letter-spacing: -1.5px;
            margin-bottom: 15px;
        }

        .hero-title span {
            display: block;
            color: var(--primary-blue); /* تمييز كلمة بلون مختلف */
        }

        .hero-subtitle {
            font-size: 18px;
            font-weight: 500;
            color: var(--text-gray);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .inline-logo {
            height: 28px;
            width: auto;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
        }

        /* --- منطقة محرك الـ AI (Placeholder) --- */
        .ai-chat-placeholder {
            margin-top: 40px;
            width: 100%;
            max-width: 500px;
            /* هنا ستبدأ ببناء صندوق الشات لاحقاً */
        }

        /* --- Bottom Nav --- */
        .bottom-nav-container {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%);
            width: 90%; max-width: 400px;
            background: var(--nav-bg); backdrop-filter: blur(20px);
            padding: 10px; border-radius: 30px;
            display: flex; justify-content: space-around;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.5);
        }

        .nav-item {
            display: flex; align-items: center; padding: 10px 18px;
            border-radius: 20px; color: #94a3b8; transition: 0.3s;
        }
        .nav-item.active { background: #f1f5f9; color: var(--primary-blue); }
        .nav-item svg { width: 22px; height: 22px; stroke-width: 2.5; fill: none; stroke: currentColor; }
        .nav-text { max-width: 0; overflow: hidden; white-space: nowrap; font-size: 14px; font-weight: 700; transition: 0.3s; opacity: 0; }
        .nav-item.active .nav-text { max-width: 80px; margin-left: 8px; opacity: 1; }

    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="https://plain-eeur-prod-public.komododecks.com/202604/19/y0zyi6uOKg2CaNATvHPZ/image.png" alt="Sidarapp Logo" class="splash-image">
    </div>

    <div class="background-container"></div>
    <div class="background-overlay"></div>
    
    <div class="app-container" id="main-app">
        
        <header class="header">
            <div class="menu-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </div>
        </header>

        <main class="main-content">
            <div class="hero-section">
                <h1 class="hero-title">
                    Your Journey <span>Starts Before</span> You Even Arrive.
                </h1>
                <div class="hero-subtitle">
                    Experience travel with 
                    <img src="https://plain-eeur-prod-public.komododecks.com/202604/19/y0zyi6uOKg2CaNATvHPZ/image.png" alt="Sidar" class="inline-logo">
                </div>
            </div>

            <div class="ai-chat-placeholder">
                </div>
        </main>

        <nav class="bottom-nav-container">
            <div class="nav-item active" onclick="setActive(this)">
                <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
                <span class="nav-text">Home</span>
            </div>
            <div class="nav-item" onclick="setActive(this)">
                <svg viewBox="0 0 24 24"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon></svg>
                <span class="nav-text">Map</span>
            </div>
            <div class="nav-item" onclick="setActive(this)">
                <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5"></rect></svg>
                <span class="nav-text">Reels</span>
            </div>
            <div class="nav-item" onclick="setActive(this)">
                <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                <span class="nav-text">Profile</span>
            </div>
        </nav>
    </div>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                const mainApp = document.getElementById('main-app');
                splash.style.opacity = '0';
                setTimeout(() => splash.style.visibility = 'hidden', 1000);
                mainApp.style.opacity = '1';
            }, 2000);
        });

        function setActive(el) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
