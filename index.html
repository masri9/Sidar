<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidarapp - Luxury AI Edition</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        :root {
            --primary-blue: #2563eb;
            --light-blue-bg: #eef2ff;
            --accent-blue: #3b82f6; 
            --text-dark: #0f172a;
        }

        body, html { 
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, -apple-system, sans-serif;
            background: #ffffff;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Background Header --- */
        .header-bg {
            position: absolute; top: 0; left: 0; right: 0; height: 50vh;
            background: linear-gradient(rgba(255,255,255,0.1), #fff), 
                        url('https://plain-eeur-prod-public.komododecks.com/202604/19/FtJXvAZvXREKew6PJ3ew/image.png');
            background-size: cover; background-position: center;
            z-index: -1;
        }

        .app-container {
            height: 100vh; display: flex; flex-direction: column;
            padding: 25px 25px 120px; box-sizing: border-box;
            overflow-y: auto; scrollbar-width: none;
        }
        .app-container::-webkit-scrollbar { display: none; }

        /* --- Top Navigation --- */
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .menu-btn { background: white; padding: 12px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; }
        .profile-img { width: 45px; height: 45px; border-radius: 15px; background: url('https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=100&q=80') center/cover; border: 2px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        /* --- Hero Title (العنوان الكبير الفخم) --- */
        .hero-title {
            font-size: 38px; font-weight: 800; line-height: 1.1;
            color: var(--text-dark); margin: 10px 0 35px; letter-spacing: -1.5px;
        }
        .hero-title span { color: var(--primary-blue); display: block; }

        /* --- AI Chat Box (التصميم الاحترافي) --- */
        .ai-chat-container { margin-bottom: 40px; position: relative; }
        .ai-chat-box {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 24px; padding: 8px 15px;
            display: flex; align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.06);
            border: 1px solid rgba(255,255,255,0.5);
        }
        .ai-icon-circle {
            width: 42px; height: 42px;
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            border-radius: 16px; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 20px; box-shadow: 0 5px 15px rgba(37,99,235,0.3);
        }
        .ai-chat-box input {
            flex: 1; border: none; background: transparent; padding: 12px 15px;
            font-size: 16px; font-weight: 600; outline: none; color: var(--text-dark);
        }

        /* --- Services Grid --- */
        .services-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
            margin-bottom: 40px;
        }
        .service-card {
            background: white; border-radius: 22px; padding: 15px 5px;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02); border: 1px solid #f1f5f9;
            transition: 0.3s;
        }
        .service-card:active { transform: scale(0.95); }
        .icon-box {
            width: 48px; height: 48px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; margin-bottom: 8px;
        }
        .bg-f { background: #eff6ff; color: #2563eb; }
        .bg-h { background: #fef2f2; color: #ef4444; }
        .bg-e { background: #f0fdf4; color: #22c55e; }
        .bg-o { background: #fff7ed; color: #f59e0b; }
        .service-card span { font-size: 12px; font-weight: 700; color: #64748b; }

        /* --- Recommended Section --- */
        .section-label {
            display: flex; justify-content: space-between; align-items: flex-end;
            margin-bottom: 15px; padding: 0 5px;
        }
        .section-label h3 { margin: 0; font-size: 20px; font-weight: 800; color: var(--text-dark); }
        .section-label span { color: var(--primary-blue); font-size: 13px; font-weight: 700; }

        .scroll-wrapper {
            display: flex; gap: 15px; overflow-x: auto;
            scrollbar-width: none; padding: 5px;
        }
        .scroll-wrapper::-webkit-scrollbar { display: none; }
        
        .dest-card {
            min-width: 180px; height: 240px; border-radius: 30px;
            position: relative; overflow: hidden; flex-shrink: 0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }
        .dest-card img { width: 100%; height: 100%; object-fit: cover; }
        .dest-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 20px; color: white;
        }
        .dest-overlay b { font-size: 16px; }
        .dest-overlay span { font-size: 12px; opacity: 0.8; }

        /* --- Bottom Navigation (Image Style) --- */
        .bottom-nav {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: white;
            padding: 10px; border-radius: 40px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1); z-index: 1000;
        }
        .nav-link {
            display: flex; align-items: center; padding: 12px 20px;
            color: #94a3b8; text-decoration: none; transition: 0.3s;
        }
        .nav-link.active {
            background: #eef2ff; color: #2563eb; border-radius: 30px;
        }
        .nav-link span { display: none; margin-left: 10px; font-weight: 700; font-size: 14px; }
        .nav-link.active span { display: inline; }
        .nav-link svg { width: 24px; height: 24px; stroke-width: 2.5; }

    </style>
</head>
<body>

    <div class="header-bg"></div>

    <div class="app-container">
        <div class="top-nav">
            <div class="menu-btn">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </div>
            <div class="profile-img"></div>
        </div>

        <h1 class="hero-title">
            Your Journey <br>
            <span>Starts Here.</span>
        </h1>

        <div class="ai-chat-container">
            <div class="ai-chat-box">
                <div class="ai-icon-circle">✨</div>
                <input type="text" placeholder="Ask Sidar AI anything...">
                <div style="color: #2563eb; margin-right: 5px;">🎤</div>
            </div>
        </div>

        <div class="services-grid">
            <div class="service-card">
                <div class="icon-box bg-f">✈️</div>
                <span>Flight</span>
            </div>
            <div class="service-card">
                <div class="icon-box bg-h">🏨</div>
                <span>Hotel</span>
            </div>
            <div class="service-card">
                <div class="icon-box bg-e">🎒</div>
                <span>Holiday</span>
            </div>
            <div class="service-card">
                <div class="icon-box bg-o">🏷️</div>
                <span>Offers</span>
            </div>
        </div>

        <div class="section-label">
            <h3>Recommended</h3>
            <span>View All</span>
        </div>
        <div class="scroll-wrapper">
            <div class="dest-card">
                <img src="https://images.unsplash.com/photo-1518548419970-58e3b4079ab2?auto=format&fit=crop&w=400&q=80">
                <div class="dest-overlay"><b>Bali, Indonesia</b><span>12 Destinations</span></div>
            </div>
            <div class="dest-card">
                <img src="https://images.unsplash.com/photo-1523906834658-6e24ef2386f9?auto=format&fit=crop&w=400&q=80">
                <div class="dest-overlay"><b>Venice, Italy</b><span>8 Destinations</span></div>
            </div>
            <div class="dest-card">
                <img src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34?auto=format&fit=crop&w=400&q=80">
                <div class="dest-overlay"><b>Paris, France</b><span>15 Destinations</span></div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-link active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
            <span>Home</span>
        </a>
        <a href="#" class="nav-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon></svg>
            <span>Map</span>
        </a>
        <a href="#" class="nav-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="2" y="2" width="20" height="20" rx="5"></rect><path d="M10 8l6 4-6 4V8z"></path></svg>
            <span>Reels</span>
        </a>
        <a href="#" class="nav-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span>Profile</span>
        </a>
    </nav>

</body>
</html>
