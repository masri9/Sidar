<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SIDAR TRAVEL — AI Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
  :root {
    --blue: #2A70DC; --ink: #0f1320; --white: #ffffff;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    background: linear-gradient(180deg,#fdfefe 0%,#e9f7ff 40%,#fff8ec 100%);
    padding: 0 20px;
  }

  /* Header Icons - المنيو يسار والجرس يمين */
  header {
    width: 100%;
    padding: 25px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 100;
  }
  .header-icon { font-size: 24px; color: var(--ink); cursor: pointer; opacity: 0.8; }

  /* Hero Container */
  .hero-container {
    width: 100%;
    max-width: 700px;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 10px; /* تقليل المسافة لرفع الشعار للأعلى */
  }

  /* وضع الشعار في أعلى حافة الـ Hero */
  .logo-container {
    margin-bottom: 60px; /* مسافة كافية قبل صندوق الدردشة */
    animation: fadeInDown 0.8s ease;
  }
  .logo-container img { width: 180px; height: auto; }

  /* بانل الدردشة */
  .ai-chat-panel {
    width: 100%;
    background: rgba(255, 255, 255, 0.4);
    backdrop-filter: blur(15px);
    border-radius: 35px;
    padding: 12px;
    border: 1px solid rgba(255, 255, 255, 0.6);
    box-shadow: 0 10px 40px rgba(0,0,0,0.03);
  }

  .input-group {
    display: flex;
    align-items: center;
    background: #f1f1f1;
    border-radius: 28px;
    padding: 8px 15px;
  }

  .input-group input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 16px;
    background: transparent;
    padding: 10px;
    color: var(--ink);
  }

  .send-btn {
    background: #0D0D35;
    color: white;
    border: none;
    width: 42px;
    height: 42px;
    border-radius: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.3s;
  }
  .send-btn:hover { background: var(--blue); }

  /* منطقة الاستجابة */
  #response-area {
    margin-top: 25px;
    display: none;
    width: 100%;
    background: #ffffff;
    padding: 22px;
    border-radius: 28px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.05);
    animation: slideUp 0.5s ease;
  }

  @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<header>
  <div class="header-icon"><i class="fas fa-bars"></i></div>
  <div class="header-icon"><i class="fas fa-bell"></i></div>
</header>

<main class="hero-container">
  <div class="logo-container">
    <img src="https://i.ibb.co/Q3p4gmYX/IMG-1629.png" alt="SIDAR TRAVEL">
  </div>

  <div class="ai-chat-panel">
    <div class="input-group">
      <input type="text" id="chatInput" placeholder="Ask Sidar anything...">
      <button class="send-btn" onclick="handleSearch()">
        <i class="fas fa-arrow-up"></i>
      </button>
    </div>
  </div>

  <div id="response-area">
    <div style="color:var(--blue); font-weight:800; font-size:13px; margin-bottom:10px;">
      <i class="fas fa-magic"></i> SIDAR AI
    </div>
    <div id="responseText" style="line-height:1.6; font-size:15px; color:var(--ink);"></div>
  </div>
</main>

<script>
  function handleSearch() {
    const input = document.getElementById('chatInput');
    const responseArea = document.getElementById('response-area');
    const responseText = document.getElementById('responseText');

    if (input.value.trim() !== "") {
      responseArea.style.display = 'block';
      responseText.innerHTML = "Thinking about your request: <b>" + input.value + "</b>...";
      input.value = ""; 
    }
  }
</script>

</body>
</html>
