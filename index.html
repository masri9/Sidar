<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silent Mass Report | Dashboard</title>
    <style>
        :root {
            --deep-black: #0a0a0a;
            --charcoal: #161616;
            --volcanic-orange: #ff4500;
            --glow-orange: #ff6a00;
            --text-grey: #a0a0a0;
        }

        body {
            background-color: var(--deep-black);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 80px;
            background-color: var(--charcoal);
            border-left: 1px solid #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
        }

        .sidebar-icon {
            color: var(--text-grey);
            font-size: 24px;
            margin: 20px 0;
            cursor: pointer;
            transition: 0.3s;
        }

        .sidebar-icon.active {
            color: var(--volcanic-orange);
            filter: drop-shadow(0 0 5px var(--volcanic-orange));
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .header h1 {
            color: var(--volcanic-orange);
            margin: 0;
            font-size: 2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .header p {
            color: var(--text-grey);
            margin-top: 5px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .stat-card {
            background-color: var(--charcoal);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #333;
            text-align: center;
            transition: 0.3s;
        }

        .stat-card:hover {
            border-color: var(--volcanic-orange);
        }

        .stat-card h3 {
            font-size: 1.5rem;
            margin: 10px 0 0 0;
        }

        .stat-card span {
            color: var(--text-grey);
            font-size: 0.8rem;
        }

        /* Command Center */
        .command-center {
            background-color: var(--charcoal);
            margin-top: 40px;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #333;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--volcanic-orange);
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .execute-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--volcanic-orange), var(--glow-orange));
            border: none;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 69, 0, 0.3);
            transition: 0.3s;
        }

        .execute-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 69, 0, 0.5);
        }

        /* Live Logs Terminal */
        .terminal {
            background-color: black;
            border: 1px solid #222;
            padding: 15px;
            margin-top: 30px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            height: 150px;
            overflow-y: auto;
            border-radius: 8px;
        }

        .log-entry { margin-bottom: 5px; }
        .log-success { color: #00ff00; }
        .log-warn { color: var(--volcanic-orange); }
        .log-info { color: #00ccff; }

    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-icon active">🛡️</div>
        <div class="sidebar-icon">🤖</div>
        <div class="sidebar-icon">⚙️</div>
        <div style="margin-top: auto;" class="sidebar-icon">🚪</div>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Silent Mass Report</h1>
            <p>لوحة التحكم المركزية | مشروع Guardian Shield</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>1,240</h3>
                <span>البوتات النشطة</span>
            </div>
            <div class="stat-card">
                <h3>856</h3>
                <span>البروكسيات (Active)</span>
            </div>
            <div class="stat-card">
                <h3>98%</h3>
                <span>معدل النجاح</span>
            </div>
        </div>

        <div class="command-center">
            <div class="form-group">
                <label>رابط الهدف (URL)</label>
                <input type="text" placeholder="https://social-media.com/target-profile">
            </div>

            <div style="display: flex; gap: 20px;">
                <div class="form-group" style="flex: 1;">
                    <label>نوع المخالفة</label>
                    <select>
                        <option>Spam / سبام</option>
                        <option>Harassment / مضايقة</option>
                        <option>Hate Speech / خطاب كراهية</option>
                    </select>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>عدد البوتات المطلوب</label>
                    <input type="number" value="100" min="1" max="1000">
                </div>
            </div>

            <button class="execute-btn" onclick="startHack()">بدء الهجوم الصامت</button>
        </div>

        <div class="terminal" id="terminal">
            <div class="log-entry log-info">[SYSTEM]: Initializing secure connection...</div>
            <div class="log-entry log-info">[SYSTEM]: Bot farm ready. Waiting for target...</div>
        </div>
    </div>

    <script>
        function startHack() {
            const term = document.getElementById('terminal');
            const newLog = document.createElement('div');
            newLog.className = 'log-entry log-warn';
            newLog.innerText = `[${new Date().toLocaleTimeString()}] ATTACK STARTED: Deploying bots to target...`;
            term.appendChild(newLog);
            term.scrollTop = term.scrollHeight;
        }
    </script>
</body>
</html>
