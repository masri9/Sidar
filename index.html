<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sidarapp - Professional Fixed</title>
    
    <style>
        :root {
            --primary-lava: #ff4500; 
            --lava-glow: rgba(255, 69, 0, 0.4); 
            --text-main: #0f172a; 
        }

        body, html { 
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Splash Screen --- */
        #splash-screen {
            position: fixed; inset: 0; background: #ffffff;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
        }
        .splash-image { width: 150px; }

        /* --- Header Background --- */
        .header-bg {
            position: absolute; top: 0; left: 0; right: 0; height: 50vh;
            background-size: cover; background-position: center;
            z-index: 0;
            background-image: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1000');
        }
        .header-bg::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 1) 100%);
        }

        .app-container {
            position: relative; z-index: 1;
            padding: 60px 20px 100px;
        }

        .hero-title { font-size: 34px; font-weight: 800; color: var(--text-main); margin-bottom: 20px; }
        .hero-title span { color: var(--primary-lava); }

        .search-wrapper {
            background: #fff; border-radius: 20px; padding: 12px 18px; 
            display: flex; align-items: center; border: 2px solid var(--primary-lava);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px;
        }
        .search-wrapper input { flex: 1; border: none; outline: none; font-size: 16px; padding-left: 10px; }

        .services-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 20px; scrollbar-width: none; }
        .services-scroll::-webkit-scrollbar { display: none; }
        .service-pill {
            padding: 8px 18px; border-radius: 50px; border: 1.5px solid #eee;
            background: #fff; white-space: nowrap; font-weight: 600;
        }
        .service-pill.active { border-color: var(--primary-lava); color: var(--primary-lava); background: rgba(255,69,0,0.05); }

        /* --- Stacked Cards (THE FIX) --- */
        .stacked-cards-wrapper {
            position: relative; width: 100%; height: 300px;
            display: flex; justify-content: center; align-items: center;
            perspective: 1000px; margin-top: 10px;
        }

        .card-item {
            position: absolute; width: 220px; height: 280px;
            border-radius: 25px; background-size: cover; background-position: center;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex; align-items: flex-end; justify-content: center;
            padding-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            opacity: 0; pointer-events: none;
            background-color: #333; /* خلفية احتياطية سوداء في حال فشل الصورة */
        }

        .card-item.active { opacity: 1; transform: translateX(0) scale(1); z-index: 10; pointer-events: auto; }
        .card-item.prev { opacity: 0.6; transform: translateX(-90px) scale(0.8); z-index: 5; filter: blur(1px); }
        .card-item.next { opacity: 0.6; transform: translateX(90px) scale(0.8); z-index: 5; filter: blur(1px); }

        .see-more-btn {
            background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
            color: #fff; border-radius: 50px; padding: 10px 35px;
            font-weight: 700; font-size: 13px; border: 1px solid rgba(255,255,255,0.3);
        }

        .dots { display: flex; justify-content: center; gap: 8px; margin-top: 15px; }
        .dot { width: 6px; height: 6px; background: #ddd; border-radius: 50%; transition: 0.3s; }
        .dot.active { background: #000; width: 16px; border-radius: 10px; }

        /* --- Navigation --- */
        .bottom-nav {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 400px; background: #fff; border-radius: 40px;
            display: flex; justify-content: space-around; padding: 10px;
            border: 2px solid var(--primary-lava); box-shadow: 0 5px 20px var(--lava-glow); z-index: 1000;
        }
        .nav-item { color: #94a3b8; display: flex; align-items: center; transition: 0.3s; padding: 8px 12px; border-radius: 20px; }
        .nav-item.active { background: rgba(255, 69, 0, 0.1); color: var(--primary-lava); }
        .nav-item span { max-width: 0; overflow: hidden; transition: 0.3s; font-weight: 700; font-size: 14px; }
        .nav-item.active span { max-width: 80px; margin-left: 8px; }
        .nav-item svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2.2; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="https://plain-eeur-prod-public.komododecks.com/202604/19/y0zyi6uOKg2CaNATvHPZ/image.png" class="splash-image">
    </div>

    <div class="header-bg"></div>

    <div class="app-container" id="main-app" style="opacity: 0; transition: 0.8s;">
        <h1 class="hero-title">Where do you <br><span>wanna go?</span></h1>

        <div class="search-wrapper">
            <span>🔍</span>
            <input type="text" placeholder="Search for anything...">
        </div>

        <div class="services-scroll">
            <div class="service-pill">🎟️ Events</div>
            <div class="service-pill">📶 eSIM</div>
            <div class="service-pill active">💱 Currency</div>
            <div class="service-pill">💸 Transfer</div>
        </div>

        <div class="stacked-cards-wrapper" id="cardsWrapper">
            <div class="card-item active" style="background-image: url('https://images.unsplash.com/photo-1519046904884-53103b34b206?auto=format&fit=crop&w=500')"><div class="see-more-btn">See More</div></div>
            <div class="card-item" style="background-image: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=500')"><div class="see-more-btn">See More</div></div>
            <div class="card-item" style="background-image: url('https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=500')"><div class="see-more-btn">See More</div></div>
            <div class="card-item" style="background-image: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=500')"><div class="see-more-btn">See More</div></div>
        </div>

        <div class="dots" id="dots"></div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg><span>Home</span></div>
        <div class="nav-item"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg><span>Map</span></div>
        <div class="nav-item"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line></svg><span>Reels</span></div>
        <div class="nav-item"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><span>Profile</span></div>
    </nav>

    <script>
        // إخفاء السكرين سبلاش
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splash-screen').style.display = 'none';
                document.getElementById('main-app').style.opacity = '1';
                initCards();
            }, 1500);
        };

        let current = 0;
        const items = document.querySelectorAll('.card-item');
        const dotsContainer = document.getElementById('dots');

        function initCards() {
            // إنشاء النقاط
            items.forEach((_, i) => {
                const d = document.createElement('div');
                d.className = i === 0 ? 'dot active' : 'dot';
                dotsContainer.appendChild(d);
            });
            update();
            setInterval(next, 3500); // تغيير تلقائي
        }

        function next() {
            current = (current + 1) % items.length;
            update();
        }

        function update() {
            items.forEach((item, i) => {
                item.classList.remove('active', 'prev', 'next');
                if (i === current) item.classList.add('active');
                else if (i === (current - 1 + items.length) % items.length) item.classList.add('prev');
                else if (i === (current + 1) % items.length) item.classList.add('next');
            });
            
            const ds = document.querySelectorAll('.dot');
            ds.forEach((d, i) => d.classList.toggle('active', i === current));
        }
    </script>
</body>
</html>
