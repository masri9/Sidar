<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sidarapp - Splash Only</title>
    
    <style>
        body, html { 
            margin: 0; padding: 0;
            height: 100vh;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        /* --- Splash Screen --- */
        #splash-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        .splash-image { 
            width: 180px; 
            animation: pulse 2s ease-in-out infinite; 
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        /* تم إخفاء باقي العناصر تماماً بناءً على طلبك */
        .app-container, .header-bg, .bottom-nav {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="https://plain-eeur-prod-public.komododecks.com/202604/19/y0zyi6uOKg2CaNATvHPZ/image.png" class="splash-image">
    </div>

</body>
</html>
