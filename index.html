<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidar App - Deep Curve Nav</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --nav-bg: #ffffff;
            --primary-color: #2A70DC;
            --icon-default: #a0a0a0;
        }

        body {
            margin: 0;
            background-color: #f8f9fa; /* خلفية رمادية فاتحة لبروز الشريط الأبيض */
            font-family: 'Segoe UI', sans-serif;
        }

        /* حاوية الشريط السفلي */
        .navigation-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 70px;
            background: transparent;
            z-index: 1000;
        }

        /* رسم الانحناء الاحترافي باستخدام SVG خلفية */
        .nav-svg-bg {
            position: absolute;
            bottom: 0;
            width: 100%;
            filter: drop-shadow(0 -5px 10px rgba(0,0,0,0.05));
        }

        /* الزر الدائري الملون (الخريطة) */
        .center-action-btn {
            position: absolute;
            top: -35px; /* يغطس في الانحناء */
            left: 50%;
            transform: translateX(-50%);
            width: 62px;
            height: 62px;
            background: linear-gradient(135deg, #2A70DC, #00C7B7);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 15px rgba(42, 112, 220, 0.3);
            border: 5px solid #ffffff; /* الإطار الفاصل */
            z-index: 10;
            transition: 0.3s;
        }

        .center-action-btn img {
            width: 30px;
            filter: brightness(0) invert(1);
        }

        /* توزيع الأيقونات */
        .nav-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 5px;
            z-index: 5;
        }

        .nav-link {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--icon-default);
            transition: 0.3s;
        }

        .nav-link i, .nav-link img {
            font-size: 22px;
            width: 24px;
            height: 24px;
            object-fit: contain;
        }

        /* ترك مسافة كافية في المنتصف للانحناء */
        .spacer {
            width: 70px;
        }

        /* تفاعلات */
        .nav-link:hover { color: var(--primary-color); }
        .center-action-btn:active { transform: translateX(-50%) scale(0.9); }

    </style>
</head>
<body>

    <div class="navigation-bar">
        <svg class="nav-svg-bg" viewBox="0 0 400 70" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0 0 H155 C165 0 170 5 175 15 C185 35 215 35 225 15 C230 5 235 0 245 0 H400 V70 H0 Z" fill="white"/>
        </svg>

        <a href="#" class="center-action-btn">
            <img src="https://cdn-icons-png.flaticon.com/512/854/854878.png" alt="Map">
        </a>

        <div class="nav-content">
            <a href="#" class="nav-link">
                <i class="fa-solid fa-house"></i>
            </a>
            <a href="#" class="nav-link">
                <img src="https://cdn-icons-png.flaticon.com/512/5948/5948543.png" alt="Reels">
            </a>
            
            <div class="spacer"></div>

            <a href="#" class="nav-link">
                <i class="fa-solid fa-message"></i>
            </a>
            <a href="#" class="nav-link">
                <i class="fa-solid fa-user"></i>
            </a>
        </div>
    </div>

</body>
</html>
