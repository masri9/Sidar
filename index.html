<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOYAGR — Ultimate Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #060810;
            --neon-p: #a259ff;
            --neon-b: #3ecfff;
            --grad: linear-gradient(135deg, #a259ff 0%, #3ecfff 100%);
            --glass: rgba(14, 20, 48, 0.75);
            --border: rgba(120, 100, 255, 0.15);
            --text: #f0f0ff;
        }

        /* تحسينات الحركة (Animations) */
        .screen {
            position: absolute; inset: 0;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s;
            opacity: 0; transform: translateX(30px);
            pointer-events: none;
        }
        .screen.active {
            opacity: 1; transform: translateX(0);
            pointer-events: all;
        }

        /* تأثير النبض للـ Pins في الخريطة */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(162, 89, 255, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(162, 89, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(162, 89, 255, 0); }
        }
        .pin-inner { animation: pulse 2s infinite; }

        /* ستايل البحث المطور */
        .search-results {
            position: absolute; top: 120px; left: 20px; right: 20px;
            background: var(--glass); border-radius: 15px;
            backdrop-filter: blur(20px); z-index: 100;
            max-height: 200px; overflow-y: auto; display: none;
            border: 1px solid var(--border);
        }
        .search-item { padding: 12px; border-bottom: 1px solid var(--border); cursor: pointer; }

        /* معاينة الصورة المرفوعة */
        #preview-img {
            width: 100%; height: 100%; object-fit: cover;
            border-radius: 15px; display: none;
        }
        
        /* مظهر الـ Feed المطور */
        .feed-card { transition: transform 0.3s; }
        .feed-card:hover { transform: translateY(-5px); }

        /* باقي الستايلات الأساسية المختصرة للحفاظ على الأداء */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); overflow: hidden; }
        .phone-shell { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #000; }
        .phone { width: 390px; height: 844px; background: var(--bg); border-radius: 50px; position: relative; overflow: hidden; border: 2px solid #333; }
        .scroll-area { height: 100%; overflow-y: auto; padding: 60px 0 100px; scroll-behavior: smooth; }
        .nav-bar { position: absolute; bottom: 0; width: 100%; height: 85px; background: rgba(8,11,24,0.9); backdrop-filter: blur(20px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); }
        .nav-item { cursor: pointer; text-align: center; opacity: 0.6; transition: 0.3s; }
        .nav-item.active { opacity: 1; color: var(--neon-p); }
    </style>
</head>
<body>

<div class="phone-shell">
    <div class="phone">
        <div class="search-results" id="search-results"></div>

        <div class="screens">
            <div class="screen active" id="screen-home">
                <div class="scroll-area">
                    <div style="padding: 20px;">
                        <h2 style="font-family: 'Syne'; font-size: 28px; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Explore World</h2>
                        <input type="text" id="main-search" placeholder="Search destinations..." 
                               style="width: 100%; padding: 15px; margin-top: 15px; border-radius: 12px; border: 1px solid var(--border); background: var(--glass); color: white; outline: none;">
                    </div>
                    
                    <div id="feed-container">
                        </div>
                </div>
            </div>

            <div class="screen" id="screen-map">
                <div style="height: 100%; position: relative; background: #0b0f1e;">
                    <div class="pin" style="position: absolute; top: 40%; left: 50%;" onclick="alert('Tokyo Selected')">
                        <div class="pin-inner" style="background: var(--neon-p); padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 12px;">📍 Tokyo Gym</div>
                    </div>
                    <div style="position: absolute; bottom: 100px; width: 100%; padding: 0 20px;">
                        <div style="background: var(--glass); padding: 15px; border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid var(--border);">
                            <h4 style="font-family: 'Syne';">Live Destination</h4>
                            <p style="font-size: 12px; opacity: 0.7;">Exploring Shibuya District...</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="screen" id="screen-profile">
                <div class="scroll-area">
                    <div style="text-align: center; padding: 40px 20px;">
                        <div style="width: 100px; height: 100px; border-radius: 50%; background: var(--grad); margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 40px;">👤</div>
                        <h3 style="font-family: 'Syne';">Alex Rivera</h3>
                        <p style="opacity: 0.6; font-size: 13px;">@alex.voyagr</p>
                        <button onclick="openModal()" style="margin-top: 20px; width: 100%; padding: 12px; border-radius: 12px; border: none; background: var(--grad); color: white; font-weight: bold; cursor: pointer;">Add New Experience</button>
                    </div>
                </div>
            </div>
        </div>

        <nav class="nav-bar">
            <div class="nav-item active" onclick="switchTab(this, 'home')">🏠<br><span style="font-size: 10px;">Home</span></div>
            <div class="nav-item" onclick="switchTab(this, 'map')">🗺️<br><span style="font-size: 10px;">Map</span></div>
            <div class="nav-item" onclick="switchTab(this, 'profile')">👤<br><span style="font-size: 10px;">Profile</span></div>
        </nav>

        <div id="add-modal" style="position: absolute; inset: 0; background: var(--bg); z-index: 200; display: none; flex-direction: column; padding: 40px 20px;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 30px;">
                <span onclick="closeModal()" style="cursor: pointer;">✕ Close</span>
                <button onclick="publishPost()" style="background: var(--grad); border: none; padding: 5px 15px; border-radius: 8px; color: white;">Publish</button>
            </div>
            <div id="drop-zone" style="flex: 1; border: 2px dashed var(--border); border-radius: 20px; display: flex; align-items: center; justify-content: center; flex-direction: column; cursor: pointer; overflow: hidden;">
                <input type="file" id="file-input" hidden accept="image/*">
                <div id="upload-placeholder">
                    <span>📸 Click to upload image</span>
                </div>
                <img id="preview-img" alt="Preview">
            </div>
            <textarea id="post-desc" placeholder="Write something about your trip..." style="width: 100%; height: 100px; margin-top: 20px; background: var(--glass); border: 1px solid var(--border); color: white; padding: 15px; border-radius: 12px; outline: none;"></textarea>
        </div>
    </div>
</div>

<script>
    // 1. نظام التنقل المحسن (Tab Switching)
    function switchTab(el, screenId) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + screenId).classList.add('active');
    }

    // 2. نظام البحث الذكي (Filter System)
    const destinations = [
        { name: "Swiss Alps", loc: "Switzerland", icon: "🏔️" },
        { name: "Maldives", loc: "South Asia", icon: "🌊" },
        { name: "Tokyo City", loc: "Japan", icon: "🍣" },
        { name: "Petra", loc: "Jordan", icon: "🏛️" }
    ];

    const searchInput = document.getElementById('main-search');
    const resultsDiv = document.getElementById('search-results');

    searchInput.addEventListener('input', (e) => {
        const val = e.target.value.toLowerCase();
        resultsDiv.innerHTML = '';
        if (val.length < 1) { resultsDiv.style.display = 'none'; return; }

        const filtered = destinations.filter(d => d.name.toLowerCase().includes(val));
        if (filtered.length > 0) {
            resultsDiv.style.display = 'block';
            filtered.forEach(d => {
                const item = document.createElement('div');
                item.className = 'search-item';
                item.innerHTML = `${d.icon} <strong>${d.name}</strong> <small>${d.loc}</small>`;
                item.onclick = () => { searchInput.value = d.name; resultsDiv.style.display = 'none'; };
                resultsDiv.appendChild(item);
            });
        }
    });

    // 3. رفع الصور ومعاينتها (Image Upload Logic)
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const previewImg = document.getElementById('preview-img');
    const placeholder = document.getElementById('upload-placeholder');

    dropZone.onclick = () => fileInput.click();

    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                previewImg.src = event.target.result;
                previewImg.style.display = 'block';
                placeholder.style.display = 'none';
            };
            reader.readAsDataURL(file);
        }
    };

    function openModal() { document.getElementById('add-modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('add-modal').style.display = 'none'; }

    // 4. نظام الإعجاب التفاعلي (Like Interaction)
    function publishPost() {
        const desc = document.getElementById('post-desc').value;
        const img = previewImg.src;
        if (!desc) return alert("Please add a description");

        const feed = document.getElementById('feed-container');
        const card = document.createElement('div');
        card.className = 'feed-card';
        card.style = "margin: 20px; background: var(--glass); border-radius: 20px; overflow: hidden; border: 1px solid var(--border);";
        card.innerHTML = `
            <img src="${img}" style="width: 100%; height: 200px; object-fit: cover;">
            <div style="padding: 15px;">
                <p style="font-size: 14px; margin-bottom: 10px;">${desc}</p>
                <div style="display: flex; gap: 15px;">
                    <span onclick="toggleLike(this)" style="cursor: pointer; transition: 0.3s;">🤍 0</span>
                    <span>💬 0</span>
                </div>
            </div>
        `;
        feed.prepend(card);
        closeModal();
        switchTab(document.querySelector('.nav-item'), 'home');
    }

    function toggleLike(el) {
        if (el.innerText.includes('🤍')) {
            el.innerText = '❤️ 1';
            el.style.transform = 'scale(1.3)';
            setTimeout(() => el.style.transform = 'scale(1)', 100);
        } else {
            el.innerText = '🤍 0';
        }
    }
</script>

</body>
</html>
