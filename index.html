<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sidarapp - Robot Edition</title>
    
    <style>
        :root {
            --primary-lava: #ff4500; 
            --lava-glow: rgba(255, 69, 0, 0.4); 
            --text-main: #0f172a; 
        }

        .lava-text { color: var(--primary-lava); font-weight: 700; }

        body, html { 
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* نظام إخفاء وإظهار الصفحات */
        .app-page { display: none; animation: slideUp 0.4s ease-out; }
        .app-page.active { display: block; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Splash Screen --- */
        #splash-screen {
            position: fixed; inset: 0; background: #ffffff;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.5s ease;
        }
        .splash-image { width: 180px; }

        .header-bg {
            position: absolute; top: 0; left: 0; right: 0; height: 55vh;
            background-size: cover; background-position: center; z-index: 0;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .app-container {
            position: relative; z-index: 1;
            padding: 60px 20px 120px; box-sizing: border-box;
        }

        /* --- Hero Section --- */
        .hero-section { position: relative; }
        .hero-title { font-size: 34px; font-weight: 800; line-height: 1.1; color: var(--text-main); margin-bottom: 35px; }
        .hero-title span { color: var(--primary-lava); }

        /* --- Search Bar & Robot Alignment --- */
        .search-area-wrapper {
            position: relative;
            margin-bottom: 25px;
            margin-top: 50px; /* ترك مساحة للروبوت */
        }

        /* الروبوت: يظهر من وراء المستطيل */
        .sidar-robot {
            position: absolute;
            right: 15px;      /* على الطرف اليميني */
            bottom: 20px;     /* يبدأ من خلف المستطيل */
            width: 90px;      /* حجم مناسب */
            z-index: 1;       /* خلف المستطيل */
            filter: drop-shadow(0 0 10px var(--lava-glow));
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        /* حركة الروبوت عند التركيز على البحث */
        .search-wrapper:focus-within ~ .sidar-robot,
        .search-wrapper:hover ~ .sidar-robot {
            transform: translateY(-65px) rotate(-5deg); /* يخرج للأعلى */
        }

        .search-wrapper {
            background: rgba(255,255,255,0.95); 
            backdrop-filter: blur(15px);
            border-radius: 20px; padding: 15px 18px; 
            display: flex; align-items: center;
            border: 2px solid var(--primary-lava); 
            position: relative;
            z-index: 2; /* أمام الروبوت */
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .search-icon { margin-right: 10px; font-size: 18px; }
        .search-wrapper input { 
            flex: 1; border: none; background: transparent; outline: none; 
            font-size: 16px; width: 100%; color: var(--text-main);
        }

        /* --- بقية العناصر --- */
        .services-scroll-container { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 25px; scrollbar-width: none; }
        .service-pill { display: flex; align-items: center; background: #ffffff; border: 1.5px solid #f1f5f9; padding: 8px 16px; border-radius: 50px; flex-shrink: 0; transition: 0.3s; }
        .service-pill.active { border-color: var(--primary-lava); color: var(--primary-lava); background: rgba(255, 69, 0, 0.05); }

        .stacked-cards-wrapper { position: relative; width: 100%; height: 260px; display: flex; justify-content: center; align-items: center; perspective: 1200px; margin-top: 10px; }
        .card-item { position: absolute; width: 200px; height: 240px; border-radius: 30px; background-size: cover; background-position: center; transition: all 0.7s cubic-bezier(0.34, 1.56, 0.64, 1); display: flex; align-items: flex-end; justify-content: center; padding-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.08); opacity: 0; pointer-events: none; border: 2px solid transparent; }
        .card-item.active { opacity: 1; transform: translateX(0) translateZ(50px) scale(1); z-index: 10; pointer-events: auto; border-color: var(--primary-lava); }
        .card-item.prev { opacity: 0.4; transform: translateX(-100px) translateZ(-100px) scale(0.8); z-index: 5; }
        .card-item.next { opacity: 0.4; transform: translateX(100px) translateZ(-100px) scale(0.8); z-index: 5; }

        .see-more-btn { background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(8px); color: #fff; border-radius: 50px; padding: 8px 20px; font-weight: 700; font-size: 11px; border: 1px solid rgba(255,255,255,0.2); }
        .dots-container { display: flex; justify-content: center; gap: 8px; margin-top: 15px; }
        .dot { width: 6px; height: 6px; background: #e2e8f0; border-radius: 50%; transition: 0.4s; }
        .dot.active { background: var(--primary-lava); width: 15px; border-radius: 10px; }

        .bottom-nav { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: #fff; border-radius: 40px; display: flex; justify-content: space-around; padding: 10px; border: 1px solid #f1f5f9; box-shadow: 0 15px 30px rgba(0,0,0,0.1); z-index: 1000; }
        .nav-item { display: flex; align-items: center; color: #94a3b8; transition: 0.3s; padding: 10px; border-radius: 20px; }
        .nav-item.active { background: rgba(255, 69, 0, 0.1); color: var(--primary-lava); }
        .nav-item span { max-width: 0; overflow: hidden; transition: 0.3s; font-weight: 700; }
        .nav-item.active span { max-width: 80px; margin-left: 8px; }
        .nav-item svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2.5; }

        #info-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); z-index: 2000; display: flex; align-items: flex-end; visibility: hidden; opacity: 0; transition: 0.4s; }
        #info-overlay.open { visibility: visible; opacity: 1; }
        .info-content { width: 100%; background: #fff; border-radius: 40px 40px 0 0; padding: 40px 30px; transform: translateY(100%); transition: 0.5s; }
        #info-overlay.open .info-content { transform: translateY(0); }
    </style>
</head>
<body>

    <div id="splash-screen"><img id="splashLogo" src="" class="splash-image"></div>
    <div class="header-bg" id="heroBg"></div>

    <div class="app-container" id="main-app" style="opacity: 0; transition: 1s;">
        
        <div id="home-page" class="app-page active">
            <div class="hero-section">
                <h1 class="hero-title">Where do you <br><span>wanna go?</span></h1>
            </div>

            <div class="search-area-wrapper">
                <div class="search-wrapper">
                    <span class="search-icon">🔍</span>
                    <input type="text" placeholder="Ask Sidar anything...">
                </div>
                <img src="https://plain-eeur-prod-public.komododecks.com/202604/20/zpRwsd9YMgeCmtSTOjFQ/image.png" class="sidar-robot" alt="Sidar AI Robot">
            </div>

            <div class="services-scroll-container">
                <div class="service-pill"><span>🎟️ Events</span></div>
                <div class="service-pill"><span>📶 eSIM</span></div>
                <div class="service-pill active"><span>💱 Currency</span></div>
                <div class="service-pill"><span>💸 Transfer</span></div>
            </div>

            <div class="stacked-cards-wrapper" id="cardsWrapper">
                <div class="card-item" id="card0" onclick="showInfo(0)"><div class="see-more-btn">See More</div></div>
                <div class="card-item" id="card1" onclick="showInfo(1)"><div class="see-more-btn">See More</div></div>
                <div class="card-item" id="card2" onclick="showInfo(2)"><div class="see-more-btn">See More</div></div>
                <div class="card-item" id="card3" onclick="showInfo(3)"><div class="see-more-btn">See More</div></div>
            </div>

            <div class="dots-container" id="dotsContainer"></div>
        </div>

        <div id="profile-page" class="app-page">
            <div style="padding: 40px 20px; text-align: center;">
                <h2>Profile</h2>
                <p>Welcome back, Explorer!</p>
            </div>
        </div>
    </div>

    <div id="info-overlay">
        <div class="info-content">
            <h2 id="target-title">Loading...</h2>
            <p id="target-desc">Details will appear here.</p>
            <button onclick="closeInfo()" style="width:100%; padding:15px; border-radius:20px; border:none; background:var(--primary-lava); color:#fff; font-weight:700; margin-top:20px;">Close</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="tab(this, 'home')"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg><span>Home</span></div>
        <div class="nav-item" onclick="tab(this, 'map')"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg><span>Map</span></div>
        <div class="nav-item" onclick="tab(this, 'profile')"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><span>Profile</span></div>
    </nav>

    <script>
        const MY_IMAGES = {
            splashLogo: 'https://plain-eeur-prod-public.komododecks.com/202604/19/y0zyi6uOKg2CaNATvHPZ/image.png',
            heroBackground: 'https://plain-eeur-prod-public.komododecks.com/202604/19/FtJXvAZvXREKew6PJ3ew/image.png',
            card0: 'https://plain-eeur-prod-public.komododecks.com/202604/19/Zs148rIHaZ5l8sjqw4S4/image.png',
            card1: 'https://plain-eeur-prod-public.komododecks.com/202604/19/xK3pwCpVUtFZFveFLbt2/image.png',
            card2: 'https://plain-eeur-prod-public.komododecks.com/202604/19/Ri6ookm2NesWdMC7Mcbc/image.png',
            card3: 'https://plain-eeur-prod-public.komododecks.com/202604/19/qzr51sWPt6GgM3gTZH8K/image.png'
        };

        const DATA = [
            { title: "Istanbul", desc: "Discover the magic of the Bosphorus." },
            { title: "Antalya", desc: "Sunny beaches and ancient ruins." },
            { title: "Cappadocia", desc: "Ride the balloons over fairy chimneys." },
            { title: "Bodrum", desc: "Crystal clear waters and nightlife." }
        ];

        function applyImages() {
            document.getElementById('splashLogo').src = MY_IMAGES.splashLogo;
            document.getElementById('heroBg').style.backgroundImage = `url('${MY_IMAGES.heroBackground}')`;
            document.getElementById('card0').style.backgroundImage = `url('${MY_IMAGES.card0}')`;
            document.getElementById('card1').style.backgroundImage = `url('${MY_IMAGES.card1}')`;
            document.getElementById('card2').style.backgroundImage = `url('${MY_IMAGES.card2}')`;
            document.getElementById('card3').style.backgroundImage = `url('${MY_IMAGES.card3}')`;
        }

        let currentIndex = 0;
        const cards = document.querySelectorAll('.card-item');

        function updateCards() {
            cards.forEach((card, i) => {
                card.classList.remove('active', 'prev', 'next');
                if (i === currentIndex) card.classList.add('active');
                else if (i === (currentIndex - 1 + cards.length) % cards.length) card.classList.add('prev');
                else if (i === (currentIndex + 1) % cards.length) card.classList.add('next');
            });
            document.querySelectorAll('.dot').forEach((dot, i) => dot.classList.toggle('active', i === currentIndex));
        }

        function showInfo(index) {
            document.getElementById('target-title').innerText = DATA[index].title;
            document.getElementById('target-desc').innerText = DATA[index].desc;
            document.getElementById('info-overlay').classList.add('open');
        }

        function closeInfo() { document.getElementById('info-overlay').classList.remove('open'); }

        window.addEventListener('load', () => {
            applyImages();
            const dotsContainer = document.getElementById('dotsContainer');
            cards.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = `dot ${i === 0 ? 'active' : ''}`;
                dotsContainer.appendChild(dot);
            });
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash-screen').style.display = 'none';
                    document.getElementById('main-app').style.opacity = '1';
                    updateCards();
                }, 500);
            }, 2000);
        });

        function tab(el, page) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active'));
            document.getElementById(page + '-page').classList.add('active');
        }
    </script>
</body>
</html>
