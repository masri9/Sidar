<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sidarapp - Inferno Mode</title>
    
    <style>
        :root {
            /* ألوان النار والنيون الجديدة */
            --fire-orange: #ff4500;
            --fire-red: #8b0000;
            --neon-lava: #ff6b35; 
            --dark-ash: #121212;
            --light-ash: #2d2d2d;
            --text-main: #f1f5f9;
        }

        body, html { 
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            background: var(--dark-ash); /* خلفية داكنة كالفحم */
        }

        /* --- Splash Screen (بركان هادئ) --- */
        #splash-screen {
            position: fixed; inset: 0; background: #000;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease;
        }
        .splash-image { 
            width: 160px; 
            filter: drop-shadow(0 0 15px var(--fire-orange)); /* هالة نارية */
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(1); opacity: 0.8; } }

        /* --- Volcanic Background (خلفية الحمم) --- */
        .header-bg {
            position: absolute; top: 0; left: 0; right: 0; height: 50vh;
            /* رابط صورة الحمم المتدفقة */
            background: linear-gradient(to bottom, rgba(0,0,0,0.1), var(--dark-ash)), 
                        url('https://images.unsplash.com/photo-1576186064115-f5b2b29f0321?w=600');
            background-size: cover; background-position: center;
            z-index: 0;
            filter: saturate(1.5); /* زيادة تشبع الألوان النارية */
        }

        /* --- Main Scroller --- */
        .app-container {
            position: relative; z-index: 1;
            height: 100vh; overflow-y: auto;
            padding: 50px 20px 120px; box-sizing: border-box;
            scrollbar-width: none;
        }
        .app-container::-webkit-scrollbar { display: none; }

        /* --- Top Nav (شفاف) --- */
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .menu-icon { background: rgba(255,255,255,0.1); backdrop-filter: blur(5px); padding: 10px; border-radius: 12px; color: var(--text-main); }
        .profile-img { width: 42px; height: 42px; border-radius: 12px; border: 2px solid var(--fire-orange); box-shadow: 0 0 15px var(--fire-orange); }

        /* --- Hero Text (الآن يتوهج) --- */
        .hero-title { font-size: 36px; font-weight: 800; line-height: 1.1; color: var(--text-main); margin-bottom: 30px; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .hero-title span { color: var(--fire-orange); text-shadow: 0 0 15px var(--fire-orange); }

        /* --- Search Bar (نيون) --- */
        .search-wrapper {
            background: rgba(45,45,45,0.8); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 12px 18px; display: flex; align-items: center;
            border: 2px solid var(--fire-orange); /* إطار نيون */
            box-shadow: 0 0 20px rgba(255,69,0,0.5); /* هالة نيون */
            margin-bottom: 35px;
        }
        .search-wrapper span { color: var(--fire-orange); }
        .search-wrapper input { flex: 1; border: none; background: transparent; outline: none; padding-left: 10px; font-size: 16px; font-weight: 500; color: var(--text-main); }
        .search-wrapper input::placeholder { color: rgba(241,245,249,0.5); }

        /* --- Services Grid (الآن على خلفية داكنة) --- */
        .services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        .service-card {
            background: rgba(255,255,255,0.05); border-radius: 22px; padding: 18px 5px;
            display: flex; flex-direction: column; align-items: center;
            border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; cursor: pointer;
            color: var(--text-main);
        }
        .service-card:active { transform: scale(0.95); background: rgba(255,69,0,0.1); border-color: var(--fire-orange); }
        .icon-circle { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        /* --- Bottom Nav (داكنة ونيون) --- */
        .bottom-nav {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; 
            background: rgba(18,18,18,0.9); backdrop-filter: blur(10px);
            border-radius: 40px; display: flex; justify-content: space-around; align-items: center;
            padding: 10px; border: 1px solid var(--fire-orange); box-shadow: 0 15px 40px rgba(255,69,0,0.3); z-index: 1000;
        }
        .nav-item { 
            display: flex; align-items: center; justify-content: center; 
            padding: 12px 18px; color: rgba(241,245,249,0.5); cursor: pointer; transition: 0.3s;
            border-radius: 30px;
        }
        .nav-item.active { background: rgba(255,69,0,0.1); color: var(--fire-orange); }
        .nav-item span { 
            max-width: 0; overflow: hidden; white-space: nowrap; 
            transition: 0.3s; font-weight: 700; font-size: 14px; 
        }
        .nav-item.active span { max-width: 80px; margin-left: 8px; text-shadow: 0 0 10px var(--fire-orange); }
        .nav-item svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2.2; }

    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="https://plain-eeur-prod-public.komododecks.com/202604/19/y0zyi6uOKg2CaNATvHPZ/image.png" class="splash-image">
    </div>

    <div class="header-bg"></div>

    <div class="app-container" id="main-app" style="opacity: 0; transition: 1.5s;">
        <div class="top-nav">
            <div class="menu-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </div>
            <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100" class="profile-img">
        </div>

        <h1 class="hero-title">Where do you <br><span>wanna go?</span></h1>

        <div class="search-wrapper">
            <span>🔍</span>
            <input type="text" placeholder="Ask Sidar AI anything...">
            <span style="color: var(--fire-orange)">🎤</span>
        </div>

        <div class="services-grid">
            <div class="service-card">
                <div class="icon-circle" style="background: rgba(224,231,255,0.1)">🌐</div>
                <span style="font-weight: 600; font-size: 14px;">eSIM</span>
            </div>
            <div class="service-card">
                <div class="icon-circle" style="background: rgba(255,237,213,0.1)">🎟️</div>
                <span style="font-weight: 600; font-size: 14px;">Events</span>
            </div>
            <div class="service-card">
                <div class="icon-circle" style="background: rgba(220,252,231,0.1)">💱</div>
                <span style="font-weight: 600; font-size: 14px;">Change</span>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="tab(this)">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
            <span>Home</span>
        </div>
        <div class="nav-item" onclick="tab(this)">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path><path d="M2 12h20"></path></svg>
            <span>Explore</span>
        </div>
        <div class="nav-item" onclick="tab(this)">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span>Profile</span>
        </div>
    </nav>

    <script>
        // Splash logic (إطالة الوقت قليلاً لتأثير الدراما)
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash-screen').style.display = 'none';
                    document.getElementById('main-app').style.opacity = '1';
                }, 800);
            }, 3000);
        });

        // Navigation Tab Logic
        function tab(el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
