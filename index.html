<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidar App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            background-color: #ffffff;
            font-family: sans-serif;
        }

        /* شريط التنقل السفلي - Bottom Navigation Bar */
        .bottom-nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 70px;
            background: #fff;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #eee;
            z-index: 1000;
        }

        .nav-item {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        /* تصغير وتنسيق أيقونة الريلز اللي أرفقتها */
        .nav-item img.reels-icon {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }

        /* تنسيق أيقونة الخريطة البارزة */
        .map-central-btn {
            position: relative;
            top: -25px; /* بروز بسيط مش مبالغ فيه */
            width: 60px;
            height: 60px;
            background: #000; /* جربنا الأسود الفخم بدل الألوان */
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .map-central-btn img {
            width: 30px;
            filter: brightness(0) invert(1); /* جعلها بيضاء */
        }

        .nav-item i {
            font-size: 24px;
            color: #333;
        }

        .nav-item span {
            font-size: 10px;
            color: #666;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <nav class="bottom-nav-bar">
        <a href="#" class="nav-item">
            <i class="fa-solid fa-house"></i>
        </a>

        <a href="#" class="nav-item">
            <img src="https://i.ibb.co/3yk8S7p/reels-icon.png" class="reels-icon" alt="Reels">
        </a>

        <a href="#" class="nav-item">
            <div class="map-central-btn">
                <img src="https://i.ibb.co/L8N7M9y/map-icon.png" alt="Map">
            </div>
        </a>

        <a href="#" class="nav-item">
            <i class="fa-solid fa-message"></i>
        </a>

        <a href="#" class="nav-item">
            <i class="fa-solid fa-user"></i>
        </a>
    </nav>

</body>
</html>
