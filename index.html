<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidarapp - Travel Services</title>
    <style>
        :root {
            --accent: #6c5ce7;
            --nav-bg: #ffffff;
            --bg-light: #f8faff;
            --text-main: #1a1a1a;
            --text-sub: #8e8e8e;
        }

        body { 
            margin: 0; 
            background-color: var(--bg-light); 
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        .app-container {
            padding: 25px 20px 120px 20px;
        }

        /* --- Header (Fixed) --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .greeting { font-size: 12px; color: var(--text-sub); text-transform: uppercase; font-weight: bold; }
        .user-name { font-size: 26px; font-weight: 800; color: var(--text-main); }

        /* --- Banner Carousel (Fixed with Dots) --- */
        .banner-carousel {
            height: 180px;
            position: relative;
            overflow: hidden;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.06);
            margin-bottom: 30px;
        }
        .slides-container { width: 100%; height: 100%; display: flex; transition: transform 0.6s ease; }
        .slide { min-width: 100%; height: 100%; background-size: cover; background-position: center; }
        .banner-dots {
            position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 6px;
        }
        .dot { width: 6px; height: 6px; background: rgba(255,255,255,0.5); border-radius: 50%; transition: 0.3s; }
        .dot.active { background: white; width: 15px; border-radius: 4px; }

        /* --- New: Services Section (Activities & E-sim) --- */
        .section-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 15px;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .service-card {
            background: white;
            padding: 20px;
            border-radius: 22px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            transition: transform 0.3s ease;
            cursor: pointer;
            border: 1px solid rgba(0,0,0,0.02);
        }

        .service-card:active { transform: scale(0.95); }

        .service-icon-box {
            width: 50px;
            height: 50px;
            background: rgba(108, 92, 231, 0.08);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }

        .service-icon {
            width: 26px;
            height: 26px;
            stroke: var(--accent);
            stroke-width: 2;
            fill: none;
        }

        .service-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
        }

        /* --- Bottom Nav (Fixed) --- */
        .bottom-nav {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 340px; background: var(--nav-bg);
            display: flex; justify-content: space-around; padding: 12px 0;
            border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); z-index: 1000;
        }
        .nav-item { position: relative; display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; border-radius: 50%; transition: 0.4s; }
        .nav-icon { width: 24px; height: 24px; stroke: #b2bec3; stroke-width: 2; fill: none; transition: 0.3s; }
        .nav-item.active { background: rgba(108, 92, 231, 0.08); transform: translateY(-8px); }
        .nav-item.active .nav-icon { stroke: var(--accent); }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="header">
            <div>
                <div id="greeting" class="greeting">GOOD MORNING</div>
                <div class="user-name">Alex Rivera</div>
            </div>
            <div style="background: white; padding: 10px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.03);">🔔</div>
        </header>

        <section class="banner-carousel">
            <div class="slides-container" id="slidesContainer">
                <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800');"></div>
                <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1519046904884-53103b34b206?w=800');"></div>
                <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1555400538-5fd41fe3e7e4?w=800');"></div>
            </div>
            <div class="banner-dots">
                <div class="dot active"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </section>

        <h2 class="section-title">Our Services</h2>
        <div class="services-grid">
            <div class="service-card">
                <div class="service-icon-box">
                    <svg class="service-icon" viewBox="0 0 24 24"><path d="M14.5 21l-5-5 5-5M8.5 21l-5-5 5-5M21 16H9"></path><circle cx="18" cy="6" r="3"></circle></svg>
                </div>
                <div class="service-name">Activities</div>
            </div>
            <div class="service-card">
                <div class="service-icon-box">
                    <svg class="service-icon" viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line><path d="M9 7h6"></path><path d="M9 11h6"></path></svg>
                </div>
                <div class="service-name">E-sim</div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg></div>
        <div class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M1 6v16l7-4 8 4 7-4V2l-7 4-8-4-7 4z"></path></svg></div>
        <div class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"></circle><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path></svg></div>
    </nav>

    <script>
        // Banner Logic
        let currentSlide = 0;
        const container = document.getElementById('slidesContainer');
        const dots = document.querySelectorAll('.dot');
        
        setInterval(() => {
            currentSlide = (currentSlide + 1) % 3;
            container.style.transform = `translateX(-${currentSlide * 100}%)`;
            dots.forEach(d => d.classList.remove('active'));
            dots[currentSlide].classList.add('active');
        }, 4000);

        // Greeting Logic
        const hours = new Date().getHours();
        const g = document.getElementById('greeting');
        if (hours < 12) g.innerText = "GOOD MORNING";
        else if (hours < 17) g.innerText = "GOOD AFTERNOON";
        else g.innerText = "GOOD EVENING";
    </script>
</body>
</html>
