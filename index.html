<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sidarapp - Stacked Cards Focus</title>
    
    <style>
        :root {
            --primary-lava: #ff4500; 
            --lava-glow: rgba(255, 69, 0, 0.4); 
            --lava-intense-glow: rgba(255, 69, 0, 0.8); 
            --text-main: #0f172a; 
        }

        .lava-text {
            color: var(--primary-lava);
            font-weight: 700;
        }

        body, html { 
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #splash-screen {
            position: fixed; inset: 0; background: #ffffff;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .splash-image { width: 180px; }

        .header-bg {
            position: absolute; top: 0; left: 0; right: 0; height: 55vh;
            background-size: cover; background-position: center;
            z-index: 0;
        }

        .header-bg::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.01) 0%, rgba(255, 255, 255, 0.05) 100%);
        }

        .app-container {
            position: relative; z-index: 1;
            padding: 60px 20px 120px; box-sizing: border-box;
            background: transparent;
        }

        .hero-title { font-size: 34px; font-weight: 800; line-height: 1.1; color: var(--text-main); margin-bottom: 25px; }
        .hero-title span { color: var(--primary-lava); }

        .search-wrapper {
            background: rgba(255,255,255,0.9); backdrop-filter: blur(15px);
            border-radius: 20px; padding: 12px 18px; display: flex; align-items: center;
            border: 2px solid var(--primary-lava); margin-bottom: 25px;
            position: relative;
        }
        
        .search-icon { z-index: 2; margin-right: 10px; font-size: 18px; }

        .search-wrapper input { 
            flex: 1; border: none; background: transparent; outline: none; 
            font-size: 16px; width: 100%; 
            position: relative; z-index: 2;
            color: var(--text-main);
        }

        .fake-placeholder {
            position: absolute;
            left: 45px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 16px;
            pointer-events: none;
            z-index: 1;
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        .search-wrapper input:focus + .fake-placeholder,
        .search-wrapper input:not(:placeholder-shown) + .fake-placeholder {
            opacity: 0;
        }

        .search-wrapper input::placeholder {
            color: transparent;
        }

        .services-scroll-container {
            display: flex; gap: 10px; overflow-x: auto; padding-bottom: 25px; scrollbar-width: none;
        }
        .services-scroll-container::-webkit-scrollbar { display: none; }
        .service-pill {
            display: flex; align-items: center; background: #ffffff; border: 1.5px solid #f1f5f9;
            padding: 8px 16px; border-radius: 50px; flex-shrink: 0; transition: 0.3s;
        }
        .service-pill.active { border-color: var(--primary-lava); color: var(--primary-lava); background: rgba(255, 69, 0, 0.05); }

        /* --- Stacked Cards Section --- */
        .stacked-cards-wrapper {
            position: relative; width: 100%; height: 320px;
            display: flex; justify-content: center; align-items: center;
            perspective: 1200px; margin-top: 10px;
        }

        /* أنيميشن لنبض الإطار فقط بدون توهج خارجي */
        @keyframes border-pulse {
            0% { border-color: rgba(255, 69, 0, 0.4); }
            50% { border-color: rgba(255, 69, 0, 1); }
            100% { border-color: rgba(255, 69, 0, 0.4); }
        }

        .card-item {
            position: absolute; width: 240px; height: 290px;
            border-radius: 35px; background-size: cover; background-position: center;
            transition: all 0.7s cubic-bezier(0.34, 1.56, 0.64, 1); 
            display: flex; align-items: flex-end; justify-content: center;
            padding-bottom: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            opacity: 0; pointer-events: none; overflow: hidden;
            cursor: pointer;
            border: 2.5px solid transparent; /* إطار أساسي */
        }

        .card-item.active { 
            opacity: 1; 
            transform: translateX(0) translateZ(50px) scale(1); 
            z-index: 10; 
            pointer-events: auto; 
            filter: blur(0);
            /* تفعيل نبض الإطار فقط */
            animation: border-pulse 2.5s infinite ease-in-out;
        }
        
        .card-item.prev { opacity: 0.45; transform: translateX(-115px) translateZ(-100px) scale(0.75); z-index: 5; filter: blur(1.5px); }
        .card-item.next { opacity: 0.45; transform: translateX(115px) translateZ(-100px) scale(0.75); z-index: 5; filter: blur(1.5px); }

        .see-more-btn {
            background: rgba(255, 255, 255, 0.25); backdrop-filter: blur(12px);
            color: #fff; border-radius: 50px; padding: 10px 40px;
            font-weight: 700; font-size: 13px; border: 1px solid rgba(255,255,255,0.3);
            text-transform: uppercase; letter-spacing: 0.5px;
        }

        #info-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px); z-index: 2000;
            display: flex; align-items: flex-end;
            visibility: hidden; opacity: 0; transition: 0.4s;
        }
        #info-overlay.open { visibility: visible; opacity: 1; }

        .info-content {
            width: 100%; background: #fff; border-radius: 40px 40px 0 0;
            padding: 40px 30px; box-sizing: border-box;
            transform: translateY(100%); transition: 0.5s cubic-bezier(0.32, 1, 0.23, 1);
            position: relative;
        }
        #info-overlay.open .info-content { transform: translateY(0); }

        .close-btn {
            position: absolute; top: 20px; right: 25px;
            width: 35px; height: 35px; background: #f1f5f9;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 22px; font-weight: bold; color: #64748b; cursor: pointer;
        }

        .info-tag { color: var(--primary-lava); font-weight: 700; font-size: 14px; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .info-title { font-size: 26px; font-weight: 800; margin: 0 0 15px 0; color: var(--text-main); }
        .info-desc { font-size: 16px; color: #64748b; line-height: 1.6; margin-bottom: 30px; }

        .dots-container { display: flex; justify-content: center; gap: 8px; margin-top: 20px; }
        .dot { width: 7px; height: 7px; background: #e2e8f0; border-radius: 50%; transition: 0.4s; }
        .dot.active { background: var(--primary-lava); width: 18px; border-radius: 10px; }

        .bottom-nav {
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: #ffffff; border-radius: 40px;
            display: flex; justify-content: space-around; align-items: center;
            padding: 8px; border: 2.5px solid var(--primary-lava);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); z-index: 1000;
        }
        .nav-item { display: flex; align-items: center; justify-content: center; padding: 10px 15px; color: #94a3b8; cursor: pointer; transition: 0.3s; border-radius: 30px; }
        .nav-item.active { background: rgba(255, 69, 0, 0.1); color: var(--primary-lava); }
        .nav-item span { max-width: 0; overflow: hidden; white-space: nowrap; transition: 0.3s; font-weight: 700; font-size: 14px; }
        .nav-item.active span { max-width: 80px; margin-left: 8px; }
        .nav-item svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2.2; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img id="splashLogo" src="" class="splash-image">
    </div>

    <div class="header-bg" id="heroBg"></div>

    <div class="app-container" id="main-app" style="opacity: 0; transition: 1s;">
        <h1 class="hero-title">Where do you <br><span>wanna go?</span></h1>

        <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" placeholder=" ">
            <div class="fake-placeholder">Ask <span class="lava-text">Sidar</span> any thing...</div>
        </div>
        <div class="services-scroll-container">
            <div class="service-pill"><span>🎟️ Events</span></div>
            <div class="service-pill"><span>📶 eSIM</span></div>
            <div class="service-pill active"><span>💱 Currency</span></div>
            <div class="service-pill"><span>💸 Transfer</span></div>
        </div>

        <div class="stacked-cards-wrapper" id="cardsWrapper">
            <div class="card-item" id="card0" onclick="showInfo(0)"><div class="see-more-btn">See More</div></div>
            <div class="card-item" id="card1" onclick="showInfo(1)"><div class="see-more-btn">See More</div></div>
            <div class="card-item" id="card2" onclick="showInfo(2)"><div class="see-more-btn">See More</div></div>
            <div class="card-item" id="card3" onclick="showInfo(3)"><div class="see-more-btn">See More</div></div>
        </div>

        <div class="dots-container" id="dotsContainer"></div>
    </div>

    <div id="info-overlay">
        <div class="info-content">
            <div class="close-btn" onclick="closeInfo()">×</div>
            <span class="info-tag" id="target-tag">Category</span>
            <h2 class="info-title" id="target-title">Location Name</h2>
            <p class="info-desc" id="target-desc">Description of the place goes here...</p>
            <div class="see-more-btn" style="background: var(--primary-lava); text-align: center; width: 100%; border: none;">Explore Now</div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="tab(this)"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg><span>Home</span></div>
        <div class="nav-item" onclick="tab(this)"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg><span>Map</span></div>
        <div class="nav-item" onclick="tab(this)"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line></svg><span>Reels</span></div>
        <div class="nav-item" onclick="tab(this)"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><span>Profile</span></div>
    </nav>

    <script>
        const MY_IMAGES = {
            splashLogo: 'https://plain-eeur-prod-public.komododecks.com/202604/19/y0zyi6uOKg2CaNATvHPZ/image.png',
            heroBackground: 'https://plain-eeur-prod-public.komododecks.com/202604/19/FtJXvAZvXREKew6PJ3ew/image.png',
            card0: 'https://plain-eeur-prod-public.komododecks.com/202604/19/Zs148rIHaZ5l8sjqw4S4/image.png',
            card1: 'https://plain-eeur-prod-public.komododecks.com/202604/19/xK3pwCpVUtFZFveFLbt2/image.png',
            card2: 'https://plain-eeur-prod-public.komododecks.com/202604/19/Ri6ookm2NesWdMC7Mcbc/image.png',
            card3: 'https://plain-eeur-prod-public.komododecks.com/202604/19/qzr51sWPt6GgM3gTZH8K/image.png'
        };

        const DATA = [
            { tag: "Natural", title: "Valley of Light", desc: "Discover the hidden beauty of the valley where the sun hits perfectly every morning." },
            { tag: "Adventure", title: "The High Peak", desc: "For those who love heights and snow, this peak offers the best view in the region." },
            { tag: "Peaceful", title: "Blue Shore", desc: "Relax by the crystal clear waters and enjoy the sound of the Mediterranean waves." },
            { tag: "Heritage", title: "Stone Temple", desc: "A place built thousands of years ago, holding the secrets of ancient travelers." }
        ];

        function applyImages() {
            document.getElementById('splashLogo').src = MY_IMAGES.splashLogo;
            document.getElementById('heroBg').style.backgroundImage = `url('${MY_IMAGES.heroBackground}')`;
            document.getElementById('card0').style.backgroundImage = `url('${MY_IMAGES.card0}')`;
            document.getElementById('card1').style.backgroundImage = `url('${MY_IMAGES.card1}')`;
            document.getElementById('card2').style.backgroundImage = `url('${MY_IMAGES.card2}')`;
            document.getElementById('card3').style.backgroundImage = `url('${MY_IMAGES.card3}')`;
        }

        let currentIndex = 0;
        const cards = document.querySelectorAll('.card-item');
        const dotsContainer = document.getElementById('dotsContainer');

        cards.forEach((_, i) => {
            const dot = document.createElement('div');
            dot.className = `dot ${i === 0 ? 'active' : ''}`;
            dotsContainer.appendChild(dot);
        });

        function updateCards() {
            cards.forEach((card, i) => {
                card.classList.remove('active', 'prev', 'next');
                if (i === currentIndex) card.classList.add('active');
                else if (i === (currentIndex - 1 + cards.length) % cards.length) card.classList.add('prev');
                else if (i === (currentIndex + 1) % cards.length) card.classList.add('next');
            });
            document.querySelectorAll('.dot').forEach((dot, i) => dot.classList.toggle('active', i === currentIndex));
        }

        function showInfo(index) {
            const item = DATA[index];
            document.getElementById('target-tag').innerText = item.tag;
            document.getElementById('target-title').innerText = item.title;
            document.getElementById('target-desc').innerText = item.desc;
            document.getElementById('info-overlay').classList.add('open');
        }

        function closeInfo() {
            document.getElementById('info-overlay').classList.remove('open');
        }

        window.addEventListener('load', () => {
            applyImages();
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash-screen').style.display = 'none';
                    document.getElementById('main-app').style.opacity = '1';
                    updateCards();
                }, 500);
            }, 2000);
        });

        setInterval(() => { 
            if(!document.getElementById('info-overlay').classList.contains('open')) {
                currentIndex = (currentIndex + 1) % cards.length; 
                updateCards(); 
            }
        }, 4000);

        function tab(el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
