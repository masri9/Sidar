<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sidarapp - Aligned & Balanced</title>
    
    <style>
        :root {
            --primary-lava: #ff4500; 
            --lava-glow: rgba(255, 69, 0, 0.4); 
            --text-main: #0f172a; 
        }

        .lava-text { color: var(--primary-lava); font-weight: 700; }

        body, html { 
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-page { display: none; animation: slideUp 0.4s ease-out; }
        .app-page.active { display: block; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Splash Screen --- */
        #splash-screen {
            position: fixed; inset: 0; background: #ffffff;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.5s ease;
        }
        .splash-image { width: 180px; }

        .header-bg {
            position: absolute; top: 0; left: 0; right: 0; height: 55vh;
            background-size: cover; background-position: center; z-index: 0;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .app-container {
            position: relative; z-index: 1;
            padding: 60px 20px 150px; box-sizing: border-box;
        }

        /* --- Hero Section & Robot --- */
        .hero-section { position: relative; }
        .hero-title { font-size: 34px; font-weight: 800; line-height: 1.1; color: var(--text-main); margin-bottom: 25px; }
        .hero-title span { color: var(--primary-lava); }

        .sidar-robot {
            position: absolute; right: 5px; top: -20px; width: 120px; z-index: 10;
            filter: drop-shadow(0 0 15px var(--lava-glow));
            animation: robotFloat 3s ease-in-out infinite;
        }

        @keyframes robotFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(2deg); }
        }

        /* --- Search Bar --- */
        .search-wrapper {
            background: rgba(255,255,255,0.9); backdrop-filter: blur(15px);
            border-radius: 20px; padding: 12px 18px; display: flex; align-items: center;
            border: 2px solid var(--primary-lava); margin-bottom: 25px; position: relative;
        }
        .search-wrapper input { flex: 1; border: none; background: transparent; outline: none; font-size: 16px; width: 100%; color: var(--text-main); }
        .fake-placeholder { position: absolute; left: 45px; top: 50%; transform: translateY(-50%); color: #94a3b8; pointer-events: none; z-index: 1; }

        /* --- 1. قسم القصص (الآن في مكانه الدقيق على الخط) --- */
        .stories-section-wrapper { margin-top: 95px; } /* تم النزول به ليتماشى مع خط الخلفية */
        .stories-container { display: flex; gap: 18px; overflow-x: auto; padding: 10px 5px 20px; scrollbar-width: none; }
        .story-item { flex-shrink: 0; width: 75px; text-align: center; }
        .story-ring { width: 70px; height: 70px; border-radius: 24px; padding: 3px; background: linear-gradient(45deg, var(--primary-lava), #ff8c00); box-shadow: 0 8px 15px var(--lava-glow); position: relative; }
        .story-ring img { width: 100%; height: 100%; border-radius: 21px; object-fit: cover; background: #fff; border: 2px solid #fff; }
        .live-tag { position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%); background: var(--primary-lava); color: #fff; font-size: 8px; padding: 2px 8px; border-radius: 10px; font-weight: 900; border: 2px solid #fff; }
        .story-item span { font-size: 11px; font-weight: 700; color: var(--text-main); display: block; margin-top: 5px; }

        /* --- 2. قسم البطاقات (تم إنزاله قليلاً ليعطي مساحة) --- */
        .stacked-cards-wrapper {
            position: relative; width: 100%; height: 260px;
            display: flex; justify-content: center; align-items: center;
            perspective: 1200px; margin-top: 50px; 
        }
        .card-item {
            position: absolute; width: 210px; height: 250px; 
            border-radius: 35px; background-size: cover; background-position: center;
            transition: all 0.7s cubic-bezier(0.34, 1.56, 0.64, 1); 
            display: flex; align-items: flex-end; justify-content: center;
            padding-bottom: 20px; opacity: 0; border: 2.5px solid transparent; 
        }
        .card-item.active { opacity: 1; transform: translateX(0) translateZ(50px) scale(1); z-index: 10; border-color: var(--primary-lava); box-shadow: 0 15px 35px rgba(255, 69, 0, 0.2); }
        .card-item.prev { opacity: 0.4; transform: translateX(-110px) scale(0.8); z-index: 5; }
        .card-item.next { opacity: 0.4; transform: translateX(110px) scale(0.8); z-index: 5; }

        .dots-container { display: flex; justify-content: center; gap: 8px; margin-top: 35px; }
        .dot { width: 6px; height: 6px; background: #e2e8f0; border-radius: 50%; transition: 0.4s; }
        .dot.active { background: var(--primary-lava); width: 15px; border-radius: 10px; }

        /* --- 3. قسم الخدمات (تم إنزاله أيضاً) --- */
        .services-section-wrapper { margin-top: 60px; }
        .section-header { margin-bottom: 15px; }
        .section-header h3 { font-size: 21px; font-weight: 900; color: var(--text-main); margin: 0; }
        .services-scroll-container { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .service-pill { background: #fff; border: 1.5px solid #f1f5f9; padding: 10px 20px; border-radius: 50px; flex-shrink: 0; font-weight: 700; font-size: 14px; }
        .service-pill.active { border-color: var(--primary-lava); color: var(--primary-lava); background: rgba(255, 69, 0, 0.05); }

        /* --- Navigation --- */
        .bottom-nav {
            position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 400px; background: #fff; border-radius: 40px;
            display: flex; justify-content: space-around; padding: 8px; 
            border: 2px solid var(--primary-lava); z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .nav-item { display: flex; align-items: center; padding: 10px 15px; color: #94a3b8; border-radius: 30px; transition: 0.3s; }
        .nav-item.active { background: rgba(255, 69, 0, 0.1); color: var(--primary-lava); }
        .nav-item svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2.2; }
    </style>
</head>
<body>

    <div id="splash-screen"><img id="splashLogo" src="" class="splash-image"></div>
    <div class="header-bg" id="heroBg"></div>

    <div class="app-container" id="main-app" style="opacity: 0; transition: 1s;">
        
        <div id="home-page" class="app-page active">
            <div class="hero-section">
                <img src="https://plain-eeur-prod-public.komododecks.com/202604/20/zpRwsd9YMgeCmtSTOjFQ/image.png" class="sidar-robot">
                <h1 class="hero-title">Where do you <br><span>wanna go?</span></h1>
            </div>

            <div class="search-wrapper">
                <input type="text" placeholder=" ">
                <div class="fake-placeholder">Ask <span class="lava-text">Sidar</span> any thing...</div>
            </div>

            <div class="stories-section-wrapper">
                <div class="stories-container">
                    <div class="story-item"><div class="story-ring"><img src="https://i.pravatar.cc/150?u=a"><div class="live-tag">Live</div></div><span>Alex</span></div>
                    <div class="story-item"><div class="story-ring"><img src="https://i.pravatar.cc/150?u=b"></div><span>Sarah</span></div>
                    <div class="story-item"><div class="story-ring"><img src="https://i.pravatar.cc/150?u=c"></div><span>Yasin</span></div>
                    <div class="story-item"><div class="story-ring"><img src="https://i.pravatar.cc/150?u=d"><div class="live-tag">Live</div></div><span>Mona</span></div>
                </div>
            </div>

            <div class="stacked-cards-wrapper" id="cardsWrapper">
                <div class="card-item" id="card0"></div>
                <div class="card-item" id="card1"></div>
                <div class="card-item" id="card2"></div>
                <div class="card-item" id="card3"></div>
            </div>
            <div class="dots-container" id="dotsContainer"></div>

            <div class="services-section-wrapper">
                <div class="section-header"><h3>Explore Services</h3></div>
                <div class="services-scroll-container">
                    <div class="service-pill"><span>🎟️ Events</span></div>
                    <div class="service-pill"><span>📶 eSIM</span></div>
                    <div class="service-pill active"><span>💱 Currency</span></div>
                </div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg></div>
        <div class="nav-item"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg></div>
        <div class="nav-item"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"></rect></svg></div>
        <div class="nav-item"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path></svg></div>
    </nav>

    <script>
        const MY_IMAGES = {
            splashLogo: 'https://plain-eeur-prod-public.komododecks.com/202604/19/y0zyi6uOKg2CaNATvHPZ/image.png',
            heroBackground: 'https://plain-eeur-prod-public.komododecks.com/202604/19/FtJXvAZvXREKew6PJ3ew/image.png',
            card0: 'https://plain-eeur-prod-public.komododecks.com/202604/19/Zs148rIHaZ5l8sjqw4S4/image.png',
            card1: 'https://plain-eeur-prod-public.komododecks.com/202604/19/xK3pwCpVUtFZFveFLbt2/image.png',
            card2: 'https://plain-eeur-prod-public.komododecks.com/202604/19/Ri6ookm2NesWdMC7Mcbc/image.png',
            card3: 'https://plain-eeur-prod-public.komododecks.com/202604/19/qzr51sWPt6GgM3gTZH8K/image.png'
        };

        function applyImages() {
            document.getElementById('splashLogo').src = MY_IMAGES.splashLogo;
            document.getElementById('heroBg').style.backgroundImage = `url('${MY_IMAGES.heroBackground}')`;
            document.getElementById('card0').style.backgroundImage = `url('${MY_IMAGES.card0}')`;
            document.getElementById('card1').style.backgroundImage = `url('${MY_IMAGES.card1}')`;
            document.getElementById('card2').style.backgroundImage = `url('${MY_IMAGES.card2}')`;
            document.getElementById('card3').style.backgroundImage = `url('${MY_IMAGES.card3}')`;
        }

        let currentIndex = 0;
        const cards = document.querySelectorAll('.card-item');

        function updateCards() {
            cards.forEach((card, i) => {
                card.classList.remove('active', 'prev', 'next');
                if (i === currentIndex) card.classList.add('active');
                else if (i === (currentIndex - 1 + cards.length) % cards.length) card.classList.add('prev');
                else if (i === (currentIndex + 1) % cards.length) card.classList.add('next');
            });
            document.querySelectorAll('.dot').forEach((dot, i) => dot.classList.toggle('active', i === currentIndex));
        }

        window.addEventListener('load', () => {
            applyImages();
            const dotsContainer = document.getElementById('dotsContainer');
            cards.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = `dot ${i === 0 ? 'active' : ''}`;
                dotsContainer.appendChild(dot);
            });
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash-screen').style.display = 'none';
                    document.getElementById('main-app').style.opacity = '1';
                    updateCards();
                }, 500);
            }, 2000);
        });

        setInterval(() => { 
            currentIndex = (currentIndex + 1) % cards.length; 
            updateCards(); 
        }, 4000);
    </script>
</body>
</html>
