<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidarapp - Minimal View</title>
    <style>
        :root {
            --primary-blue: #2563eb;
            --light-blue: #dbeafe;
            --text-sub: #64748b;
            --nav-bg: rgba(255, 255, 255, 0.95);
        }

        body, html { 
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            background-color: #ffffff; /* باقي الصفحة أبيض */
            overflow: hidden;
        }

        /* --- الخلفية مع التلاشي --- */
        .background-section {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 40%; /* تغطي الربع الأول تقريباً مع مساحة للتلاشي */
            z-index: -1;
            background: linear-gradient(to bottom, 
                transparent 60%, 
                #ffffff 100%), 
                url('https://plain-eeur-prod-public.komododecks.com/202604/19/6uv75dbjqW2zwfkHuGPq/image.png');
            background-size: cover;
            background-position: center;
        }

        /* --- شريط التنقل السفلي (ثابت تماماً كما هو) --- */
        .bottom-nav-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 420px;
            background: var(--nav-bg);
            backdrop-filter: blur(25px);
            padding: 8px 12px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(37, 99, 235, 0.15);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.3);
            z-index: 100;
        }

        .nav-item {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 16px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 22px;
            color: var(--text-sub);
        }

        .nav-item svg { width: 24px; height: 24px; stroke: currentColor; stroke-width: 2.2; fill: none; }
        
        .nav-item.active {
            background: var(--light-blue);
            color: var(--primary-blue);
        }

        .nav-text {
            max-width: 0;
            overflow: hidden;
            white-space: nowrap;
            font-size: 14px;
            font-weight: 700;
            transition: all 0.4s ease;
            opacity: 0;
        }

        .nav-item.active .nav-text {
            max-width: 80px;
            margin-left: 10px;
            opacity: 1;
        }

    </style>
</head>
<body>

    <div class="background-section"></div>

    <nav class="bottom-nav-container">
        <div class="nav-item active" onclick="setActive(this)">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            <span class="nav-text">Home</span>
        </div>
        <div class="nav-item" onclick="setActive(this)">
            <svg viewBox="0 0 24 24"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon></svg>
            <span class="nav-text">Map</span>
        </div>
        <div class="nav-item" onclick="setActive(this)">
            <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5"></rect><path d="M10 8l6 4-6 4V8z" fill="currentColor" opacity="0.3"></path></svg>
            <span class="nav-text">Reels</span>
        </div>
        <div class="nav-item" onclick="setActive(this)">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span class="nav-text">Profile</span>
        </div>
    </nav>

    <script>
        function setActive(el) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
