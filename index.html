<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidar App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #ffffff; /* صفحة بيضاء بالكامل */
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* محتوى الصفحة الرئيسي */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* الشريط السفلي */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: #fff;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
            padding: 0 10px;
            z-index: 1000;
        }

        .nav-item {
            text-decoration: none;
            color: #666;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            transition: 0.3s;
        }

        .nav-item i {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .nav-item span {
            font-size: 10px;
            font-weight: 600;
        }

        /* الزر الأوسط البارز (الخريطة) */
        .nav-item.map-center {
            position: relative;
            z-index: 1001;
        }

        .map-circle {
            position: absolute;
            top: -45px; /* رفع الدائرة للأعلى */
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, #2A70DC, #00C7B7); /* دائرة ملونة بارزة */
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            box-shadow: 0 8px 15px rgba(42, 112, 220, 0.3);
            border: 5px solid #fff; /* إطار أبيض لفصله عن الخلفية */
            transition: transform 0.3s ease;
        }

        .map-circle i {
            font-size: 24px;
            margin: 0;
        }

        .map-circle:hover {
            transform: scale(1.1);
        }

        /* تفاعل الأزرار */
        .nav-item:active {
            transform: scale(0.9);
        }
    </style>
</head>
<body>

    <div class="main-content">
        </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-play"></i>
            <span>Reels</span>
        </a>

        <a href="#" class="nav-item map-center">
            <div class="map-circle">
                <i class="fa-solid fa-map-location-dot"></i>
            </div>
            <span style="margin-top: 35px;">Map</span>
        </a>

        <a href="#" class="nav-item">
            <i class="fa-solid fa-comment-dots"></i>
            <span>Messages</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-user"></i>
            <span>Profile</span>
        </a>
    </nav>

</body>
</html>
