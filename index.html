<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sidarapp - Aligned Edition</title>
    
    <style>
        :root {
            --primary-lava: #ff4500; 
            --lava-glow: rgba(255, 69, 0, 0.4); 
            --text-main: #0f172a; 
        }

        body, html { 
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-container {
            position: relative; z-index: 1;
            padding: 60px 20px 150px; box-sizing: border-box;
        }

        .header-bg {
            position: absolute; top: 0; left: 0; right: 0; height: 55vh;
            background-size: cover; background-position: center; z-index: 0;
        }

        /* --- Hero & Robot --- */
        .hero-section { position: relative; margin-bottom: 20px; }
        .hero-title { font-size: 34px; font-weight: 800; line-height: 1.1; color: var(--text-main); margin: 0; }
        .hero-title span { color: var(--primary-lava); }

        .sidar-robot {
            position: absolute; right: 0; top: -10px; width: 100px; z-index: 10;
            animation: robotFloat 3s ease-in-out infinite;
        }

        @keyframes robotFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* --- Search Bar --- */
        .search-wrapper {
            background: #fff;
            border-radius: 20px; padding: 12px 18px; display: flex; align-items: center;
            border: 2.5px solid var(--primary-lava); position: relative; margin-bottom: 10px;
        }
        .search-wrapper input { border: none; background: transparent; outline: none; font-size: 16px; width: 100%; }

        /* --- قسم القصص: تم ضبطه لينزل على الخط تماماً --- */
        .stories-container { 
            display: flex; gap: 15px; overflow-x: auto; 
            padding: 10px 0; 
            margin-top: 105px; /* هذه القيمة هي التي تضع الصور على خط الخلفية */
            scrollbar-width: none;
        }
        .story-item { flex-shrink: 0; width: 75px; text-align: center; }
        .story-ring { 
            width: 72px; height: 72px; border-radius: 22px; padding: 3px; 
            background: linear-gradient(45deg, var(--primary-lava), #ff8c00); 
            position: relative; box-shadow: 0 4px 12px var(--lava-glow);
        }
        .story-ring img { width: 100%; height: 100%; border-radius: 19px; object-fit: cover; background: #fff; border: 2px solid #fff; }
        .live-tag { position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%); background: var(--primary-lava); color: #fff; font-size: 8px; padding: 1px 7px; border-radius: 10px; font-weight: 900; border: 2px solid #fff; }
        .story-item span { font-size: 11px; font-weight: 800; color: var(--text-main); display: block; margin-top: 8px; }

        /* --- Cards Section --- */
        .stacked-cards-wrapper { 
            position: relative; width: 100%; height: 260px; 
            display: flex; justify-content: center; align-items: center; 
            perspective: 1000px; 
            margin-top: 60px; 
        }
        .card-item { 
            position: absolute; width: 220px; height: 260px; border-radius: 35px; 
            background-size: cover; background-position: center; transition: 0.8s; 
            opacity: 0; border: 2.5px solid var(--primary-lava);
        }
        .card-item.active { opacity: 1; transform: translateZ(50px); z-index: 10; }

        /* --- Navigation --- */
        .bottom-nav { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: #fff; border-radius: 40px; display: flex; justify-content: space-around; padding: 10px; border: 2.5px solid var(--primary-lava); z-index: 1000; }
        .nav-item { color: #94a3b8; padding: 8px 15px; border-radius: 25px; display: flex; align-items: center; }
        .nav-item.active { background: rgba(255, 69, 0, 0.1); color: var(--primary-lava); }
        .nav-item svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2.5; }
        .nav-item span { font-weight: 800; margin-left: 8px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header-bg" id="heroBg"></div>

    <div class="app-container">
        <div class="hero-section">
            <img src="https://plain-eeur-prod-public.komododecks.com/202604/20/zpRwsd9YMgeCmtSTOjFQ/image.png" class="sidar-robot">
            <h1 class="hero-title">Where do you <br><span>wanna go?</span></h1>
        </div>

        <div class="search-wrapper">
            <input type="text" placeholder="Ask Sidar any thing...">
        </div>

        <div class="stories-container">
            <div class="story-item"><div class="story-ring"><img src="https://i.pravatar.cc/150?u=1"><div class="live-tag">Live</div></div><span>Alex</span></div>
            <div class="story-item"><div class="story-ring"><img src="https://i.pravatar.cc/150?u=2"></div><span>Sarah</span></div>
            <div class="story-item"><div class="story-ring"><img src="https://i.pravatar.cc/150?u=3"></div><span>Yasin</span></div>
            <div class="story-item"><div class="story-ring"><img src="https://i.pravatar.cc/150?u=4"><div class="live-tag">Live</div></div><span>Mona</span></div>
        </div>

        <div class="stacked-cards-wrapper">
            <div class="card-item active" id="card0"></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg><span>Home</span></div>
        <div class="nav-item"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path></svg></div>
        <div class="nav-item"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"></rect></svg></div>
        <div class="nav-item"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path></svg></div>
    </nav>

    <script>
        const MY_IMAGES = {
            heroBackground: 'https://plain-eeur-prod-public.komododecks.com/202604/19/FtJXvAZvXREKew6PJ3ew/image.png',
            card0: 'https://plain-eeur-prod-public.komododecks.com/202604/19/Zs148rIHaZ5l8sjqw4S4/image.png'
        };

        document.getElementById('heroBg').style.backgroundImage = `url('${MY_IMAGES.heroBackground}')`;
        document.getElementById('card0').style.backgroundImage = `url('${MY_IMAGES.card0}')`;
    </script>
</body>
</html>
