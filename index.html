<style>

        margin: 40px 0 10px; display: flex; align-items: center; gap: 10px;
    }

    .world-map-container {
        width: 100%;
        height: 220px;
        position: relative;
        overflow: hidden;

        background-image: url('https://upload.wikimedia.org/wikipedia/commons/e/ec/World_Map_Blank.svg');
