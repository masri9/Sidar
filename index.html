<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sidarapp - Fixed Professional</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        :root {
            --primary-blue: #2563eb;
            --light-blue-bg: #eef2ff;
            --text-main: #0f172a; 
            --accent-blue: #3b82f6; 
        }

        body, html { 
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden; /* تثبيت الهيكل الرئيسي */
            height: 100vh;
            background: #fff;
        }

        /* --- Splash Screen --- */
        #splash-screen {
            position: fixed; inset: 0; background: #ffffff;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
        }
        .splash-image { width: 160px; animation: splashEntrance 1.5s ease-out forwards; }
        @keyframes splashEntrance { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* --- Background Header --- */
        .header-bg {
            position: absolute; top: 0; left: 0; right: 0; height: 45vh;
            background: linear-gradient(rgba(255,255,255,0.1), #fff), 
                        url('https://plain-eeur-prod-public.komododecks.com/202604/19/FtJXvAZvXREKew6PJ3ew/image.png');
            background-size: cover; background-position: center;
            z-index: 0;
        }

        /* --- Main Scroller (لضمان عدم اهتزاز الصفحة) --- */
        .app-container {
            position: relative; z-index: 1;
            height: 100vh; overflow-y: auto; overflow-x: hidden;
            padding: 20px 20px 120px; box-sizing: border-box;
            scrollbar-width: none;
        }
        .app-container::-webkit-scrollbar { display: none; }

        /* --- Top Nav --- */
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .menu-icon { background: white; padding: 10px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .profile-img { width: 42px; height: 42px; border-radius: 12px; border: 2px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        .hero-title { font-size: 34px; font-weight: 800; line-height: 1.1; color: var(--text-main); margin-bottom: 25px; }
        .hero-title span { color: var(--primary-blue); }

        /* --- Search Bar --- */
        .search-wrapper {
            background: rgba(255,255,255,0.85); backdrop-filter: blur(15px);
            border-radius: 20px; padding: 12px 18px; display: flex; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 30px;
        }
        .search-wrapper input { flex: 1; border: none; background: transparent; outline: none; padding-left: 10px; font-size: 16px; font-weight: 500; }

        /* --- Services Grid --- */
        .services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        .service-card {
            background: rgba(255,255,255,0.6); border-radius: 22px; padding: 15px 5px;
            display: flex; flex-direction: column; align-items: center;
            border: 1px solid rgba(255,255,255,0.4); transition: 0.3s;
        }
        .service-card.active { background: white; border-color: var(--primary-blue); transform: translateY(-3px); }
        .icon-circle { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        /* --- Widget Area --- */
        #widget-display {
            background: white; border-radius: 25px; padding: 20px; margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); display: none;
            animation: slideUp 0.4s ease;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Professional Carousel (كما في الصورة) --- */
        .carousel-title { font-size: 20px; font-weight: 800; margin-bottom: 15px; color: var(--text-main); }
        .carousel-wrapper {
            display: flex; align-items: center; justify-content: center;
            gap: 15px; perspective: 1000px;
        }
        .card {
            width: 170px; height: 240px; border-radius: 28px;
            overflow: hidden; position: relative; transition: 0.5s ease;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        .card.side { transform: scale(0.85); opacity: 0.6; filter: blur(1px); }
        .card.main { width: 210px; height: 280px; z-index: 10; transform: scale(1.05); }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-btn {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #000; color: #fff; border: none; padding: 10px 22px;
            border-radius: 25px; font-size: 13px; font-weight: 600;
        }

        /* --- Bottom Nav (مطابق للصورة تماماً) --- */
        .bottom-nav {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: #fff; border-radius: 50px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 12px; box-shadow: 0 15px 40px rgba(0,0,0,0.08); z-index: 1000;
        }
        .nav-item { display: flex; align-items: center; padding: 12px 20px; color: #94a3b8; cursor: pointer; transition: 0.3s; }
        .nav-item.active { background: var(--light-blue-bg); color: var(--primary-blue); border-radius: 35px; }
        .nav-item span { display: none; margin-left: 10px; font-weight: 700; font-size: 15px; }
        .nav-item.active span { display: inline; }
        .nav-item svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2.2; }

    </style>
</head>
<body>

    <div id="splash-screen"><img src="https://plain-eeur-prod-public.komododecks.com/202604/19/y0zyi6uOKg2CaNATvHPZ/image.png" class="splash-image"></div>

    <div class="header-bg"></div>

    <div class="app-container" id="main-app" style="opacity: 0; transition: 1s;">
        <div class="top-nav">
            <div class="menu-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></div>
            <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100" class="profile-img">
        </div>

        <h1 class="hero-title">Where do you <br><span>wanna go?</span></h1>

        <div class="search-wrapper">
            <span>🔍</span>
            <input type="text" placeholder="Ask Sidar AI anything...">
            <span style="color: var(--primary-blue)">🎤</span>
        </div>

        <div class="services-grid">
            <div class="service-card" onclick="openWidget('eSIM', this)">
                <div class="icon-circle" style="background: #e0e7ff">🌐</div>
                <span>eSIM</span>
            </div>
            <div class="service-card" onclick="openWidget('Events', this)">
                <div class="icon-circle" style="background: #ffedd5">🎟️</div>
                <span>Events</span>
            </div>
            <div class="service-card" onclick="openWidget('Change', this)">
                <div class="icon-circle" style="background: #dcfce7">💱</div>
                <span>Change</span>
            </div>
        </div>

        <div id="widget-display">
            <h3 id="w-title" style="margin:0 0 10px 0; color: var(--primary-blue);"></h3>
            <div id="w-body" style="font-size: 14px; color: #64748b;">Loading specialized content...</div>
        </div>

        <div class="carousel-section">
            <h2 class="carousel-title">Recommended</h2>
            <div class="carousel-wrapper">
                <div class="card side"><img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=300"></div>
                <div class="card main">
                    <img src="https://images.unsplash.com/photo-1506929113675-b92417bbbe8d?w=400">
                    <button class="card-btn">See More</button>
                </div>
                <div class="card side"><img src="https://images.unsplash.com/photo-1519046904884-53103b34b206?w=300"></div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="tab(this)">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
            <span>Home</span>
        </div>
        <div class="nav-item" onclick="tab(this)">
            <svg viewBox="0 0 24 24"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon></svg>
            <span>Map</span>
        </div>
        <div class="nav-item" onclick="tab(this)">
            <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5"></rect><path d="M10 8l6 4-6 4V8z"></path></svg>
            <span>Reels</span>
        </div>
        <div class="nav-item" onclick="tab(this)">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span>Profile</span>
        </div>
    </nav>

    <script>
        // Splash logic
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('splash-screen').style.display = 'none';
                document.getElementById('main-app').style.opacity = '1';
            }, 2500);
        });

        // Widget Logic
        function openWidget(type, el) {
            document.querySelectorAll('.service-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            const box = document.getElementById('widget-display');
            document.getElementById('w-title').innerText = type + " Service";
            box.style.display = 'block';
            box.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        // Navigation Tab Logic
        function tab(el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
