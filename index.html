<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidarapp - Travel UI</title>
    <style>
        :root {
            --bg-light: #f8faff; /* خلفية فاتحة جداً مريحة للعين */
            --text-dark: #1a1a1a;
            --accent-purple: #6c5ce7; /* لون الأيقونة النشطة */
            --nav-bg: #ffffff;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
        }

        .app-container {
            padding: 30px 20px 120px 20px;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* الهيدر العلوي */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .greeting { font-size: 14px; color: #8e8e8e; text-transform: uppercase; letter-spacing: 1px; }
        .user-name { font-size: 28px; font-weight: 800; color: var(--text-dark); margin-top: 5px; }

        /* البانر التفاعلي */
        .banner {
            height: 200px;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800');
            background-size: cover;
            background-position: center;
            border-radius: 30px;
            display: flex;
            align-items: flex-end;
            padding: 25px;
            color: white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .banner-title { font-size: 24px; font-weight: 700; line-height: 1.2; }

        /* شريط التنقل السفلي - التصميم المطلوب */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background: var(--nav-bg);
            display: flex;
            justify-content: space-around;
            padding: 20px 0 35px 0; /* مساحة إضافية للسحب في الهواتف */
            box-shadow: 0 -10px 40px rgba(0,0,0,0.04);
            border-radius: 40px 40px 0 0; /* حواف مستديرة جداً من الأعلى */
            z-index: 1000;
        }

        .nav-item {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
        }

        /* تنسيق الأيقونات الخطية (SVG) */
        .nav-icon {
            width: 28px;
            height: 28px;
            stroke: #b2bec3; /* لون الأيقونات غير النشطة */
            stroke-width: 2;
            fill: none;
            transition: 0.3s;
        }

        /* حالة النشاط (Active State) */
        .nav-item.active .nav-icon {
            stroke: var(--accent-purple);
            filter: drop-shadow(0 0 8px rgba(108, 92, 231, 0.3)); /* توهج بسيط */
        }

        /* النقطة الصغيرة تحت الأيقونة النشطة */
        .nav-item.active::after {
            content: '';
            position: absolute;
            bottom: -10px;
            width: 5px;
            height: 5px;
            background: var(--accent-purple);
            border-radius: 50%;
        }

    </style>
</head>
<body>

    <div class="app-container">
        <header class="header">
            <div>
                <div class="greeting">Good Morning ✨</div>
                <div class="user-name">Alex Rivera</div>
            </div>
            <div style="background: white; padding: 12px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05);">
                🔔
            </div>
        </header>

        <div class="banner">
            <div class="banner-title">Explore the<br>Swiss Alps</div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
        </div>
        <div class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M1 6v16l7-4 8 4 7-4V2l-7 4-8-4-7 4z"></path></svg>
        </div>
        <div class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"></circle><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path></svg>
        </div>
    </nav>

</body>
</html>
