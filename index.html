<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sidarapp - Lava Scroll Edition</title>
    
    <style>
        :root {
            --primary-lava: #ff4500; 
            --lava-glow: rgba(255, 69, 0, 0.4); 
            --lava-intense-glow: rgba(255, 69, 0, 0.8); 
            --text-main: #0f172a; 
        }

        body, html { 
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            background: #fff;
        }

        /* --- Splash Screen --- */
        #splash-screen {
            position: fixed; inset: 0; background: #ffffff;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .splash-image { 
            width: 180px; 
            filter: drop-shadow(0 0 15px var(--lava-intense-glow)); 
            animation: splashEntrance 1.5s ease-out forwards, pulseGlow 2.5s infinite 1.5s; 
        }
        @keyframes pulseGlow {
            0%, 100% { filter: drop-shadow(0 0 10px var(--lava-glow)); transform: scale(1); }
            50% { filter: drop-shadow(0 0 25px var(--lava-intense-glow)); transform: scale(1.03); }
        }
        @keyframes splashEntrance { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* --- Hero Background --- */
        .header-bg {
            position: absolute; top: 0; left: 0; right: 0; height: 48vh;
            background: 
                linear-gradient(to bottom, rgba(255, 69, 0, 0.05), #fff 90%), 
                url('https://plain-eeur-prod-public.komododecks.com/202604/19/FtJXvAZvXREKew6PJ3ew/image.png');
            background-size: cover; 
            background-position: center;
            z-index: 0;
            filter: saturate(1.4) sepia(0.1); 
        }

        .header-bg::after {
            content: '';
            position: absolute; inset: 0;
            background: radial-gradient(circle at top right, rgba(255, 69, 0, 0.15), transparent 70%);
            pointer-events: none;
        }

        .app-container {
            position: relative; z-index: 1;
            height: 100vh; overflow-y: auto;
            padding: 60px 20px 120px; box-sizing: border-box;
            scrollbar-width: none;
        }

        /* --- Hero Text --- */
        .hero-title { 
            font-size: 34px; font-weight: 800; line-height: 1.1; color: var(--text-main); 
            margin-bottom: 25px; margin-top: 20px; 
        }
        .hero-title span { 
            color: var(--primary-lava); 
            text-shadow: 0 0 15px rgba(255, 69, 0, 0.2);
        }

        /* --- Search Bar --- */
        .search-wrapper {
            background: rgba(255,255,255,0.92); backdrop-filter: blur(15px);
            border-radius: 20px; padding: 12px 18px; display: flex; align-items: center;
            border: 2px solid var(--primary-lava); 
            box-shadow: 0 0 15px var(--lava-glow), 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 35px;
        }
        .search-wrapper input { flex: 1; border: none; background: transparent; outline: none; padding-left: 10px; font-size: 16px; font-weight: 500; }
        .search-wrapper span { color: var(--primary-lava); }

        /* --- Scrolling Services Bar (الشريط المتحرك) --- */
        .services-scroll-container {
            width: 100%;
            overflow-x: auto;
            padding: 10px 0 25px;
            display: flex;
            gap: 15px;
            scrollbar-width: none; /* إخفاء السكرول بار */
            -ms-overflow-style: none;
        }
        .services-scroll-container::-webkit-scrollbar { display: none; }

        .service-card {
            min-width: 130px;
            background: linear-gradient(135deg, #ff4500 0%, #ff8c00 100%);
            border-radius: 24px;
            padding: 20px 10px;
            text-align: center;
            box-shadow: 0 8px 20px var(--lava-glow);
            transition: 0.3s;
            flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .service-card:active { transform: scale(0.95); }

        .service-icon-box {
            width: 50px; height: 50px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 12px;
            font-size: 24px;
            color: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .service-label { 
            color: #fff; 
            font-weight: 700; 
            font-size: 13px; 
            letter-spacing: 0.3px;
        }

        /* --- Bottom Nav --- */
        .bottom-nav {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; 
            background: #ffffff; border-radius: 40px;
            display: flex; justify-content: space-around; align-items: center;
            padding: 8px; 
            border: 2px solid var(--primary-lava);
            box-shadow: 0 0 20px var(--lava-glow);
            z-index: 1000;
        }
        .nav-item { 
            display: flex; align-items: center; justify-content: center; 
            padding: 10px 15px; color: #94a3b8; cursor: pointer; transition: 0.3s;
            border-radius: 30px;
        }
        .nav-item.active { background: rgba(255, 69, 0, 0.1); color: var(--primary-lava); }
        .nav-item span { max-width: 0; overflow: hidden; white-space: nowrap; transition: 0.3s; font-weight: 700; font-size: 14px; }
        .nav-item.active span { max-width: 80px; margin-left: 8px; }
        .nav-item svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2.2; }

    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="https://plain-eeur-prod-public.komododecks.com/202604/19/y0zyi6uOKg2CaNATvHPZ/image.png" class="splash-image">
    </div>

    <div class="header-bg"></div>

    <div class="app-container" id="main-app" style="opacity: 0; transition: 1s;">
        
        <h1 class="hero-title">Where do you <br><span>wanna go?</span></h1>

        <div class="search-wrapper">
            <span>🔍</span>
            <input type="text" placeholder="Ask Sidar AI anything...">
            <span style="font-size: 20px;">🎤</span>
        </div>

        <div class="services-scroll-container">
            <div class="service-card">
                <div class="service-icon-box">🎟️</div>
                <span class="service-label">Book Events</span>
            </div>
            <div class="service-card">
                <div class="service-icon-box">📶</div>
                <span class="service-label">eSIM</span>
            </div>
            <div class="service-card">
                <div class="service-icon-box">💰</div>
                <span class="service-label">Change</span>
            </div>
            <div class="service-card">
                <div class="service-icon-box">🔄</div>
                <span class="service-label">Transfer</span>
            </div>
            <div class="service-card">
                <div class="service-icon-box">✈️</div>
                <span class="service-label">Flights</span>
            </div>
        </div>

    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="tab(this)">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
            <span>Home</span>
        </div>
        <div class="nav-item" onclick="tab(this)">
            <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
            <span>Map</span>
        </div>
        <div class="nav-item" onclick="tab(this)">
            <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
            <span>Reels</span>
        </div>
        <div class="nav-item" onclick="tab(this)">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span>Profile</span>
        </div>
    </nav>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash-screen').style.display = 'none';
                    document.getElementById('main-app').style.opacity = '1';
                }, 500);
            }, 2500);
        });

        function tab(el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
