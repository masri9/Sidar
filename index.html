<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidarapp - Official</title>
    <style>
        :root {
            --primary-blue: #2563eb;
            --light-blue: #dbeafe;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --nav-bg: rgba(255, 255, 255, 0.95);
        }

        body, html { 
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* --- شاشة الـ Splash (ثابتة) --- */
        #splash-screen {
            position: fixed; inset: 0; background: #ffffff;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1), visibility 1s;
        }
        .splash-image { width: 180px; height: auto; animation: splashEntrance 1.5s ease-out forwards; }

        @keyframes splashEntrance {
            0% { transform: scale(0.8); opacity: 0; filter: blur(10px); }
            100% { transform: scale(1); opacity: 1; filter: blur(0); }
        }

        /* --- واجهة الـ Home (ثابتة تماماً) --- */
        .background-container {
            position: fixed; inset: 0; z-index: -1;
            background-image: url('https://plain-eeur-prod-public.komododecks.com/202604/19/FtJXvAZvXREKew6PJ3ew/image.png'); 
            background-size: cover; background-position: center;
        }

        .app-container {
            height: 100vh; padding: 30px 25px;
            display: flex; flex-direction: column; justify-content: space-between;
            box-sizing: border-box; opacity: 0; 
            transition: opacity 1.2s ease;
        }

        .header { display: flex; justify-content: space-between; align-items: center; }
        .greeting { font-size: 14px; color: var(--text-sub); font-weight: 600; }
        .user-name { font-size: 28px; font-weight: 800; color: var(--text-main); margin-top: 4px; }
        .notif-icon { background: white; padding: 12px; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        /* --- إضافة قسم جديد في الوسط (بدون تغيير القديم) --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            padding: 25px;
            border-radius: 30px;
            width: 85%;
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            animation: slideUp 1s ease-out 2.5s forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-card h3 { color: var(--primary-blue); margin: 0; font-size: 18px; }
        .hero-card p { color: var(--text-sub); font-size: 14px; margin: 10px 0 0 0; line-height: 1.5; }

        /* --- شريط التنقل (ثابت تماماً) --- */
        .bottom-nav-container {
            align-self: center; margin-bottom: 30px;
            width: 92%; max-width: 420px;
            background: var(--nav-bg); backdrop-filter: blur(25px);
            padding: 8px 12px; border-radius: 30px;
            box-shadow: 0 15px 35px rgba(37, 99, 235, 0.15);
            display: flex; justify-content: space-around; align-items: center;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .nav-item {
            display: flex; align-items: center; justify-content: center;
            padding: 10px 16px; cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 22px; color: var(--text-sub);
        }
        .nav-item svg { width: 24px; height: 24px; stroke: currentColor; stroke-width: 2.2; fill: none; }
        .nav-item.active { background: var(--light-blue); color: var(--primary-blue); }
        .nav-text { max-width: 0; overflow: hidden; white-space: nowrap; font-size: 14px; font-weight: 700; transition: all 0.4s ease; opacity: 0; }
        .nav-item.active .nav-text { max-width: 80px; margin-left: 10px; opacity: 1; }

    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="https://plain-eeur-prod-public.komododecks.com/202604/19/y0zyi6uOKg2CaNATvHPZ/image.png" alt="Sidarapp Logo" class="splash-image">
    </div>

    <div class="background-container"></div>
    <div class="app-container" id="main-app">
        <header class="header">
            <div>
                <div id="greeting" class="greeting">WELCOME BACK</div>
                <div class="user-name">Alex Rivera</div>
            </div>
            <div class="notif-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
            </div>
        </header>

        <main class="main-content">
            <div class="hero-card">
                <h3>Ready for Adventure?</h3>
                <p>Explore the world with Sidarapp. Your next journey starts here.</p>
            </div>
        </main>

        <nav class="bottom-nav-container">
            <div class="nav-item active" onclick="setActive(this)">
                <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                <span class="nav-text">Home</span>
            </div>
            <div class="nav-item" onclick="setActive(this)">
                <svg viewBox="0 0 24 24"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon></svg>
                <span class="nav-text">Map</span>
            </div>
            <div class="nav-item" onclick="setActive(this)">
                <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5"></rect><path d="M10 8l6 4-6 4V8z" fill="currentColor" opacity="0.3"></path></svg>
                <span class="nav-text">Reels</span>
            </div>
            <div class="nav-item" onclick="setActive(this)">
                <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                <span class="nav-text">Profile</span>
            </div>
        </nav>
    </div>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                const mainApp = document.getElementById('main-app');
                splash.style.opacity = '0';
                splash.style.visibility = 'hidden';
                mainApp.style.opacity = '1';
            }, 2500);
        });

        function setActive(el) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
        }

        const hours = new Date().getHours();
        const g = document.getElementById('greeting');
        if (hours < 12) g.innerText = "GOOD MORNING ☀️";
        else if (hours < 17) g.innerText = "GOOD AFTERNOON 🌤️";
        else g.innerText = "GOOD EVENING ✨";
    </script>
</body>
</html>
