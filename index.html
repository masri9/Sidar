<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidar App - Balanced Design</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #ffffff; /* صفحة بيضاء بالكامل حسب طلبك */
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        /* حاوية الشريط السفلي */
        .nav-container {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 75px;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: space-around;
            border-top: 1px solid #f0f0f0;
            padding: 0 10px;
            z-index: 1000;
        }

        /* تنسيق الأيقونات العادية */
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #2d3436;
            text-decoration: none;
            transition: 0.3s;
        }

        .nav-item i, .nav-item img {
            width: 24px;
            height: 24px;
            font-size: 22px;
            opacity: 0.6;
        }

        .nav-item span {
            font-size: 10px;
            font-weight: 600;
            margin-top: 4px;
            opacity: 0.6;
        }

        /* --- الأيقونة البارزة (الخريطة) --- */
        .map-wrapper {
            position: relative;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .map-btn {
            position: absolute;
            top: -40px; /* الارتفاع لتبدو بارزة */
            width: 62px;
            height: 62px;
            background: linear-gradient(135deg, #2A70DC, #00C7B7); /* تدرج لوني احترافي */
            border-radius: 20px; /* شكل Squircle عصري */
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(42, 112, 220, 0.3);
            border: 4px solid #ffffff;
            transition: transform 0.3s ease;
        }

        .map-btn img {
            width: 32px;
            height: 32px;
            filter: brightness(0) invert(1); /* جعل أيقونة الخريطة بيضاء */
            opacity: 1 !important;
        }

        /* حالة التفاعل */
        .nav-item:hover { opacity: 1; transform: translateY(-2px); }
        .map-btn:hover { transform: scale(1.1) rotate(5deg); }

    </style>
</head>
<body>

    <nav class="nav-container">
        <a href="#" class="nav-item">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </a>

        <a href="#" class="nav-item">
            <img src="https://cdn-icons-png.flaticon.com/512/5948/5948543.png" alt="Reels">
            <span>Reels</span>
        </a>

        <div class="map-wrapper">
            <a href="#" class="map-btn">
                <img src="https://cdn-icons-png.flaticon.com/512/854/854878.png" alt="Map">
            </a>
            <span style="font-size: 10px; font-weight: 600; margin-top: 45px; opacity: 0.6;">Explore</span>
        </div>

        <a href="#" class="nav-item">
            <i class="fa-solid fa-paper-plane"></i>
            <span>Messages</span>
        </a>

        <a href="#" class="nav-item">
            <i class="fa-solid fa-user"></i>
            <span>Profile</span>
        </a>
    </nav>

</body>
</html>
