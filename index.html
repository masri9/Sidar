<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sidarapp - Wave Edition</title>
    
    <style>
        :root {
            --primary-lava: #ff4500; 
            --lava-glow: rgba(255, 69, 0, 0.3);
            --text-main: #0f172a; 
        }

        body, html { 
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
            background: #fff;
        }

        /* --- Splash Screen --- */
        #splash-screen {
            position: fixed; inset: 0; background: #ffffff;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .splash-image { 
            width: 160px; 
            filter: drop-shadow(0 0 10px var(--lava-glow));
            animation: splashEntrance 1.2s ease-out forwards; 
        }
        @keyframes splashEntrance { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* --- Hero Section --- */
        .hero-section {
            padding: 60px 20px 20px;
            background: #fff;
            position: relative;
            z-index: 2;
        }

        .hero-title { 
            font-size: 34px; font-weight: 800; line-height: 1.1; color: var(--text-main); 
            margin-bottom: 25px;
        }
        .hero-title span { 
            color: var(--primary-lava); 
            text-shadow: 0 0 10px rgba(255, 69, 0, 0.1);
        }

        /* --- Search Bar with Glow --- */
        .search-wrapper {
            background: #fff;
            border-radius: 20px; padding: 12px 18px; display: flex; align-items: center;
            border: 2px solid var(--primary-lava); 
            box-shadow: 0 0 15px var(--lava-glow);
            margin-bottom: 20px;
        }
        .search-wrapper input { flex: 1; border: none; background: transparent; outline: none; font-size: 16px; }

        /* --- Wave Content Area (القسم البرتقالي المموج) --- */
        .wave-container {
            position: relative;
            width: 100%;
            min-height: 60vh;
            /* استبدال الرابط برابط الصورة المموجة التي صممناها */
            background: url('https://image_generation_content/6') no-repeat top center;
            background-size: cover;
            margin-top: -10px;
            z-index: 1;
        }

        /* --- Bottom Nav --- */
        .bottom-nav {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            border-radius: 40px; display: flex; justify-content: space-around; align-items: center;
            padding: 8px; 
            border: 2px solid var(--primary-lava);
            box-shadow: 0 0 20px var(--lava-glow);
            z-index: 1000;
        }
        .nav-item { display: flex; align-items: center; padding: 10px 15px; color: #94a3b8; transition: 0.3s; border-radius: 30px; }
        .nav-item.active { background: rgba(255, 69, 0, 0.1); color: var(--primary-lava); }
        .nav-item span { max-width: 0; overflow: hidden; transition: 0.3s; font-weight: 700; font-size: 14px; }
        .nav-item.active span { max-width: 80px; margin-left: 8px; }
        .nav-item svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2.2; }

    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="https://plain-eeur-prod-public.komododecks.com/202604/19/y0zyi6uOKg2CaNATvHPZ/image.png" class="splash-image">
    </div>

    <div class="hero-section">
        <h1 class="hero-title">Where do you <br><span>wanna go?</span></h1>
        <div class="search-wrapper">
            <span>🔍</span>
            <input type="text" placeholder="Ask Sidar AI anything...">
            <span>🎤</span>
        </div>
    </div>

    <div class="wave-container"></div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="tab(this)">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
            <span>Home</span>
        </div>
        <div class="nav-item" onclick="tab(this)">
            <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
            <span>Map</span>
        </div>
        <div class="nav-item" onclick="tab(this)">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span>Profile</span>
        </div>
    </nav>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => { document.getElementById('splash-screen').style.display = 'none'; }, 500);
            }, 2000);
        });

        function tab(el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
