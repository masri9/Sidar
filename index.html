<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidarapp - Travel UI</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        :root {
            --primary-blue: #2563eb;
            --light-blue-bg: #dbeafe;
            --nav-bg: #ffffff;
            --accent-blue: #3b82f6; 
        }

        body, html { 
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #f8fafc;
            height: 100vh;
            overflow: hidden;
        }

        /* --- الهيدر العلوي مع الصورة --- */
        .hero-section {
            height: 45vh;
            background: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?auto=format&fit=crop&w=800&q=80') center/cover;
            position: relative;
            padding: 25px;
            display: flex;
            flex-direction: column;
            color: white;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-profile {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid white;
            background: url('https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=100&q=80') center/cover;
        }

        .welcome-text { margin-top: 20px; }
        .welcome-text h1 { font-size: 28px; margin: 0; font-weight: 800; }
        .welcome-text p { opacity: 0.9; margin: 5px 0; font-size: 15px; }

        /* --- الخدمات (التاثير الزجاجي) --- */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-top: 25px;
        }

        .cat-item {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 18px;
            padding: 12px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 12px;
            font-weight: 600;
            transition: 0.3s;
        }
        .cat-item:active { transform: scale(0.9); background: rgba(255, 255, 255, 0.4); }
        .cat-icon { font-size: 20px; margin-bottom: 5px; }

        /* --- محرك البحث المدمج --- */
        .search-container-wrap {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            z-index: 10;
        }

        .search-box {
            background: white;
            border-radius: 20px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .search-box input {
            border: none;
            outline: none;
            width: 100%;
            margin-left: 10px;
            font-size: 15px;
            color: #64748b;
        }

        /* --- قسم الـ Recommended --- */
        .content-scroll {
            flex: 1;
            padding: 50px 25px 120px;
            overflow-y: auto;
            background: #f8fafc;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .section-header h2 { font-size: 18px; font-weight: 800; color: #1e293b; margin: 0; }
        .section-header span { color: #64748b; font-size: 13px; font-weight: 600; }

        .recommended-scroll {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            scrollbar-width: none;
            padding-bottom: 5px;
        }
        .recommended-scroll::-webkit-scrollbar { display: none; }

        .recom-card {
            min-width: 160px;
            height: 220px;
            border-radius: 25px;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .recom-card img { width: 100%; height: 100%; object-fit: cover; }
        .card-info {
            position: absolute;
            bottom: 15px;
            left: 15px;
            color: white;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        .card-info b { display: block; font-size: 14px; }
        .card-info span { font-size: 12px; opacity: 0.9; }
        .heart-btn {
            position: absolute; top: 15px; right: 15px;
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(5px);
            width: 32px; height: 32px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 14px;
        }

        /* --- شريط التنقل (نفس الصورة المرفقة) --- */
        .bottom-nav {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px;
            background: white; border-radius: 50px;
            padding: 10px 15px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            z-index: 1000;
        }
        .nav-item {
            display: flex; align-items: center; padding: 10px 18px;
            color: #64748b; transition: 0.3s;
        }
        .nav-item svg { width: 24px; height: 24px; }
        .nav-item.active {
            background: #eef2ff;
            color: #2563eb;
            border-radius: 40px;
        }
        .nav-item.active span { margin-left: 8px; font-weight: 700; display: inline; }
        .nav-item span { display: none; font-size: 14px; }

    </style>
</head>
<body>

    <div id="home-view" style="display: flex; flex-direction: column; height: 100%;">
        <section class="hero-section">
            <div class="top-bar">
                <div style="background: white; padding: 10px; border-radius: 12px; color: black;">☰</div>
                <div class="user-profile"></div>
            </div>
            
            <div class="welcome-text">
                <p>Hello! Sidar</p>
                <h1>Where would you like to go?</h1>
            </div>

            <div class="categories-grid">
                <div class="cat-item">
                    <span class="cat-icon">✈️</span>
                    <span>Flight</span>
                </div>
                <div class="cat-item">
                    <span class="cat-icon">🏨</span>
                    <span>Hotel</span>
                </div>
                <div class="cat-item">
                    <span class="cat-icon">🎒</span>
                    <span>Holiday</span>
                </div>
                <div class="cat-item">
                    <span class="cat-icon">🏷️</span>
                    <span>Offers</span>
                </div>
            </div>

            <div class="search-container-wrap">
                <div class="search-box">
                    <span>🔍</span>
                    <input type="text" placeholder="Search your destination...">
                </div>
            </div>
        </section>

        <main class="content-scroll">
            <div class="section-header">
                <h2>Recommended</h2>
                <span>View All</span>
            </div>

            <div class="recommended-scroll">
                <div class="recom-card">
                    <div class="heart-btn">❤️</div>
                    <img src="https://images.unsplash.com/photo-1518548419970-58e3b4079ab2?auto=format&fit=crop&w=300&q=80">
                    <div class="card-info"><b>Bali, Indonesia</b><span>⭐ 4.8</span></div>
                </div>
                <div class="recom-card">
                    <div class="heart-btn">🤍</div>
                    <img src="https://images.unsplash.com/photo-1523906834658-6e24ef2386f9?auto=format&fit=crop&w=300&q=80">
                    <div class="card-info"><b>Venice, Italy</b><span>⭐ 4.9</span></div>
                </div>
                <div class="recom-card">
                    <div class="heart-btn">🤍</div>
                    <img src="https://images.unsplash.com/photo-1548013146-72479768b949?auto=format&fit=crop&w=300&q=80">
                    <div class="card-info"><b>Taj Mahal, India</b><span>⭐ 4.7</span></div>
                </div>
            </div>

            <div class="section-header" style="margin-top: 30px;">
                <h2>Popular Destinations</h2>
                <span>View All</span>
            </div>
            <div class="recommended-scroll">
                <div class="recom-card" style="min-width: 250px;">
                    <img src="https://images.unsplash.com/photo-1512453979798-5ea266f8880c?auto=format&fit=crop&w=400&q=80">
                    <div class="card-info"><b>Dubai, UAE</b><span>⭐ 5.0</span></div>
                </div>
            </div>
        </main>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
            <span>Home</span>
        </div>
        <div class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon></svg>
            <span>Map</span>
        </div>
        <div class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"></rect><path d="M10 8l6 4-6 4V8z"></path></svg>
            <span>Reels</span>
        </div>
        <div class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span>Profile</span>
        </div>
    </nav>

</body>
</html>
