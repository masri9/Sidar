<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sidarapp - Adjusted Layout</title>
    
    <style>
        :root {
            --primary-lava: #ff4500; 
            --lava-glow: rgba(255, 69, 0, 0.4); 
            --text-main: #0f172a; 
        }

        .lava-text { color: var(--primary-lava); font-weight: 700; }

        body, html { 
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-page { display: none; animation: slideUp 0.4s ease-out; }
        .app-page.active { display: block; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #splash-screen {
            position: fixed; inset: 0; background: #ffffff;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.5s ease;
        }
        .splash-image { width: 180px; }

        .header-bg {
            position: absolute; top: 0; left: 0; right: 0; height: 55vh;
            background-size: cover; background-position: center; z-index: 0;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .app-container {
            position: relative; z-index: 1;
            padding: 90px 20px 120px; box-sizing: border-box;
        }

        .hero-section { position: relative; margin-bottom: 35px; } 
        .hero-title { font-size: 34px; font-weight: 800; line-height: 1.1; color: var(--text-main); margin-bottom: 25px; }
        .hero-title span { color: var(--primary-lava); }

        .sidar-robot {
            position: absolute;
            right: 5px;      
            top: -20px;     
            width: 120px;    
            z-index: 10;
            filter: drop-shadow(0 0 15px var(--lava-glow));
            animation: robotFloat 3s ease-in-out infinite;
        }

        @keyframes robotFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(2deg); }
        }

        .search-wrapper {
            background: rgba(255,255,255,0.9); backdrop-filter: blur(15px);
            border-radius: 20px; padding: 12px 18px; display: flex; align-items: center;
            border: 2px solid var(--primary-lava); margin-bottom: 40px; position: relative;
        }
        .search-icon { z-index: 2; margin-right: 10px; font-size: 18px; }
        .search-wrapper input { 
            flex: 1; border: none; background: transparent; outline: none; 
            font-size: 16px; width: 100%; position: relative; z-index: 2; color: var(--text-main);
        }
        .fake-placeholder {
            position: absolute; left: 45px; top: 50%; transform: translateY(-50%);
            color: #94a3b8; font-size: 16px; pointer-events: none; z-index: 1; transition: 0.2s;
        }
        .search-wrapper input:focus + .fake-placeholder,
        .search-wrapper input:not(:placeholder-shown) + .fake-placeholder { opacity: 0; }

        .services-scroll-container {
            display: flex; gap: 10px; overflow-x: auto; padding-bottom: 35px; scrollbar-width: none;
        }
        .service-pill {
            display: flex; align-items: center; background: #ffffff; border: 1.5px solid #f1f5f9;
            padding: 8px 16px; border-radius: 50px; flex-shrink: 0; transition: 0.3s; cursor: pointer;
        }
        .service-pill.active { border-color: var(--primary-lava); color: var(--primary-lava); background: rgba(255, 69, 0, 0.05); }

        /* --- تصميم الـ Widget الجديد المضاف --- */
        .service-widget-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
            z-index: 10000; display: none; justify-content: center; align-items: flex-end;
        }
        .service-widget-content {
            background: #fff; width: 100%; border-radius: 40px 40px 0 0; padding: 40px 30px;
            box-sizing: border-box; transform: translateY(100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
        }
        .service-widget-overlay.open { display: flex; }
        .service-widget-overlay.open .service-widget-content { transform: translateY(0); }
        .widget-handle { width: 40px; height: 5px; background: #e2e8f0; border-radius: 10px; margin: -20px auto 30px; }
        .widget-icon { font-size: 50px; margin-bottom: 15px; display: block; }
        .widget-title { font-size: 24px; font-weight: 800; color: var(--text-main); margin-bottom: 10px; }
        .widget-text { color: #64748b; line-height: 1.6; margin-bottom: 25px; }
        .widget-btn {
            background: var(--primary-lava); color: #fff; border: none; width: 100%; padding: 18px;
            border-radius: 20px; font-weight: 700; font-size: 16px; box-shadow: 0 10px 20px var(--lava-glow);
        }

        /* --- بقية الكود القديم كما هو --- */
        .stacked-cards-wrapper {
            position: relative; width: 100%; height: 260px;
            display: flex; justify-content: center; align-items: center;
            perspective: 1200px; margin-top: 20px;
        }
        @keyframes border-pulse {
            0% { border-color: rgba(255, 69, 0, 0.4); }
            50% { border-color: rgba(255, 69, 0, 1); }
            100% { border-color: rgba(255, 69, 0, 0.4); }
        }
        .card-item {
            position: absolute; width: 200px; height: 240px; 
            border-radius: 30px; background-size: cover; background-position: center;
            transition: all 0.7s cubic-bezier(0.34, 1.56, 0.64, 1); 
            display: flex; align-items: flex-end; justify-content: center;
            padding-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            opacity: 0; pointer-events: none; border: 2px solid transparent; 
        }
        .card-item.active { 
            opacity: 1; transform: translateX(0) translateZ(50px) scale(1); 
            z-index: 10; pointer-events: auto; animation: border-pulse 2.5s infinite ease-in-out;
        }
        .card-item.prev { opacity: 0.4; transform: translateX(-100px) translateZ(-100px) scale(0.8); z-index: 5; filter: blur(1px); }
        .card-item.next { opacity: 0.4; transform: translateX(100px) translateZ(-100px) scale(0.8); z-index: 5; filter: blur(1px); }

        .see-more-btn {
            background: rgba(255, 255, 255, 0.25); backdrop-filter: blur(12px);
            color: #fff; border-radius: 50px; padding: 8px 30px;
            font-weight: 700; font-size: 11px; border: 1px solid rgba(255,255,255,0.3);
            text-transform: uppercase;
        }

        .dots-container { display: flex; justify-content: center; gap: 8px; margin-top: 15px; }
        .dot { width: 6px; height: 6px; background: #e2e8f0; border-radius: 50%; transition: 0.4s; }
        .dot.active { background: var(--primary-lava); width: 15px; border-radius: 10px; }

        .section-header { display: flex; justify-content: space-between; align-items: flex-end; margin: 30px 0 15px; padding: 0 5px; }
        .section-header h3 { font-size: 22px; font-weight: 900; color: var(--text-main); margin: 0; letter-spacing: -0.5px; }
        
        .hubs-container { display: flex; flex-direction: column; gap: 15px; margin-bottom: 60px; }
        .hub-card { background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%); border-radius: 28px; padding: 20px; display: flex; align-items: center; gap: 15px; border: 1px solid #edf2f7; box-shadow: 0 10px 25px rgba(0,0,0,0.03); }
        .hub-icon-wrapper { width: 55px; height: 55px; background: #fff; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 26px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .hub-content { flex: 1; }
        .hub-content h4 { margin: 0; font-size: 17px; font-weight: 800; color: var(--text-main); }
        .hub-stats { display: flex; gap: 10px; margin-top: 5px; }
        .stat-pill { background: rgba(255, 69, 0, 0.08); color: var(--primary-lava); padding: 2px 10px; border-radius: 8px; font-size: 10px; font-weight: 700; }
        .hub-arrow { width: 35px; height: 35px; background: #f1f5f9; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        .ask-community-bar { background: var(--text-main); color: #fff; padding: 18px 25px; border-radius: 25px; display: flex; justify-content: space-between; align-items: center; margin-top: 10px; box-shadow: 0 15px 30px rgba(15, 23, 42, 0.2); }
        .plus-icon { width: 28px; height: 28px; background: var(--primary-lava); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="splash-screen"><img id="splashLogo" src="" class="splash-image"></div>
    <div class="header-bg" id="heroBg"></div>

    <div class="app-container" id="main-app" style="opacity: 0; transition: 1s;">
        
        <div id="home-page" class="app-page active">
            <div class="hero-section">
                <img src="https://plain-eeur-prod-public.komododecks.com/202604/20/zpRwsd9YMgeCmtSTOjFQ/image.png" class="sidar-robot" alt="Sidar AI Robot">
                <h1 class="hero-title">Where do you <br><span>wanna go?</span></h1>
            </div>

            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" placeholder=" ">
                <div class="fake-placeholder">Ask <span class="lava-text">Sidar</span> any thing...</div>
            </div>

            <div class="section-header"><h3>Our Services</h3></div>
            <div class="services-scroll-container">
                <div class="service-pill" onclick="showWidget('events')"><span>🎟️ Events</span></div>
                <div class="service-pill" onclick="showWidget('esim')"><span>📶 eSIM</span></div>
                <div class="service-pill active" onclick="showWidget('currency')"><span>💱 Currency</span></div>
                <div class="service-pill" onclick="showWidget('transfer')"><span>💸 Transfer</span></div>
            </div>

            <div class="stacked-cards-wrapper" id="cardsWrapper">
                <div class="card-item" id="card0" onclick="showInfo(0)"><div class="see-more-btn">See More</div></div>
                <div class="card-item" id="card1" onclick="showInfo(1)"><div class="see-more-btn">See More</div></div>
                <div class="card-item" id="card2" onclick="showInfo(2)"><div class="see-more-btn">See More</div></div>
                <div class="card-item" id="card3" onclick="showInfo(3)"><div class="see-more-btn">See More</div></div>
            </div>

            <div class="dots-container" id="dotsContainer"></div>

            <div class="section-header"><h3>Communities</h3></div>
            <div class="hubs-container">
                <div class="hub-card">
                    <div class="hub-icon-wrapper">🇹🇷</div>
                    <div class="hub-content"><h4>Turkey Hub</h4><div class="hub-stats"><div class="stat-pill">12 Questions</div><div class="stat-pill">45 Tips</div></div></div>
                    <div class="hub-arrow">→</div>
                </div>
                <div class="ask-community-bar"><span>Have a question?</span><div class="plus-icon">+</div></div>
            </div>
        </div>
    </div>

    <div class="service-widget-overlay" id="widgetOverlay" onclick="hideWidget()">
        <div class="service-widget-content" onclick="event.stopPropagation()">
            <div class="widget-handle"></div>
            <span class="widget-icon" id="wIcon"></span>
            <h2 class="widget-title" id="wTitle"></h2>
            <p class="widget-text" id="wDesc"></p>
            <button class="widget-btn" id="wBtn">Open Service</button>
        </div>
    </div>

    <script>
        const MY_IMAGES = {
            splashLogo: 'https://plain-eeur-prod-public.komododecks.com/202604/19/y0zyi6uOKg2CaNATvHPZ/image.png',
            heroBackground: 'https://plain-eeur-prod-public.komododecks.com/202604/19/FtJXvAZvXREKew6PJ3ew/image.png',
            card0: 'https://plain-eeur-prod-public.komododecks.com/202604/19/Zs148rIHaZ5l8sjqw4S4/image.png',
            card1: 'https://plain-eeur-prod-public.komododecks.com/202604/19/xK3pwCpVUtFZFveFLbt2/image.png',
            card2: 'https://plain-eeur-prod-public.komododecks.com/202604/19/Ri6ookm2NesWdMC7Mcbc/image.png',
            card3: 'https://plain-eeur-prod-public.komododecks.com/202604/19/qzr51sWPt6GgM3gTZH8K/image.png'
        };

        const WIDGET_DATA = {
            events: { title: "Local Events", icon: "🎟️", desc: "Book tickets for the most popular festivals, concerts, and local activities happening now.", btn: "View Events" },
            esim: { title: "Travel eSIM", icon: "📶", desc: "Get high-speed internet instantly without changing your physical SIM card. Global coverage.", btn: "Get eSIM" },
            currency: { title: "Currency Converter", icon: "💱", desc: "Track live exchange rates and find the best places to exchange money near you.", btn: "Check Rates" },
            transfer: { title: "Money Transfer", icon: "💸", desc: "Send money to your family or friends abroad instantly with the lowest fees.", btn: "Send Now" }
        };

        function showWidget(key) {
            const data = WIDGET_DATA[key];
            document.getElementById('wIcon').innerText = data.icon;
            document.getElementById('wTitle').innerText = data.title;
            document.getElementById('wDesc').innerText = data.desc;
            document.getElementById('wBtn').innerText = data.btn;
            document.getElementById('widgetOverlay').classList.add('open');
        }

        function hideWidget() {
            document.getElementById('widgetOverlay').classList.remove('open');
        }

        function applyImages() {
            document.getElementById('splashLogo').src = MY_IMAGES.splashLogo;
            document.getElementById('heroBg').style.backgroundImage = `url('${MY_IMAGES.heroBackground}')`;
            document.getElementById('card0').style.backgroundImage = `url('${MY_IMAGES.card0}')`;
            document.getElementById('card1').style.backgroundImage = `url('${MY_IMAGES.card1}')`;
            document.getElementById('card2').style.backgroundImage = `url('${MY_IMAGES.card2}')`;
            document.getElementById('card3').style.backgroundImage = `url('${MY_IMAGES.card3}')`;
        }

        let currentIndex = 0;
        const cards = document.querySelectorAll('.card-item');

        function updateCards() {
            cards.forEach((card, i) => {
                card.classList.remove('active', 'prev', 'next');
                if (i === currentIndex) card.classList.add('active');
                else if (i === (currentIndex - 1 + cards.length) % cards.length) card.classList.add('prev');
                else if (i === (currentIndex + 1) % cards.length) card.classList.add('next');
            });
            document.querySelectorAll('.dot').forEach((dot, i) => dot.classList.toggle('active', i === currentIndex));
        }

        window.addEventListener('load', () => {
            applyImages();
            const dotsContainer = document.getElementById('dotsContainer');
            cards.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = `dot ${i === 0 ? 'active' : ''}`;
                dotsContainer.appendChild(dot);
            });
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash-screen').style.display = 'none';
                    document.getElementById('main-app').style.opacity = '1';
                    updateCards();
                }, 500);
            }, 2000);
        });

        setInterval(() => { 
            if(document.getElementById('home-page').classList.contains('active')) {
                currentIndex = (currentIndex + 1) % cards.length; 
                updateCards(); 
            }
        }, 4000);
    </script>
</body>
</html>
