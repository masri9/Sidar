<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sidarapp - Fixed UI</title>
    
    <style>
        :root {
            --primary-blue: #2563eb;
            --accent-blue: #3b82f6;
            --text-main: #0f172a;
        }

        /* تثبيت الهيكل ومنع الحركة الجانبية */
        body, html { 
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #ffffff;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* منع السكرول الرئيسي للهيكل */
            position: relative;
        }

        /* الخلفية الثابتة */
        .header-bg {
            position: absolute; top: 0; left: 0; right: 0; height: 45vh;
            background: linear-gradient(rgba(255,255,255,0.1), #fff), 
                        url('https://plain-eeur-prod-public.komododecks.com/202604/19/FtJXvAZvXREKew6PJ3ew/image.png');
            background-size: cover; background-position: center;
            z-index: -1;
        }

        /* الحاوية الرئيسية القابلة للتمرير عمودياً فقط */
        .app-scroller {
            height: 100vh;
            overflow-y: auto;
            overflow-x: hidden; /* تأكيد عدم وجود حركة يمين شمال */
            padding: 25px 20px 120px;
            box-sizing: border-box;
        }

        /* الهيدر */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .menu-btn { background: white; padding: 10px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .profile-img { width: 42px; height: 42px; border-radius: 12px; background: url('https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=100&q=80') center/cover; border: 2px solid white; }

        .hero-title { font-size: 34px; font-weight: 800; line-height: 1.1; color: var(--text-main); margin-bottom: 25px; }
        .hero-title span { color: var(--primary-blue); }

        /* AI Chat Box */
        .ai-chat-box {
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(15px);
            border-radius: 20px; padding: 12px 15px; display: flex; align-items: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.05); margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.5);
        }
        .ai-chat-box input { flex: 1; border: none; background: transparent; outline: none; padding: 0 10px; font-weight: 600; }

        /* الخدمات */
        .services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
        .service-item {
            background: rgba(255,255,255,0.6); border-radius: 20px; padding: 15px 5px;
            display: flex; flex-direction: column; align-items: center; transition: 0.3s;
            border: 1px solid transparent;
        }
        .service-item.active { background: white; border-color: var(--primary-blue); transform: scale(1.02); }
        .icon-box { font-size: 22px; margin-bottom: 5px; }
        .service-item span { font-size: 12px; font-weight: 700; color: #64748b; }

        /* منطقة الـ Widget */
        #widget-area {
            background: white; border-radius: 25px; padding: 20px; margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); display: none;
            animation: fadeIn 0.4s ease;
        }

        /* --- Carousel (البطاقات المتداخلة كما في الصورة) --- */
        .carousel-section { width: 100%; margin-top: 20px; text-align: left; }
        .carousel-section h2 { font-size: 22px; font-weight: 800; margin-bottom: 15px; padding-left: 5px; }
        
        .carousel-container {
            display: flex; align-items: center; justify-content: center;
            gap: 15px; padding: 10px 0; perspective: 1000px;
        }

        .card {
            width: 180px; height: 260px; border-radius: 30px;
            position: relative; overflow: hidden; transition: 0.5s ease;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        /* البطاقة الجانبية (أصغر ومائلة قليلاً) */
        .card.side { transform: scale(0.85); opacity: 0.6; filter: blur(1px); }
        
        /* البطاقة الوسطى (أكبر وأوضح) */
        .card.main { width: 220px; height: 300px; z-index: 10; transform: scale(1.05); opacity: 1; }

        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-btn {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: white; border: none;
            padding: 8px 20px; border-radius: 20px; font-size: 12px; font-weight: 600;
        }

        /* Navigation */
        .bottom-nav {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: white; border-radius: 40px;
            display: flex; justify-content: space-between; padding: 10px 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1); z-index: 1000;
        }
        .nav-item { display: flex; align-items: center; padding: 10px 18px; color: #94a3b8; text-decoration: none; }
        .nav-item.active { background: #eef2ff; color: #2563eb; border-radius: 30px; }
        .nav-item span { display: none; margin-left: 8px; font-weight: 700; }
        .nav-item.active span { display: inline; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

    <nav class="bottom-nav">

        <a href="#" class="nav-link nav-item">🎬<span>Reels</span></a>
        <a href="#" class="nav-link nav-item">👤<span>Profile</span></a>
    </nav>

        // تثبيت الهيكل ومنع التحرك العشوائي
        function openWidget(name, el) {
            const area = document.getElementById('widget-area');
            const title = document.getElementById('w-title');
            
            document.querySelectorAll('.service-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            
            area.style.display = 'block';
            title.innerText = name + " Service";

</html>
