<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidarapp - Official</title>
    <style>
        :root {
            --primary-blue: #2563eb;
            --light-blue: #dbeafe;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --nav-bg: rgba(255, 255, 255, 0.95);
            --white-alpha: rgba(255, 255, 255, 0.85);
        }

        body, html { 
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* --- شاشة الـ Splash --- */
        #splash-screen {
            position: fixed; inset: 0; background: #ffffff;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1), visibility 1s;
        }
        .splash-image { width: 180px; height: auto; animation: splashEntrance 1.5s ease-out forwards; }

        @keyframes splashEntrance {
            0% { transform: scale(0.8); opacity: 0; filter: blur(10px); }
            100% { transform: scale(1); opacity: 1; filter: blur(0); }
        }

        /* --- واجهة الـ Home (الخلفية) --- */
        .background-container {
            position: fixed; inset: 0; z-index: -1;
            background-image: url('https://plain-eeur-prod-public.komododecks.com/202604/19/FtJXvAZvXREKew6PJ3ew/image.png'); 
            background-size: cover; background-position: center;
        }

        .app-container {
            height: 100vh; padding: 25px;
            display: flex; flex-direction: column;
            box-sizing: border-box; opacity: 0; 
            transition: opacity 1.2s ease;
        }

        /* --- الهيدر والقائمة --- */
        .header {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: flex-start; /* ترتيب العناصر من اليسار */
            margin-bottom: 20px;
        }

        .menu-icon {
            background: white;
            padding: 12px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .menu-icon:active { background: #f1f5f9; }

        /* --- المحتوى الرئيسي وبطاقة الـ Hero --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center; /* توسيط عمودي */
            align-items: center;     /* توسيط أفقي */
            padding-bottom: 100px;  /* مسافة لشريط التنقل */
        }

        .hero-card {
            background: var(--white-alpha);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px 30px;
            border-radius: 35px;
            width: 85%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(37, 99, 235, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.6);
            
            /* أنيميشن الظهور */
            opacity: 0;
            transform: translateY(40px);
            animation: heroSlideUp 1s ease-out 2.8s forwards; /* تظهر بعد الـ Splash */
        }

        @keyframes heroSlideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-title {
            font-size: 26px;
            font-weight: 800;
            color: var(--text-main);
            margin: 0 0 15px 0;
            line-height: 1.2;
        }

        .hero-subtitle {
            font-size: 16px;
            color: var(--text-sub);
            margin: 0;
            line-height: 1.6;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 5px; /* مسافة بين الكلمات والشعار */
        }

        /* تنسيق صورة الشعار داخل النص */
        .inline-logo {
            height: 20px; /* تناسب طول الخط */
            width: auto;
            vertical-align: middle;
            margin-top: -2px; /* تعديل بسيط للمحاذاة */
        }

        /* --- شريط التنقل السفلي --- */
        .bottom-nav-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 420px;
            background: var(--nav-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 8px 12px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(37, 99, 235, 0.15);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.3);
            z-index: 100;
        }

        .nav-item {
            display: flex; align-items: center; justify-content: center;
            padding: 10px 16px; cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 22px; color: var(--text-sub);
        }
        .nav-item svg { width: 24px; height: 24px; stroke: currentColor; stroke-width: 2.2; fill: none; }
        .nav-item.active { background: var(--light-blue); color: var(--primary-blue); }
        .nav-text { max-width: 0; overflow: hidden; white-space: nowrap; font-size: 14px; font-weight: 700; transition: all 0.4s ease; opacity: 0; }
        .nav-item.active .nav-text { max-width: 80px; margin-left: 10px; opacity: 1; }

    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="https://plain-eeur-prod-public.komododecks.com/202604/19/y0zyi6uOKg2CaNATvHPZ/image.png" alt="Sidarapp Logo" class="splash-image">
    </div>

    <div class="background-container"></div>
    
    <div class="app-container" id="main-app">
        
        <header class="header">
            <div class="menu-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </div>
        </header>

        <main class="main-content">
            <div class="hero-card">
                <h1 class="hero-title">Explore Without Limits</h1>
                <p class="hero-subtitle">
                    <span>Your journey begins with</span>
                    <img src="https://plain-eeur-prod-public.komododecks.com/202604/19/y0zyi6uOKg2CaNATvHPZ/image.png" alt="Sidar" class="inline-logo">
                </p>
            </div>
        </main>

        <nav class="bottom-nav-container">
            <div class="nav-item active" onclick="setActive(this)">
                <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                <span class="nav-text">Home</span>
            </div>
            <div class="nav-item" onclick="setActive(this)">
                <svg viewBox="0 0 24 24"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon></svg>
                <span class="nav-text">Map</span>
            </div>
            <div class="nav-item" onclick="setActive(this)">
                <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5"></rect><path d="M10 8l6 4-6 4V8z" fill="currentColor" opacity="0.3"></path></svg>
                <span class="nav-text">Reels</span>
            </div>
            <div class="nav-item" onclick="setActive(this)">
                <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                <span class="nav-text">Profile</span>
            </div>
        </nav>
    </div>

    <script>
        // التعامل مع شاشة الـ Splash وإظهار التطبيق
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                const mainApp = document.getElementById('main-app');
                
                // إخفاء الـ Splash
                splash.style.opacity = '0';
                splash.style.visibility = 'hidden';
                
                // إظهار التطبيق وحركة البطاقة
                mainApp.style.opacity = '1';
            }, 2500); // مدة العرض 2.5 ثانية
        });

        // تغيير القائمة النشطة في شريط التنقل
        function setActive(el) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
