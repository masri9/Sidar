<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sidarapp - Profile Added</title>
    
    <style>
        :root {
            --primary-lava: #ff4500; 
            --lava-glow: rgba(255, 69, 0, 0.4); 
            --text-main: #0f172a; 
        }

        .lava-text { color: var(--primary-lava); font-weight: 700; }

        body, html { 
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- نظام التنقل (لا يؤثر على المحتوى) --- */
        .app-page { display: none; animation: fadeIn 0.3s ease; }
        .app-page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- الأكواد الأصلية كما هي تماماً --- */
        #splash-screen {
            position: fixed; inset: 0; background: #ffffff;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.5s ease;
        }
        .splash-image { width: 180px; }

        .header-bg {
            position: absolute; top: 0; left: 0; right: 0; height: 55vh;
            background-size: cover; background-position: center; z-index: 0;
            transition: 0.5s;
        }

        .app-container {
            position: relative; z-index: 1;
            padding: 60px 20px 120px; box-sizing: border-box;
        }

        .hero-title { font-size: 34px; font-weight: 800; line-height: 1.1; color: var(--text-main); margin-bottom: 25px; }
        .hero-title span { color: var(--primary-lava); }

        .search-wrapper {
            background: rgba(255,255,255,0.9); backdrop-filter: blur(15px);
            border-radius: 20px; padding: 12px 18px; display: flex; align-items: center;
            border: 2px solid var(--primary-lava); margin-bottom: 25px; position: relative;
        }
        .search-icon { z-index: 2; margin-right: 10px; font-size: 18px; }
        .search-wrapper input { 
            flex: 1; border: none; background: transparent; outline: none; 
            font-size: 16px; width: 100%; position: relative; z-index: 2; color: var(--text-main);
        }
        .fake-placeholder {
            position: absolute; left: 45px; top: 50%; transform: translateY(-50%);
            color: #94a3b8; font-size: 16px; pointer-events: none; z-index: 1; transition: 0.2s;
        }
        .search-wrapper input:focus + .fake-placeholder,
        .search-wrapper input:not(:placeholder-shown) + .fake-placeholder { opacity: 0; }

        .services-scroll-container {
            display: flex; gap: 10px; overflow-x: auto; padding-bottom: 25px; scrollbar-width: none;
        }
        .service-pill {
            display: flex; align-items: center; background: #ffffff; border: 1.5px solid #f1f5f9;
            padding: 8px 16px; border-radius: 50px; flex-shrink: 0; transition: 0.3s;
        }
        .service-pill.active { border-color: var(--primary-lava); color: var(--primary-lava); background: rgba(255, 69, 0, 0.05); }

        .stacked-cards-wrapper {
            position: relative; width: 100%; height: 260px;
            display: flex; justify-content: center; align-items: center;
            perspective: 1200px; margin-top: 10px;
        }
        .card-item {
            position: absolute; width: 200px; height: 240px; 
            border-radius: 30px; background-size: cover; background-position: center;
            transition: all 0.7s cubic-bezier(0.34, 1.56, 0.64, 1); 
            display: flex; align-items: flex-end; justify-content: center;
            padding-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            opacity: 0; pointer-events: none; border: 2px solid transparent; 
        }
        .card-item.active { 
            opacity: 1; transform: translateX(0) translateZ(50px) scale(1); 
            z-index: 10; pointer-events: auto; border-color: var(--primary-lava);
        }
        .card-item.prev { opacity: 0.4; transform: translateX(-100px) translateZ(-100px) scale(0.8); z-index: 5; }
        .card-item.next { opacity: 0.4; transform: translateX(100px) translateZ(-100px) scale(0.8); z-index: 5; }

        .see-more-btn {
            background: rgba(255, 255, 255, 0.25); backdrop-filter: blur(12px);
            color: #fff; border-radius: 50px; padding: 8px 30px;
            font-weight: 700; font-size: 11px; border: 1px solid rgba(255,255,255,0.3);
            text-transform: uppercase;
        }

        .dots-container { display: flex; justify-content: center; gap: 8px; margin-top: 15px; }
        .dot { width: 6px; height: 6px; background: #e2e8f0; border-radius: 50%; transition: 0.4s; }
        .dot.active { background: var(--primary-lava); width: 15px; border-radius: 10px; }

        .section-header { display: flex; justify-content: space-between; align-items: flex-end; margin: 40px 0 15px; padding: 0 5px; }
        .section-header h3 { font-size: 22px; font-weight: 900; color: var(--text-main); margin: 0; letter-spacing: -0.5px; }

        .stories-container { display: flex; gap: 18px; overflow-x: auto; padding: 10px 5px 20px; scrollbar-width: none; }
        .story-ring { width: 70px; height: 70px; border-radius: 24px; padding: 3px; background: linear-gradient(45deg, var(--primary-lava), #ff8c00); position: relative; }
        .story-ring img { width: 100%; height: 100%; border-radius: 21px; object-fit: cover; background: #fff; border: 2px solid #fff; }

        .hubs-container { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        .hub-card { background: #f8fafc; border-radius: 28px; padding: 20px; display: flex; align-items: center; gap: 15px; border: 1px solid #edf2f7; }
        .hub-icon-wrapper { width: 55px; height: 55px; background: #fff; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 26px; }

        /* --- 🆕 كود صفحة البروفايل (جديد) --- */
        .profile-page-content { padding-top: 20px; }
        .profile-header-card { text-align: center; margin-bottom: 30px; }
        .profile-avatar { width: 110px; height: 110px; border-radius: 40px; border: 3px solid var(--primary-lava); margin: 0 auto 15px; padding: 5px; }
        .profile-avatar img { width: 100%; height: 100%; border-radius: 35px; object-fit: cover; }
        
        .settings-list { background: #f8fafc; border-radius: 30px; overflow: hidden; border: 1px solid #edf2f7; }
        .settings-item { display: flex; align-items: center; justify-content: space-between; padding: 20px; border-bottom: 1px solid #eee; }
        .settings-item:last-child { border-bottom: none; }
        .settings-label { display: flex; align-items: center; gap: 12px; font-weight: 700; color: var(--text-main); }
        .logout-box { margin-top: 20px; padding: 20px; border-radius: 25px; background: #fff1f2; color: #e11d48; text-align: center; font-weight: 800; }

        /* --- Navigation --- */
        .bottom-nav {
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: #ffffff; border-radius: 40px;
            display: flex; justify-content: space-around; align-items: center; padding: 8px; 
            border: 2px solid var(--primary-lava); z-index: 1000;
        }
        .nav-item { display: flex; align-items: center; justify-content: center; padding: 10px 15px; color: #94a3b8; transition: 0.3s; border-radius: 30px; }
        .nav-item.active { background: rgba(255, 69, 0, 0.1); color: var(--primary-lava); }
        .nav-item span { max-width: 0; overflow: hidden; white-space: nowrap; transition: 0.3s; font-weight: 700; font-size: 14px; }
        .nav-item.active span { max-width: 80px; margin-left: 8px; }
        .nav-item svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2.2; }
    </style>
</head>
<body>

    <div id="splash-screen"><img id="splashLogo" src="" class="splash-image"></div>
    <div class="header-bg" id="heroBg"></div>

    <div class="app-container" id="main-app" style="opacity: 0; transition: 1s;">
        
        <div id="home-page" class="app-page active">
            <h1 class="hero-title">Where do you <br><span>wanna go?</span></h1>

            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" placeholder=" ">
                <div class="fake-placeholder">Ask <span class="lava-text">Sidar</span> any thing...</div>
            </div>

            <div class="services-scroll-container">
                <div class="service-pill active"><span>💱 Currency</span></div>
                <div class="service-pill"><span>🎟️ Events</span></div>
                <div class="service-pill"><span>📶 eSIM</span></div>
            </div>

            <div class="stacked-cards-wrapper">
                <div class="card-item" id="card0"><div class="see-more-btn">Explore</div></div>
                <div class="card-item" id="card1"><div class="see-more-btn">Explore</div></div>
                <div class="card-item" id="card2"><div class="see-more-btn">Explore</div></div>
                <div class="card-item" id="card3"><div class="see-more-btn">Explore</div></div>
            </div>

            <div class="dots-container" id="dotsContainer"></div>

            <div class="section-header"><h3>Live Moments</h3></div>
            <div class="stories-container">
                <div class="story-ring"><img src="https://i.pravatar.cc/150?u=1"></div>
                <div class="story-ring"><img src="https://i.pravatar.cc/150?u=2"></div>
                <div class="story-ring"><img src="https://i.pravatar.cc/150?u=3"></div>
            </div>

            <div class="section-header"><h3>Communities</h3></div>
            <div class="hub-card">
                <div class="hub-icon-wrapper">🇹🇷</div>
                <div><h4>Turkey Hub</h4><span class="lava-text" style="font-size: 12px;">12 New Questions</span></div>
            </div>
        </div>

        <div id="profile-page" class="app-page">
            <div class="profile-page-content">
                <div class="profile-header-card">
                    <div class="profile-avatar"><img src="https://i.pravatar.cc/150?u=me"></div>
                    <h2 style="margin:0;">Ahmad Sidar</h2>
                    <p style="color:#94a3b8; margin:5px 0;">@ahmad_travels</p>
                </div>

                <div class="settings-list">
                    <div class="settings-item"><div class="settings-label">👤 Personal Info</div><span>→</span></div>
                    <div class="settings-item"><div class="settings-label">🔔 Notifications</div><div style="width:30px; height:15px; background:var(--primary-lava); border-radius:10px;"></div></div>
                    <div class="settings-item"><div class="settings-label">🌍 Language</div><span style="font-size:12px; color:#94a3b8;">English</span></div>
                </div>
                <div class="logout-box">Log Out</div>
            </div>
        </div>

    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="tab(this, 'home')"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg><span>Home</span></div>
        <div class="nav-item" onclick="tab(this, 'profile')"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><span>Profile</span></div>
    </nav>

    <script>
        const MY_IMAGES = {
            splashLogo: 'https://plain-eeur-prod-public.komododecks.com/202604/19/y0zyi6uOKg2CaNATvHPZ/image.png',
            heroBackground: 'https://plain-eeur-prod-public.komododecks.com/202604/19/FtJXvAZvXREKew6PJ3ew/image.png',
            card0: 'https://plain-eeur-prod-public.komododecks.com/202604/19/Zs148rIHaZ5l8sjqw4S4/image.png',
            card1: 'https://plain-eeur-prod-public.komododecks.com/202604/19/xK3pwCpVUtFZFveFLbt2/image.png',
            card2: 'https://plain-eeur-prod-public.komododecks.com/202604/19/Ri6ookm2NesWdMC7Mcbc/image.png',
            card3: 'https://plain-eeur-prod-public.komododecks.com/202604/19/qzr51sWPt6GgM3gTZH8K/image.png'
        };

        let currentIndex = 0;
        const cards = document.querySelectorAll('.card-item');

        function updateCards() {
            cards.forEach((card, i) => {
                card.classList.remove('active', 'prev', 'next');
                if (i === currentIndex) card.classList.add('active');
                else if (i === (currentIndex - 1 + cards.length) % cards.length) card.classList.add('prev');
                else if (i === (currentIndex + 1) % cards.length) card.classList.add('next');
            });
            document.querySelectorAll('.dot').forEach((dot, i) => dot.classList.toggle('active', i === currentIndex));
        }

        // دالة التبديل بين الصفحات
        function tab(el, page) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            
            document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active'));
            document.getElementById(page + '-page').classList.add('active');

            // تأثير بسيط للخلفية عند الانتقال للبروفايل
            document.getElementById('heroBg').style.filter = (page === 'profile') ? 'blur(10px) brightness(0.7)' : 'none';
        }

        window.addEventListener('load', () => {
            document.getElementById('splashLogo').src = MY_IMAGES.splashLogo;
            document.getElementById('heroBg').style.backgroundImage = `url('${MY_IMAGES.heroBackground}')`;
            cards.forEach((card, i) => card.style.backgroundImage = `url('${MY_IMAGES['card'+i]}')`);

            const dotsContainer = document.getElementById('dotsContainer');
            cards.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = `dot ${i === 0 ? 'active' : ''}`;
                dotsContainer.appendChild(dot);
            });

            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash-screen').style.display = 'none';
                    document.getElementById('main-app').style.opacity = '1';
                    updateCards();
                }, 500);
            }, 2000);
        });

        setInterval(() => { 
            if(document.getElementById('home-page').classList.contains('active')) {
                currentIndex = (currentIndex + 1) % cards.length; 
                updateCards(); 
            }
        }, 4000);
    </script>
</body>
</html>
